<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Media preview</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  :root { color-scheme: dark; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #131417;
  }
  /* Video review stage (Frame.io-style): the video fills the available width,
     letterboxed on near-black, with the comment timeline + transport reading
     as one unit directly beneath it. */
  #stage {
    width: 100%;
    max-width: 1600px;
    padding: 24px 24px 12px;
  }
  video {
    display: block;
    width: 100%;
    max-height: 70vh;
    object-fit: contain;
    background: #0a0a0a;
  }
  audio {
    width: min(90%, 480px);
    display: block;
    margin: 0 auto;
  }
  #player { user-select: none; }
  /* Seek track: thin bar, lime progress, precision playhead. The annotate
     overlay draws comment markers ON this track (data-fa-timeline). */
  #trackwrap {
    padding: 10px 0 6px;
    cursor: pointer;
  }
  #track {
    position: relative;
    height: 5px;
    border-radius: 3px;
    background: #2a2d33;
  }
  #trackwrap:hover #track { height: 7px; }
  #fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    border-radius: 3px;
    background: color-mix(in srgb, #E5FF44 70%, transparent);
  }
  #playhead {
    position: absolute;
    top: 50%;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #E5FF44;
    transform: translate(-50%, -50%);
    box-shadow: 0 1px 4px rgba(0,0,0,0.6);
    transition: width 100ms, height 100ms;
  }
  #trackwrap:hover #playhead { width: 16px; height: 16px; }
  #controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 2px 0 8px;
  }
  #playbtn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: 6px;
    background: transparent; color: #e8eaed;
    cursor: pointer;
  }
  #playbtn:hover { background: #22252b; }
  #time {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px;
    color: #9aa0a6;
  }
  figcaption {
    font-size: 13px;
    color: #9aa0a6;
    word-break: break-all;
    text-align: center;
    padding: 0 16px 16px;
  }
  #status {
    padding: 24px;
    color: #9aa0a6;
  }
  #status.error { color: #ff6b6b; }
</style>
</head>
<body>
  <figure id="fig" style="margin: 0; width: 100%; display: flex; flex-direction: column; align-items: center;">
    <div id="mount" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    <figcaption id="caption"></figcaption>
  </figure>
  <script>
    // Which HTML element to use is decided purely by extension.
    const VIDEO_EXT = ["mp4", "mov", "m4v", "webm"];
    const AUDIO_EXT = ["mp3", "wav", "m4a", "ogg", "flac"];

    const file = fused.params.get("_file");
    const mount = document.getElementById("mount");
    const caption = document.getElementById("caption");

    function fmt(sec) {
      if (!isFinite(sec)) return "0:00";
      const s = Math.floor(sec);
      return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
    }

    // Custom transport for video (audio keeps native controls): play/pause +
    // seekable timeline. The chrome is data-fa-passthrough so it stays LIVE in
    // annotate mode (clicks seek, they don't open comment drafts); the track
    // carries data-fa-timeline so the annotate overlay parks its timestamp
    // markers on it, Frame.io-style. The video frame itself stays annotatable.
    function buildVideoPlayer(src) {
      const stage = document.createElement("div");
      stage.id = "stage";
      stage.innerHTML = `
        <video></video>
        <div id="player" data-fa-passthrough>
          <div id="trackwrap">
            <div id="track" data-fa-timeline>
              <div id="fill"></div>
              <div id="playhead"></div>
            </div>
          </div>
          <div id="controls">
            <button id="playbtn" title="Play/Pause">
              <svg id="ic_play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg id="ic_pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
            </button>
            <span id="time">0:00 / 0:00</span>
          </div>
        </div>`;
      const video = stage.querySelector("video");
      video.src = src;
      const playBtn = stage.querySelector("#playbtn");
      const icPlay = stage.querySelector("#ic_play");
      const icPause = stage.querySelector("#ic_pause");
      const time = stage.querySelector("#time");
      const trackwrap = stage.querySelector("#trackwrap");
      const track = stage.querySelector("#track");
      const fill = stage.querySelector("#fill");
      const playhead = stage.querySelector("#playhead");

      function paint() {
        const d = video.duration;
        const f = d > 0 ? video.currentTime / d : 0;
        fill.style.width = f * 100 + "%";
        playhead.style.left = f * 100 + "%";
        time.textContent = fmt(video.currentTime) + " / " + fmt(d);
        icPlay.style.display = video.paused ? "" : "none";
        icPause.style.display = video.paused ? "none" : "";
      }
      video.addEventListener("timeupdate", paint);
      video.addEventListener("loadedmetadata", paint);
      video.addEventListener("play", paint);
      video.addEventListener("pause", paint);
      playBtn.addEventListener("click", () => (video.paused ? video.play() : video.pause()));

      // Click seeks; drag scrubs live.
      let scrubbing = false;
      function seekTo(clientX) {
        const r = track.getBoundingClientRect();
        const f = Math.min(1, Math.max(0, (clientX - r.left) / r.width));
        if (video.duration > 0) video.currentTime = f * video.duration;
        paint();
      }
      trackwrap.addEventListener("pointerdown", (e) => {
        scrubbing = true;
        trackwrap.setPointerCapture(e.pointerId);
        seekTo(e.clientX);
      });
      trackwrap.addEventListener("pointermove", (e) => scrubbing && seekTo(e.clientX));
      trackwrap.addEventListener("pointerup", () => (scrubbing = false));

      return stage;
    }

    if (!file) {
      document.getElementById("fig").innerHTML =
        `<div id="status" class="error">No file selected (missing _file param).</div>`;
    } else {
      const name = file.split("/").pop();
      const ext = (name.split(".").pop() || "").toLowerCase();
      const src = fused.rawUrl(file);
      if (VIDEO_EXT.includes(ext)) {
        mount.appendChild(buildVideoPlayer(src));
        caption.textContent = name;
      } else if (AUDIO_EXT.includes(ext)) {
        const el = document.createElement("audio");
        el.controls = true;
        el.src = src;
        mount.appendChild(el);
        caption.textContent = name;
      } else {
        document.getElementById("fig").innerHTML =
          `<div id="status" class="error">Unsupported media type: .${ext}</div>`;
      }
    }
  </script>
</body>
</html>
