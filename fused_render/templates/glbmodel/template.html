<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Model Editor</title>
<style>
  :root {
    --bg: #111418; --bar: #191e24; --panel: #1a1f26; --line: #2a3038;
    --line2: #343b44; --txt: #dfe4ea; --dim: #8a94a0; --faint: #5c6570;
    --accent: #4a8cff; --accent2: #35507a; --ok: #4cc38a; --warn: #e5a94e;
    --err: #e5644e;
  }
  html, body { margin: 0; height: 100%; background: var(--bg);
    color: var(--txt); font: 13px/1.4 system-ui, sans-serif; overflow: hidden; }
  #canvas { width: 100%; height: 100%; display: block; }

  /* ---- top toolbar ---- */
  #topbar { position: fixed; top: 0; left: 0; right: 0; height: 44px;
    display: flex; align-items: center; gap: 10px; padding: 0 12px;
    background: color-mix(in srgb, var(--bar) 92%, transparent);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
    z-index: 10; user-select: none; }
  #brand { font-weight: 650; font-size: 12px; letter-spacing: .04em;
    color: var(--dim); text-transform: uppercase; margin-right: 4px; }
  .spacer { flex: 1; }

  /* ---- left tool rail ---- */
  #rail { position: fixed; left: 12px; top: 56px; z-index: 10;
    display: flex; flex-direction: column; gap: 2px;
    background: color-mix(in srgb, var(--panel) 94%, transparent);
    backdrop-filter: blur(8px); border: 1px solid var(--line);
    border-radius: 10px; padding: 4px; user-select: none; }
  #rail button { position: relative; width: 46px; height: 44px; border: none;
    background: none; color: var(--dim); border-radius: 8px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 2px; }
  #rail button svg { width: 17px; height: 17px; stroke: currentColor;
    fill: none; stroke-width: 1.7; stroke-linecap: round;
    stroke-linejoin: round; }
  #rail button .lbl { font-size: 8.5px; letter-spacing: .03em; }
  #rail button kbd { position: absolute; top: 3px; right: 5px;
    font: 8.5px ui-monospace, monospace; color: var(--faint); }
  #rail button:hover { color: var(--txt); background: #1e242b; }
  #rail button.on { background: var(--accent2); color: #fff; }
  #rail button.on kbd { color: #9db8de; }
  #rail .rule { height: 1px; background: var(--line); margin: 3px 5px; }

  /* ---- contextual hint bar ---- */
  #hint { position: fixed; bottom: 10px; left: 50%;
    transform: translateX(-50%); max-width: 70vw; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; color: var(--dim);
    font-size: 11.5px; z-index: 10; pointer-events: none; user-select: none;
    background: color-mix(in srgb, var(--bar) 88%, transparent);
    border: 1px solid var(--line); border-radius: 999px; padding: 4px 14px; }

  #statusChip { display: flex; align-items: center; gap: 7px;
    color: var(--dim); font-size: 12px; max-width: 40vw; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  #statusChip .dot { width: 7px; height: 7px; border-radius: 50%;
    background: var(--faint); flex: none; }
  #statusChip.ok .dot { background: var(--ok); }
  #statusChip.busy .dot { background: var(--warn); animation: pulse 1s infinite; }
  #statusChip.err .dot { background: var(--err); }
  @keyframes pulse { 50% { opacity: .3; } }

  #dirtyChip { display: none; align-items: center; gap: 8px; font-size: 12px;
    color: var(--warn); background: rgba(229,169,78,.08);
    border: 1px solid rgba(229,169,78,.25); border-radius: 6px;
    padding: 3px 9px; }
  #dirtyChip.show { display: flex; }
  #dirtyChip a { color: var(--dim); cursor: pointer; text-decoration: underline;
    text-underline-offset: 2px; }
  #dirtyChip a:hover { color: var(--txt); }

  button.bar { background: #232931; color: var(--txt);
    border: 1px solid var(--line2); border-radius: 7px; padding: 6px 14px;
    cursor: pointer; font-size: 12.5px; }
  button.bar:hover { background: #2b323b; }
  button.primary { background: var(--accent2); border-color: #4a6a9c; }
  button.primary:hover { background: #3f5e8f; }
  button.primary:disabled { opacity: .45; cursor: default; }

  /* ---- right sidebar ---- */
  #side { position: fixed; top: 56px; right: 12px; bottom: 12px; width: 232px;
    display: flex; flex-direction: column; gap: 10px; z-index: 10;
    font-size: 12px; overflow-y: auto; scrollbar-width: thin;
    /* The container's gaps/empty space are transparent and overlap the canvas:
       let drags there fall through to OrbitControls (pan) instead of being
       swallowed by the sidebar. The opaque panel cards re-enable events. */
    pointer-events: none; }
  .panel { background: color-mix(in srgb, var(--panel) 94%, transparent);
    backdrop-filter: blur(8px); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; flex: none;
    pointer-events: auto; user-select: none; }
  .panel h3 { margin: 0 0 8px; font-size: 10.5px; text-transform: uppercase;
    letter-spacing: .07em; color: var(--dim); font-weight: 650;
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    user-select: none; }
  .panel h3:hover { color: var(--txt); }
  .panel h3 .who { color: var(--accent); text-transform: none;
    letter-spacing: 0; font-size: 12px; margin-left: auto; }
  .panel h3 .chev { color: var(--faint); font-size: 8px;
    transition: transform .15s; }
  .panel.closed .chev { transform: rotate(-90deg); }
  .panel.closed .body { display: none; }
  .panel.closed h3 { margin-bottom: 0; }
  .panel .empty { color: var(--faint); font-size: 11.5px; padding: 2px 0; }
  #parts .prow > .badge { width: 13px; flex: none; color: var(--faint);
    font-size: 10px; text-align: center; cursor: default; }
  #parts .prow > .badge.frozen { color: #7fb3ff; }
  #helpTable { border-collapse: collapse; margin: 4px 0 6px; }
  #helpTable td { padding: 3px 12px 3px 0; color: var(--txt);
    font-size: 12.5px; }
  #helpTable td:first-child { color: var(--dim);
    font-family: ui-monospace, monospace; font-size: 11.5px;
    white-space: nowrap; }
  .prow { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .prow > span:first-child { color: var(--dim); width: 52px; flex: none; }
  .prow .nm { flex: 1; cursor: pointer; padding: 2px 6px; margin-left: -6px;
    border-radius: 5px; }
  .prow .nm:hover { background: #232931; color: #fff; }
  .prow.sel .nm { color: #8cbaff; background: rgba(74,140,255,.1); }
  .prow .val { color: var(--dim); font-variant-numeric: tabular-nums;
    width: 34px; text-align: right; flex: none; }
  .prow .del { color: var(--faint); cursor: pointer; padding: 0 3px;
    border-radius: 4px; flex: none; font-size: 14px; line-height: 1; }
  .prow .del:hover { color: var(--err); background: rgba(229,100,78,.12); }
  #marquee { position: fixed; border: 1px dashed var(--accent);
    background: rgba(74,140,255,.08); display: none; z-index: 5;
    pointer-events: none; }
  input[type=range] { flex: 1; min-width: 0; accent-color: var(--accent);
    height: 14px; }
  input[type=color] { width: 100%; height: 24px; padding: 0; border: none;
    background: none; cursor: pointer; }
  input[type=checkbox] { accent-color: var(--accent); }
  .panel button { background: #232931; color: var(--txt);
    border: 1px solid var(--line2); border-radius: 6px; padding: 5px 10px;
    cursor: pointer; font-size: 12px; }
  .panel button:hover { background: #2b323b; }
  .hint { color: var(--faint); font-size: 11.5px; margin: 2px 0 0; }

  /* ---- misc chrome ---- */
  #stats { position: fixed; bottom: 10px; left: 12px; color: var(--faint);
    font-size: 11.5px; font-variant-numeric: tabular-nums; z-index: 10;
    user-select: none; }
  #err { position: fixed; left: 12px; right: 256px; bottom: 12px;
    max-height: 45%; overflow: auto; background: #2a1416;
    border: 1px solid #5a2126; color: #ffb4b4; padding: 10px;
    border-radius: 8px; white-space: pre-wrap; display: none; z-index: 20;
    font-family: ui-monospace, monospace; font-size: 11.5px; }

  /* ---- modal ---- */
  #modalWrap { position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 30; }
  #modalWrap.show { display: flex; }
  #modal { background: var(--panel); border: 1px solid var(--line2);
    border-radius: 12px; padding: 18px 20px; max-width: 380px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  #modalMsg { margin-bottom: 14px; color: var(--txt); }
  #modalBtns { display: flex; gap: 8px; justify-content: flex-end; }
  #modalBtns button { background: #232931; color: var(--txt);
    border: 1px solid var(--line2); border-radius: 7px; padding: 6px 13px;
    cursor: pointer; }
  #modalBtns button:hover { background: #2b323b; }
  #modalBtns button.primary { background: var(--accent2);
    border-color: #4a6a9c; }
  #modalBtns button.danger { border-color: #6a3a3a; color: #ffb4b4; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="topbar">
  <span id="brand">Model Editor</span>
  <div class="spacer"></div>
  <span id="statusChip"><span class="dot"></span><span id="status">Loading…</span></span>
  <span id="dirtyChip"><span id="dirtyText"></span><a id="discard">discard</a></span>
  <button class="bar primary" id="save">Save</button>
</div>

<div id="rail">
  <button data-tool="select" title="Select — drag a box to multi-select (1)">
    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1" stroke-dasharray="3.5 3"/></svg>
    <span class="lbl">Select</span><kbd>1</kbd></button>
  <button data-tool="translate" class="on" title="Move the selection (2)">
    <svg viewBox="0 0 24 24"><path d="M12 3v18M3 12h18M12 3l-2.5 2.5M12 3l2.5 2.5M12 21l-2.5-2.5M12 21l2.5-2.5M3 12l2.5-2.5M3 12l2.5 2.5M21 12l-2.5-2.5M21 12l-2.5 2.5"/></svg>
    <span class="lbl">Move</span><kbd>2</kbd></button>
  <button data-tool="rotate" title="Rotate the selection (3)">
    <svg viewBox="0 0 24 24"><path d="M20.5 11.5a8.5 8.5 0 1 1-2.6-6.1"/><path d="M21 2.5v4h-4"/></svg>
    <span class="lbl">Rotate</span><kbd>3</kbd></button>
  <button data-tool="scale" title="Scale the selection (4)">
    <svg viewBox="0 0 24 24"><path d="M14 3h7v7M10 21H3v-7M21 3l-8 8M3 21l8-8"/></svg>
    <span class="lbl">Scale</span><kbd>4</kbd></button>
  <div class="rule"></div>
  <button data-tool="sculpt" title="Sculpt a part's vertices (5)">
    <svg viewBox="0 0 24 24"><path d="M3 17c2.8 0 2.8-7 5.6-7s2.8 7 5.6 7 2.8-4 6.8-4"/></svg>
    <span class="lbl">Sculpt</span><kbd>5</kbd></button>
  <button data-tool="paint" title="Paint vertex colors on a part (6)">
    <svg viewBox="0 0 24 24"><path d="M10 12.5 18.5 4 22 7.5 13.5 16"/><path d="M10 12.5l-6 6c-1 1-1 2.6 0 3.5 1 1 2.6 1 3.5 0l6-6"/></svg>
    <span class="lbl">Paint</span><kbd>6</kbd></button>
  <div class="rule"></div>
  <button id="helpBtn" title="Shortcuts &amp; help (?)">
    <svg viewBox="0 0 24 24"><path d="M9 9a3 3 0 1 1 4.2 2.8c-1 .5-1.2 1-1.2 2.2"/><circle cx="12" cy="17.5" r=".5"/></svg>
    <span class="lbl">Help</span></button>
</div>

<div id="side">
  <div class="panel" id="selPanel" style="display:none">
    <h3><span class="chev">▼</span>Selection <span class="who" id="matName"></span></h3>
    <div class="body">
      <div class="prow"><span>color</span><input type="color" id="pcolor"></div>
      <div class="prow"><span>rough</span>
        <input type="range" id="prough" min="0" max="1" step="0.05">
        <span class="val" id="proughV"></span></div>
      <div class="prow"><span>metal</span>
        <input type="range" id="pmetal" min="0" max="1" step="0.05">
        <span class="val" id="pmetalV"></span></div>
      <div class="prow" style="margin-top:6px">
        <button id="resetNudges" style="flex:1"
          title="drop this selection's unsaved move/material nudges and recompose">
          Reset unsaved nudges</button></div>
    </div>
  </div>
  <div class="panel" id="sculptPanel" style="display:none">
    <h3><span class="chev">▼</span>Sculpt <span class="who" id="sculptName"></span></h3>
    <div class="body">
      <div class="prow"><span>radius</span>
        <input type="range" id="sradius" min="0.02" max="0.6" step="0.01" value="0.15">
        <span class="val" id="sradiusV">0.15</span></div>
      <div class="prow"><span>strength</span>
        <input type="range" id="sstrength" min="0.1" max="1" step="0.05" value="1">
        <span class="val" id="sstrengthV">1</span></div>
      <div class="prow"><span>mirror X</span>
        <input type="checkbox" id="smirror" checked></div>
      <div class="prow" style="margin-top:6px">
        <button id="sculptDiscard" style="flex:1">Discard strokes</button></div>
    </div>
  </div>
  <div class="panel" id="paintPanel" style="display:none">
    <h3><span class="chev">▼</span>Paint <span class="who" id="paintName"></span></h3>
    <div class="body">
      <div class="prow"><span>color</span><input type="color" id="bcolor" value="#e05548"></div>
      <div class="prow"><span>radius</span>
        <input type="range" id="bradius" min="0.02" max="0.6" step="0.01" value="0.15">
        <span class="val" id="bradiusV">0.15</span></div>
      <div class="prow"><span>opacity</span>
        <input type="range" id="bopacity" min="0.05" max="1" step="0.05" value="0.5">
        <span class="val" id="bopacityV">0.5</span></div>
      <div class="prow" style="margin-top:6px">
        <button id="paintDiscard" style="flex:1">Discard strokes</button></div>
    </div>
  </div>
  <div class="panel" id="partsPanel">
    <h3><span class="chev">▼</span>Parts</h3>
    <div class="body"><div id="parts"></div></div>
  </div>
</div>

<div id="hint">Loading…</div>

<div id="stats"></div>
<div id="marquee"></div>
<pre id="err"></pre>

<div id="modalWrap">
  <div id="modal">
    <div id="modalMsg"></div>
    <div id="modalBtns"></div>
  </div>
</div>

<script type="module">
// vendored three.js bundle: exports THREE as a namespace object, so every
// THREE.Xxx usage below keeps working unchanged.
import { THREE, OrbitControls, TransformControls, GLTFLoader } from '/template-assets/three.bundle.mjs';

// fused-render host bridge (window.fused). Absolute paths only:
//   TPL_DIR = abs dir of this template.html (trailing slash) — for sibling .mjs
//   PROJ    = abs .glbproj dir being edited (no trailing slash)
// `path` is the page's own render path — a reserved key the runtime does NOT
// surface via fused.params.get, so read it straight off the URL (as the
// reference viewer.html did) rather than through the fused param bridge.
const TPL_DIR = (() => { const p = new URLSearchParams(location.search).get('path') || ''; return p.slice(0, p.lastIndexOf('/') + 1); })();
const PROJ = fused.params.get('_file').replace(/\/+$/, '');
const OV_PATH = PROJ + '/overrides.json';   // unsaved tier (viewer-owned)
const PL_PATH = PROJ + '/placements.json';  // saved tier (viewer-owned)

// dynamic sibling-module imports: the page is served via /api/fs/raw?path=… so
// a static relative import can't resolve — fused.rawUrl builds the correct
// absolute sibling-file URL (modules live flat in the template dir).
const { bake: bakeGlb } = await import(fused.rawUrl(TPL_DIR + 'sculpt_bake.mjs'));
const { deltaToOverride, mergePlacement, blenderToThreeDelta } =
  await import(fused.rawUrl(TPL_DIR + 'placements.mjs'));

const $ = id => document.getElementById(id);
const canvas = $('canvas');
const statsEl = $('stats');
const errEl = $('err');

// status chip: kind = '' | 'ok' | 'busy' | 'err'
function setStatus(text, kind = '') {
  $('status').textContent = text;
  $('statusChip').className = kind;
}

// modal: ask(message, [{label, kind}, …]) -> Promise<label of clicked button>
function ask(message, buttons) {
  return new Promise(resolve => {
    $('modalMsg').textContent = message;
    const wrap = $('modalBtns');
    wrap.innerHTML = '';
    for (const b of buttons) {
      const btn = document.createElement('button');
      btn.textContent = b.label;
      if (b.kind) btn.className = b.kind;
      btn.addEventListener('click', () => {
        $('modalWrap').classList.remove('show');
        resolve(b.label);
      });
      wrap.append(btn);
    }
    $('modalWrap').classList.add('show');
  });
}

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111418);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 5000);
camera.position.set(5, 4, 6);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xffffff, 0x223344, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 2.0);
key.position.set(5, 8, 5);
scene.add(key);
scene.add(new THREE.GridHelper(20, 20, 0x333a42, 0x22272d));

let modelRoot = null;
const loader = new GLTFLoader();

// --- client-side compose state: the model is a set of frozen part GLBs listed
// in parts/manifest.json. Each part GLB is loaded once; modelRoot is composed
// from those pristine nodes with placements.json then overrides.json applied
// as sequential deltas. Every save/discard/nudge recomposes client-side —
// there is no server render step. ---
let partNames = [];                // manifest part names (last loaded)
const partAssets = new Map();      // name -> {node, pos, quat, scale} (pristine transform)
const meshOrigMaterial = new WeakMap();   // THREE.Mesh -> its un-edited material(s), for idempotent re-apply

// --- part selection & movement ---
// Parts are the top-level composed nodes. A click selects one; the gizmo edits
// it in the active tool's mode; deltas accumulate (Blender-space) into
// overrides.json (the unsaved tier), merged into placements.json on Save.
let selected = null;             // primary (last-clicked) part
let selection = [];              // all selected parts — shift-click multi-selects
let pivot = null;                // temp group the gizmo drives when 2+ selected
let overrides = {};              // partName -> {x,y,z,…} Blender-space deltas

async function loadOverrides() {
  try { overrides = JSON.parse(await fused.readFile(OV_PATH)) || {}; }
  catch { overrides = {}; }
  updateDirty();
}

// quaternion helpers (qMultiply, qNormalize, eulerDegToQuat) and the
// delta/merge math live in placements.mjs — imported above so the JS↔Python
// parity harness can exercise them without THREE/DOM. The functions here just
// pull plain numbers out of THREE objects and hand them to that module.

// Apply an absolute material edit (color [r,g,b] linear / roughness /
// metallic) to every mesh under a composed part node, cloning each mesh's
// material first. No-op (reverts to pristine) if `entry` carries none of the
// three keys. Color is set in LinearSRGBColorSpace to match GLTFLoader's own
// baseColorFactor parsing and the Blender-space `color` array (already linear).
//
// Recompose runs repeatedly against the SAME loaded mesh objects (no refetch on
// a pure placement/material save), so this always clones from `meshOrigMaterial`
// — the pristine material captured once at load — never from whatever's
// currently assigned. That makes a re-apply idempotent (removing a color
// override via discard correctly reverts to the original material instead of
// stacking clones or leaving a stale edit behind).
function applyMaterialOverrides(node, entry) {
  node.traverse(o => {
    if (!o.isMesh) return;
    const orig = meshOrigMaterial.get(o);
    if (!orig) return;
    if (entry.color == null && entry.roughness == null && entry.metallic == null) {
      o.material = orig;
      return;
    }
    const arr = Array.isArray(orig) ? orig : [orig];
    const cloned = arr.map(m => m.clone());
    for (const m of cloned) {
      if (entry.color != null && m.color)
        m.color.setRGB(entry.color[0], entry.color[1], entry.color[2], THREE.LinearSRGBColorSpace);
      if (entry.roughness != null && 'roughness' in m) m.roughness = entry.roughness;
      if (entry.metallic != null && 'metalness' in m) m.metalness = entry.metallic;
    }
    o.material = Array.isArray(orig) ? cloned : cloned[0];
  });
}

// partName -> {p, q, s} transform snapshot at GLB load / last persist
const baseXform = new Map();
const snap = o => ({ p: o.position.clone(), q: o.quaternion.clone(),
                     s: o.scale.clone() });
const savedMats = new Map();

const gizmo = new TransformControls(camera, canvas);
gizmo.setMode('translate');
gizmo.setSize(0.8);
scene.add(gizmo);
gizmo.addEventListener('dragging-changed', e => {
  controls.enabled = !e.value;
  if (!e.value) {   // drag ended -> persist
    saveMove().catch(err => {
      setStatus('Save failed: ' + (err.message || err), 'err');
    });
  }
});

// --- unified unsaved-changes indicator (toolbar chip + Save badge) ---
let sculptDirty = false;
function updateDirty() {
  const parts = Object.keys(overrides).length;
  const bits = [];
  if (parts) bits.push(`${parts} part${parts > 1 ? 's' : ''} moved`);
  if (sculptDirty) bits.push(sculpt ? sculpt.mode : 'sculpt');
  $('dirtyChip').classList.toggle('show', bits.length > 0);
  $('dirtyText').textContent = bits.length ? `unsaved: ${bits.join(' · ')}` : '';
}

// --- tools: Move/Rotate/Scale drive the gizmo, Sculpt opens a session ---
let tool = 'translate';
function markTool() {
  for (const b of document.querySelectorAll('#rail button[data-tool]'))
    b.classList.toggle('on', b.dataset.tool === tool);
  updateHint();
}

// contextual hint bar: one line telling the user what the current tool does
function updateHint() {
  const h = $('hint');
  if (sculpt) {
    h.textContent = sculpt.mode === 'paint'
      ? 'Drag on the surface to paint · off-mesh drags orbit · Save bakes into the asset · Esc exits'
      : 'Drag on the surface to grab vertices · off-mesh drags orbit · Save bakes into the asset · Esc exits';
  } else if (modelRoot && !modelRoot.children.length) {
    h.textContent = 'Empty project — drag a .glb file here to import';
  } else if (tool === 'select') {
    h.textContent = 'Drag a box to select parts · Shift extends · switch to Move/Rotate/Scale to transform';
  } else if (selection.length > 1) {
    h.textContent = `${selection.length} parts move as one — drag the gizmo · Shift-click edits the set · Esc deselects`;
  } else if (selection.length === 1) {
    h.textContent = 'Drag the gizmo — edits are unsaved until Save · Shift-click adds parts · Esc deselects';
  } else {
    h.textContent = 'Click a part to select · Shift-click adds · 1–6 switch tools · ? shortcuts';
  }
}

// collapsible inspector sections: click a panel header to fold it
for (const h3 of document.querySelectorAll('#side .panel h3'))
  h3.addEventListener('click', () =>
    h3.parentElement.classList.toggle('closed'));
async function setTool(next) {
  if (next === tool && next !== 'sculpt' && next !== 'paint') return;
  if (sculpt) {                       // leaving a session needs the dirty guard
    if (next === sculpt.mode) return;
    const g = await guardSculpt();
    if (!g) { markTool(); return; }
    // reload with the patched asset — recompose (bakeSculpt() already refreshed
    // the baked part's bytes in partAssets)
    if (g === 'baked') recompose();
  }
  if (next === 'sculpt' || next === 'paint') {
    const ok = await enterAssetSession(next);   // may refuse (no selection)
    if (!ok) { markTool(); return; }
    tool = next;
  } else {
    tool = next;
    if (next === 'translate' || next === 'rotate' || next === 'scale') gizmo.setMode(next);
    attachGizmo();
  }
  controls.enableRotate = tool !== 'select';   // Select: left-drag = marquee
  markTool();
}
for (const btn of document.querySelectorAll('#rail button[data-tool]'))
  btn.addEventListener('click', () => setTool(btn.dataset.tool));

const selPanel = $('selPanel');
const pcolor = $('pcolor');
const prough = $('prough');
const pmetal = $('pmetal');

function highlight(node) {
  node.traverse(o => {
    if (o.isMesh && o.material) {
      savedMats.set(o, o.material);
      const m = o.material.clone();   // clone: materials are shared across parts
      if (m.emissive) { m.emissive.setHex(0x3366ff); m.emissiveIntensity = 0.4; }
      o.material = m;
    }
  });
}

function dissolvePivot() {
  if (!pivot) return;
  gizmo.detach();
  for (const p of [...pivot.children]) modelRoot.attach(p);
  modelRoot.remove(pivot);
  pivot = null;
}

// 2+ parts move as a whole: a temp group at the selection's position centroid
// holds them (attach() keeps world transforms) and the gizmo drives the group;
// drag end dissolves it and persists each part's own delta.
function makePivot() {
  dissolvePivot();
  pivot = new THREE.Group();
  const c = new THREE.Vector3();
  for (const p of selection) c.add(p.position);
  pivot.position.copy(c.divideScalar(selection.length));
  modelRoot.add(pivot);
  pivot.updateMatrixWorld(true);
  for (const p of selection) pivot.attach(p);
  gizmo.attach(pivot);
}

function attachGizmo() {
  dissolvePivot();
  gizmo.detach();
  if (sculpt || tool === 'sculpt' || tool === 'paint' || tool === 'select'
      || !selection.length) return;
  if (selection.length === 1) gizmo.attach(selection[0]);
  else makePivot();
}

function setSelection(nodes) {
  dissolvePivot();
  for (const [o, m] of savedMats) o.material = m;   // un-highlight everything
  savedMats.clear();
  gizmo.detach();
  selection = nodes;
  selected = nodes[nodes.length - 1] || null;
  for (const n of selection) highlight(n);
  attachGizmo();
  if (selected) {
    let m = null;   // material inputs mirror the primary part
    selected.traverse(o => { if (!m && o.isMesh && savedMats.has(o)) m = savedMats.get(o); });
    if (m) {
      pcolor.value = '#' + m.color.getHexString();
      prough.value = m.roughness ?? 0.5;
      pmetal.value = m.metalness ?? 0;
      $('proughV').textContent = prough.value;
      $('pmetalV').textContent = pmetal.value;
    }
    $('matName').textContent = selection.length > 1
      ? `${selection.length} parts` : selected.name;
    selPanel.style.display = 'block';
  } else {
    selPanel.style.display = 'none';
  }
  markSelectedRow();
  updateHint();
}
function select(node) { setSelection(node ? [node] : []); }
function toggleSelect(node) {
  setSelection(selection.includes(node)
    ? selection.filter(n => n !== node) : [...selection, node]);
}

function entry(name) { return overrides[name] || (overrides[name] = {}); }

async function writeOverrides() {
  await fused.writeFile(OV_PATH, JSON.stringify(overrides, null, 2));
  updateDirty();
}

// --- undo/redo over unsaved placement + material nudges. History entries
// snapshot overrides.json plus the live transform/material state of the parts
// about to be mutated, so undo/redo replays in-memory — no recompose. Snapshots
// are only valid against the currently-loaded GLB, so both stacks are cleared
// wherever a recompose re-seeds baseXform. ---
const undoStack = [];
const redoStack = [];
const HISTORY_LIMIT = 50;

function captureMatEntry(part) {
  let mesh = null;
  part.traverse(o => { if (!mesh && o.isMesh && o.material) mesh = o; });
  const m = mesh && mesh.material;
  return m ? { color: m.color.clone(), roughness: m.roughness, metalness: m.metalness } : null;
}

function captureVisual(parts) {
  const visual = new Map();
  for (const part of parts) {
    visual.set(part.name, { p: part.position.clone(), q: part.quaternion.clone(),
                             s: part.scale.clone(), mat: captureMatEntry(part) });
  }
  return visual;
}

// like captureVisual, but reads the pre-drag baseline from baseXform instead
// of the live (already-dragged) transform — used by saveMove, where the
// gizmo has already mutated the object by the time drag-end fires.
function captureVisualFromBase(parts) {
  const visual = new Map();
  for (const part of parts) {
    const base = baseXform.get(part.name);
    if (!base) continue;
    visual.set(part.name, { p: base.p.clone(), q: base.q.clone(), s: base.s.clone(),
                             mat: captureMatEntry(part) });
  }
  return visual;
}

function pushHistory(snapshot) {
  undoStack.push(snapshot);
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
  redoStack.length = 0;
}

function clearHistory() { undoStack.length = 0; redoStack.length = 0; }

function restoreVisual(visual) {
  for (const [name, v] of visual) {
    const part = modelRoot.children.find(c => c.name === name);
    if (!part) continue;
    part.position.copy(v.p);
    part.quaternion.copy(v.q);
    part.scale.copy(v.s);
    if (v.mat) {
      part.traverse(o => {
        if (!o.isMesh || !o.material) return;
        for (const m of [savedMats.get(o), o.material]) {
          if (!m) continue;
          m.color.copy(v.mat.color);
          if ('roughness' in m) m.roughness = v.mat.roughness;
          if ('metalness' in m) m.metalness = v.mat.metalness;
        }
      });
    }
    baseXform.set(name, snap(part));
  }
  if (selected && visual.has(selected.name)) setSelection(selection);   // refresh sliders
}

function historyLabel(visual) {
  const names = [...visual.keys()];
  return names.length > 1 ? `${names.length} parts` : (names[0] || 'part');
}

function undo() {
  if (sculpt) { setStatus('No undo for sculpt strokes — use Discard'); return; }
  if (!undoStack.length) { setStatus('Nothing to undo'); return; }
  const entry = undoStack.pop();
  const restored = [...entry.visual.keys()].map(n => modelRoot.children.find(c => c.name === n)).filter(Boolean);
  redoStack.push({ overrides: structuredClone(overrides), visual: captureVisual(restored) });
  if (redoStack.length > HISTORY_LIMIT) redoStack.shift();
  overrides = entry.overrides;
  writeOverrides();
  restoreVisual(entry.visual);
  updateDirty();
  setStatus(`Undid move of ${historyLabel(entry.visual)}`);
}

function redo() {
  if (sculpt) { setStatus('No undo for sculpt strokes — use Discard'); return; }
  if (!redoStack.length) { setStatus('Nothing to redo'); return; }
  const entry = redoStack.pop();
  const restored = [...entry.visual.keys()].map(n => modelRoot.children.find(c => c.name === n)).filter(Boolean);
  undoStack.push({ overrides: structuredClone(overrides), visual: captureVisual(restored) });
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
  overrides = entry.overrides;
  writeOverrides();
  restoreVisual(entry.visual);
  updateDirty();
  setStatus(`Redid move of ${historyLabel(entry.visual)}`);
}

function accumulateDelta(part) {
  const base = baseXform.get(part.name);
  if (!base) return false;
  const dp = part.position.clone().sub(base.p);
  // world-frame premultiply delta: dq = part.quaternion * base.q^-1
  const dq = part.quaternion.clone().multiply(base.q.clone().invert());
  const ms = ['x', 'y', 'z'].map(a => base.s[a] ? part.scale[a] / base.s[a] : 1);
  const e = entry(part.name);
  const changed = deltaToOverride(e, {
    dp: { x: dp.x, y: dp.y, z: dp.z },
    dq: { x: dq.x, y: dq.y, z: dq.z, w: dq.w },
    ms,
  });
  if (!changed) return false;
  baseXform.set(part.name, snap(part));
  return true;
}

async function saveMove() {
  const grouped = !!pivot;
  const moved = grouped ? [...selection] : (selected ? [selected] : []);
  const preSnapshot = { overrides: structuredClone(overrides), visual: captureVisualFromBase(moved) };
  dissolvePivot();   // world transforms land back on each part
  let n = 0;
  for (const part of moved) if (accumulateDelta(part)) n++;
  if (grouped) makePivot();   // re-pivot at the new centroid for further drags
  if (!n) return;   // no-op drags don't pollute the undo stack
  pushHistory(preSnapshot);
  await writeOverrides();
  setStatus(moved.length > 1 ? `Moved ${n} parts` : `Moved ${moved[0].name}`);
}

// live material editing: this part gets its own materials (GLTF shares them
// across parts), values persist to the unsaved tier like moves do
let matTimer;
let matBurst = false;   // one history push per debounce burst, not per keystroke
function onMatInput() {
  if (!selection.length) return;
  if (!matBurst) {
    pushHistory({ overrides: structuredClone(overrides), visual: captureVisual(selection) });
    matBurst = true;
  }
  const c = new THREE.Color(pcolor.value);   // sRGB hex -> linear working space
  const rough = parseFloat(prough.value), metal = parseFloat(pmetal.value);
  $('proughV').textContent = prough.value;
  $('pmetalV').textContent = pmetal.value;
  for (const part of selection) {
    part.traverse(o => {
      if (!o.isMesh || !o.material) return;
      let own = savedMats.get(o);
      if (own && !own.userData.__owned) {
        own = own.clone();
        own.userData.__owned = true;
        savedMats.set(o, own);
      }
      for (const m of [own, o.material]) {
        if (!m) continue;
        m.color.copy(c);
        if ('roughness' in m) m.roughness = rough;
        if ('metalness' in m) m.metalness = metal;
      }
    });
    const e = entry(part.name);
    e.color = [+c.r.toFixed(4), +c.g.toFixed(4), +c.b.toFixed(4)];
    e.roughness = rough;
    e.metallic = metal;
  }
  clearTimeout(matTimer);
  matTimer = setTimeout(() => writeOverrides().then(
    () => { matBurst = false;
      setStatus(`Recolored ${selection.length > 1
        ? selection.length + ' parts' : selected?.name ?? ''}`); },
    err => { matBurst = false;
      setStatus('Save failed: ' + (err.message || err), 'err'); }), 300);
}
for (const el of [pcolor, prough, pmetal]) el.addEventListener('input', onMatInput);

// drop the selected parts' unsaved nudges (overrides tier only — saved
// placements are untouched) and recompose to snap them back
$('resetNudges').addEventListener('click', async () => {
  const names = selection.map(p => p.name).filter(n => overrides[n]);
  if (!names.length) { setStatus('No unsaved nudges on this selection'); return; }
  for (const n of names) delete overrides[n];
  await writeOverrides();
  setStatus(`Reset ${names.join(', ')}`);
  recompose();
});

const raycaster = new THREE.Raycaster();
let downAt = null;
canvas.addEventListener('pointerdown', e => { downAt = [e.clientX, e.clientY]; });
canvas.addEventListener('pointerup', e => {
  if (!downAt) return;
  const [dx, dy] = [e.clientX - downAt[0], e.clientY - downAt[1]];
  downAt = null;
  dbgLog.push(`up d=${dx},${dy} drag=${gizmo.dragging} axis=${gizmo.axis} root=${!!modelRoot}`);
  // only a click (not an orbit/gizmo drag) selects; gizmo.axis = on a handle
  if (sculpt || dx * dx + dy * dy > 25 || gizmo.dragging || gizmo.axis
      || !modelRoot) return;
  raycaster.setFromCamera(new THREE.Vector2(
    (e.clientX / canvas.clientWidth) * 2 - 1,
    -(e.clientY / canvas.clientHeight) * 2 + 1), camera);
  const hits = raycaster.intersectObject(modelRoot, true);
  if (!hits.length) { if (!e.shiftKey) select(null); return; }
  let node = hits[0].object;
  while (node.parent && node.parent !== modelRoot && node.parent !== pivot)
    node = node.parent;
  if (e.shiftKey) toggleSelect(node);
  else select(node);
});

// --- marquee box-select (Select tool): left-drag draws a screen rect; parts
// whose projected bbox intersects it are selected (shift extends). A <5px drag
// falls through to the click-select above. ---
const marqueeEl = $('marquee');
let marquee = null;
canvas.addEventListener('pointerdown', e => {
  if (tool !== 'select' || sculpt || e.button !== 0 || !modelRoot) return;
  marquee = { x: e.clientX, y: e.clientY, extend: e.shiftKey };
});
canvas.addEventListener('pointermove', e => {
  if (!marquee) return;
  Object.assign(marqueeEl.style, {
    display: 'block',
    left: Math.min(marquee.x, e.clientX) + 'px',
    top: Math.min(marquee.y, e.clientY) + 'px',
    width: Math.abs(e.clientX - marquee.x) + 'px',
    height: Math.abs(e.clientY - marquee.y) + 'px',
  });
});
canvas.addEventListener('pointerup', e => {
  if (!marquee) return;
  const m = marquee;
  marquee = null;
  marqueeEl.style.display = 'none';
  const dx = e.clientX - m.x, dy = e.clientY - m.y;
  if (dx * dx + dy * dy <= 25) return;   // click -> raycast select handles it
  marqueeSelect(Math.min(m.x, e.clientX), Math.min(m.y, e.clientY),
                Math.max(m.x, e.clientX), Math.max(m.y, e.clientY), m.extend);
});

function marqueeSelect(x0, y0, x1, y1, extend) {
  const picked = [];
  const v = new THREE.Vector3();
  for (const part of modelRoot.children) {
    if (!part.visible || part === pivot) continue;
    const box = new THREE.Box3().setFromObject(part);
    if (box.isEmpty()) continue;
    let mnx = Infinity, mny = Infinity, mxx = -Infinity, mxy = -Infinity;
    for (let i = 0; i < 8; i++) {   // project the bbox corners to the screen
      v.set(i & 1 ? box.max.x : box.min.x, i & 2 ? box.max.y : box.min.y,
            i & 4 ? box.max.z : box.min.z).project(camera);
      const sx = (v.x + 1) / 2 * canvas.clientWidth;
      const sy = (1 - v.y) / 2 * canvas.clientHeight;
      mnx = Math.min(mnx, sx); mxx = Math.max(mxx, sx);
      mny = Math.min(mny, sy); mxy = Math.max(mxy, sy);
    }
    if (mnx <= x1 && mxx >= x0 && mny <= y1 && mxy >= y0) picked.push(part);
  }
  setSelection(extend ? [...new Set([...selection, ...picked])] : picked);
  if (picked.length)
    setStatus(`Selected ${picked.length} part${picked.length > 1 ? 's' : ''}`);
}

addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.ctrlKey || e.metaKey) &&
      (e.key.toLowerCase() === 'z' || e.key.toLowerCase() === 'y')) {
    e.preventDefault();
    const wantRedo = e.key.toLowerCase() === 'y' ||
      (e.key.toLowerCase() === 'z' && e.shiftKey);
    if (wantRedo) redo(); else undo();
    return;
  }
  if (e.key === 'Escape') {
    if ($('modalWrap').classList.contains('show')) return;
    if (sculpt) setTool('translate');
    else select(null);
  }
  if (e.key === '?') { showHelp(); return; }
  const keyTool = { 1: 'select', 2: 'translate', 3: 'rotate', 4: 'scale',
                    5: 'sculpt', 6: 'paint' }[e.key];
  if (keyTool) setTool(keyTool);
});

// --- sculpt mode: grab brush on a part's own asset GLB. The current part is
// hidden and the asset is loaded in its place (so vertex indices match the file
// exactly); dragging on the surface grabs vertices within the brush radius with
// a smooth falloff, optionally X-mirrored. Save (toolbar) bakes mesh-local
// deltas client-side (sculpt_bake.mjs) and ships the patched .glb to
// sculpt_bake.py, which validates + overwrites the part file. ---
const sculptPanel = $('sculptPanel');
const sradius = $('sradius');
const sstrength = $('sstrength');
const smirror = $('smirror');
sradius.addEventListener('input', () => $('sradiusV').textContent = sradius.value);
sstrength.addEventListener('input', () => $('sstrengthV').textContent = sstrength.value);
const paintPanel = $('paintPanel');
const bcolor = $('bcolor');
const bradius = $('bradius');
const bopacity = $('bopacity');
bradius.addEventListener('input', () => $('bradiusV').textContent = bradius.value);
bopacity.addEventListener('input', () => $('bopacityV').textContent = bopacity.value);
const brushRadius = () =>
  parseFloat((sculpt && sculpt.mode === 'paint' ? bradius : sradius).value);
// {mode:'sculpt'|'paint', part, hidden, root,
//  meshes:[{mesh, orig, mirror, origCol?, painted?}]}
let sculpt = null;
let stroke = null;
let brushSizing = null;   // {slider, start, x, anchor} — right-drag resize
const brushCursor = new THREE.Mesh(
  new THREE.SphereGeometry(1, 16, 12),
  new THREE.MeshBasicMaterial({ wireframe: true, color: 0x66aaff,
    transparent: true, opacity: 0.35, depthTest: false }));
brushCursor.visible = false;
scene.add(brushCursor);

async function enterAssetSession(mode) {
  if (!selected) {
    setStatus(`Select a part first, then pick the ${mode === 'paint' ? 'Paint' : 'Sculpt'} tool`);
    return false;
  }
  const part = selected.name;
  let gltf, glbBytes;
  try {
    let url = fused.rawUrl(PROJ + '/parts/' + part + '.glb');
    url += (url.includes('?') ? '&' : '?') + 'v=' + Date.now();
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`${resp.status} loading ${part}.glb`);
    // keep the raw bytes: Save bakes strokes into THESE bytes client-side
    // (sculpt_bake.mjs), so the write is exactly what the session edited
    glbBytes = new Uint8Array(await resp.arrayBuffer());
    gltf = await loader.parseAsync(glbBytes.buffer.slice(0), '');
  } catch (err) {
    dbgLog.push('session load: ' + (err.message || err));
    setStatus(`Couldn't load ${part}.glb to ${mode}: ${err.message || err}`, 'err');
    return false;
  }
  const hidden = selected;
  select(null);
  hidden.visible = false;
  const root = gltf.scene;
  // align with the live part: placements/overrides move the part node, and
  // the asset file still has the original transform — copy the live one over
  const assetNode = root.getObjectByName(part);
  if (assetNode) {
    assetNode.position.copy(hidden.position);
    assetNode.quaternion.copy(hidden.quaternion);
    assetNode.scale.copy(hidden.scale);
  }
  scene.add(root);
  root.updateMatrixWorld(true);
  const meshes = [];
  root.traverse(o => {
    if (!o.isMesh) return;
    const arr = o.geometry.attributes.position.array;
    const orig = arr.slice();
    // mirror lookup: vertex i -> ALL indices at the x-negated position.
    // Seam/pole vertices are duplicated (UV split) — every duplicate must
    // move together or the mirrored side tears open.
    const key = (x, y, z) =>
      `${Math.round(x * 2000)},${Math.round(y * 2000)},${Math.round(z * 2000)}`;
    const lut = new Map();
    for (let i = 0; i < arr.length / 3; i++) {
      const k = key(arr[i * 3], arr[i * 3 + 1], arr[i * 3 + 2]);
      (lut.get(k) || lut.set(k, []).get(k)).push(i);
    }
    const mirror = [];
    for (let i = 0; i < arr.length / 3; i++)
      mirror.push(lut.get(
        key(-arr[i * 3], arr[i * 3 + 1], arr[i * 3 + 2])) || []);
    const entry = { mesh: o, orig, mirror };
    if (mode === 'paint') {
      // painted colors show literally: the flat base color moves into a
      // float-RGB vertex layer and the material base goes white
      const g = o.geometry;
      const n = g.attributes.position.count;
      let col = g.getAttribute('color');
      if (!col || col.itemSize < 3 || !(col.array instanceof Float32Array)) {
        const carr = new Float32Array(n * 3);
        const base = (o.material && o.material.color) || new THREE.Color(1, 1, 1);
        for (let i = 0; i < n; i++) {
          carr[i * 3] = col ? col.getX(i) : base.r;
          carr[i * 3 + 1] = col ? col.getY(i) : base.g;
          carr[i * 3 + 2] = col ? col.getZ(i) : base.b;
        }
        col = new THREE.BufferAttribute(carr, 3);
        g.setAttribute('color', col);
      }
      o.material.vertexColors = true;
      o.material.color.set(1, 1, 1);
      o.material.needsUpdate = true;
      entry.origCol = col.array.slice();
      entry.painted = false;
    }
    meshes.push(entry);
  });
  sculpt = { mode, part, hidden, root, meshes, glbBytes };
  gizmo.detach();
  if (mode === 'paint') {
    $('paintName').textContent = part;
    paintPanel.style.display = 'block';
    setStatus(`Painting ${part} — drag on the surface`);
  } else {
    $('sculptName').textContent = part;
    sculptPanel.style.display = 'block';
    setStatus(`Sculpting ${part} — drag on the surface to grab`);
  }
  return true;
}

function exitSculpt(restore) {
  if (!sculpt) return;
  if (restore) {
    for (const { mesh, orig } of sculpt.meshes) {
      mesh.geometry.attributes.position.array.set(orig);
      mesh.geometry.attributes.position.needsUpdate = true;
    }
  }
  scene.remove(sculpt.root);
  sculpt.hidden.visible = true;
  sculpt = null;
  stroke = null;
  sculptDirty = false;
  brushCursor.visible = false;
  sculptPanel.style.display = 'none';
  paintPanel.style.display = 'none';
  if (tool === 'sculpt' || tool === 'paint') {
    tool = 'translate';
    gizmo.setMode('translate');
  }
  markTool();
  updateDirty();
}

// dirty-stroke guard for anything that would destroy an unsaved sculpt
// (tool switch, discard). Resolves truthy when safe to proceed — 'baked' when
// it saved the strokes, so callers that don't recompose anyway know to trigger
// one.
async function guardSculpt() {
  if (!sculpt || !sculptDirty) { exitSculpt(false); return true; }
  const a = await ask(`You have unsaved ${sculpt.mode} strokes.`, [
    { label: 'Save to asset', kind: 'primary' },
    { label: 'Discard', kind: 'danger' },
    { label: 'Keep sculpting' }]);
  if (a === 'Save to asset') {
    try { await bakeSculpt(); } catch (err) { showError(err); return false; }
    return 'baked';
  }
  if (a === 'Discard') { exitSculpt(true); return true; }
  return false;
}

function sculptRay(e) {
  raycaster.setFromCamera(new THREE.Vector2(
    (e.clientX / canvas.clientWidth) * 2 - 1,
    -(e.clientY / canvas.clientHeight) * 2 + 1), camera);
  const hits = raycaster.intersectObjects(
    sculpt.meshes.map(m => m.mesh), false);
  return hits[0] || null;
}

// paint brush: blend vertex colors toward the brush color with the sculpt
// falloff × opacity, per pointer event (airbrush accumulation)
function paintAt(hit) {
  const entry = sculpt.meshes.find(m => m.mesh === hit.object);
  if (!entry || !entry.origCol) return;
  const mesh = entry.mesh;
  const inv = mesh.matrixWorld.clone().invert();
  const c = hit.point.clone().applyMatrix4(inv);
  const ws = mesh.getWorldScale(new THREE.Vector3());
  const lr = parseFloat(bradius.value) / ((ws.x + ws.y + ws.z) / 3 || 1);
  const op = parseFloat(bopacity.value);
  const bc = new THREE.Color(bcolor.value);   // sRGB hex -> linear working space
  const pos = mesh.geometry.attributes.position.array;
  const col = mesh.geometry.attributes.color;
  let any = false;
  for (let i = 0; i < pos.length / 3; i++) {
    const d = Math.hypot(pos[i * 3] - c.x, pos[i * 3 + 1] - c.y,
                         pos[i * 3 + 2] - c.z);
    if (d > lr) continue;
    const t = d / lr, w = (1 - t * t) ** 2 * op;
    col.array[i * 3] += (bc.r - col.array[i * 3]) * w;
    col.array[i * 3 + 1] += (bc.g - col.array[i * 3 + 1]) * w;
    col.array[i * 3 + 2] += (bc.b - col.array[i * 3 + 2]) * w;
    any = true;
  }
  if (any) { col.needsUpdate = true; entry.painted = true; }
}

// right-drag anywhere on the canvas resizes the brush (horizontal motion);
// the wireframe cursor sphere previews the new footprint at the anchor point
canvas.addEventListener('pointerdown', e => {
  if (!sculpt || e.button !== 2 || stroke) return;
  const slider = sculpt.mode === 'paint' ? bradius : sradius;
  const hit = sculptRay(e);
  brushSizing = { slider, start: parseFloat(slider.value), x: e.clientX,
                  anchor: hit ? hit.point.clone() : null };
  controls.enabled = false;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('contextmenu', e => {
  if (sculpt) e.preventDefault();         // right-drag is brush resize here
});

canvas.addEventListener('pointerdown', e => {
  if (!sculpt || e.button !== 0 || brushSizing) return;
  const hit = sculptRay(e);
  if (!hit) return;                       // off the mesh -> orbit as usual
  controls.enabled = false;
  canvas.setPointerCapture(e.pointerId);
  if (sculpt.mode === 'paint') {
    stroke = { paint: true };
    paintAt(hit);
    return;
  }
  const entry = sculpt.meshes.find(m => m.mesh === hit.object);
  const mesh = entry.mesh;
  const inv = mesh.matrixWorld.clone().invert();
  const center = hit.point.clone().applyMatrix4(inv);
  const ws = mesh.getWorldScale(new THREE.Vector3());
  const lr = parseFloat(sradius.value) / ((ws.x + ws.y + ws.z) / 3 || 1);
  const pos = mesh.geometry.attributes.position.array;
  const verts = new Map();                // index -> {w, flip}
  for (let i = 0; i < pos.length / 3; i++) {
    const d = Math.hypot(pos[i * 3] - center.x, pos[i * 3 + 1] - center.y,
                         pos[i * 3 + 2] - center.z);
    if (d > lr) continue;
    const t = d / lr;
    verts.set(i, { w: (1 - t * t) ** 2, flip: false });
  }
  if (smirror.checked) {
    for (const [i, v] of [...verts]) {
      for (const m of entry.mirror[i]) {
        if (m === i) continue;
        if (!verts.has(m) || verts.get(m).w < v.w)
          verts.set(m, { w: v.w, flip: true });
      }
    }
    // a vertex on the mirror plane is its own mirror — pin its x
    for (const [i, v] of verts)
      if (entry.mirror[i].includes(i)) v.clampX = true;
  }
  stroke = {
    mesh, verts,
    startPos: pos.slice(),                // strokes accumulate
    start: hit.point.clone(),
    plane: new THREE.Plane().setFromNormalAndCoplanarPoint(
      camera.getWorldDirection(new THREE.Vector3()), hit.point),
    m3: new THREE.Matrix3().setFromMatrix4(inv),
  };
});

canvas.addEventListener('pointermove', e => {
  if (!sculpt) return;
  if (brushSizing) {                      // right-drag: resize the brush
    const s = brushSizing.slider;
    const r = Math.min(parseFloat(s.max), Math.max(parseFloat(s.min),
      brushSizing.start + (e.clientX - brushSizing.x) * 0.002));
    s.value = r.toFixed(2);
    s.dispatchEvent(new Event('input'));  // syncs the panel's value label
    if (brushSizing.anchor) {
      brushCursor.position.copy(brushSizing.anchor);
      brushCursor.scale.setScalar(brushRadius());
      brushCursor.visible = true;
    }
    return;
  }
  if (!stroke) {                          // hover: show the brush footprint
    const hit = sculptRay(e);
    brushCursor.visible = !!hit;
    if (hit) {
      brushCursor.position.copy(hit.point);
      brushCursor.scale.setScalar(brushRadius());
    }
    return;
  }
  if (stroke.paint) {
    const hit = sculptRay(e);
    if (hit) {
      paintAt(hit);
      brushCursor.position.copy(hit.point);
      brushCursor.scale.setScalar(brushRadius());
      brushCursor.visible = true;
    }
    return;
  }
  raycaster.setFromCamera(new THREE.Vector2(
    (e.clientX / canvas.clientWidth) * 2 - 1,
    -(e.clientY / canvas.clientHeight) * 2 + 1), camera);
  const p = new THREE.Vector3();
  if (!raycaster.ray.intersectPlane(stroke.plane, p)) return;
  const ld = p.sub(stroke.start).applyMatrix3(stroke.m3);  // world -> local
  const s = parseFloat(sstrength.value);
  const attr = stroke.mesh.geometry.attributes.position;
  for (const [i, { w, flip, clampX }] of stroke.verts) {
    const f = w * s;
    attr.array[i * 3] = stroke.startPos[i * 3]
      + (clampX ? 0 : f * (flip ? -ld.x : ld.x));
    attr.array[i * 3 + 1] = stroke.startPos[i * 3 + 1] + f * ld.y;
    attr.array[i * 3 + 2] = stroke.startPos[i * 3 + 2] + f * ld.z;
  }
  attr.needsUpdate = true;
  stroke.mesh.geometry.computeVertexNormals();
});

canvas.addEventListener('pointerup', () => {
  if (brushSizing) {
    brushSizing = null;
    controls.enabled = true;
    return;
  }
  if (!stroke) return;
  if (!stroke.paint) {
    stroke.mesh.geometry.computeBoundingSphere();  // keep raycasts accurate
    stroke.mesh.geometry.computeBoundingBox();
  }
  const painted = stroke.paint;
  stroke = null;
  controls.enabled = true;
  sculptDirty = true;
  updateDirty();
  setStatus(painted ? 'Painted — Save bakes vertex colors into the asset'
                    : 'Sculpt edited — Save bakes it into the asset');
});

$('paintDiscard').addEventListener('click', () => {
  if (!sculpt || sculpt.mode !== 'paint') return;
  for (const m of sculpt.meshes) {
    if (!m.origCol) continue;
    m.mesh.geometry.attributes.color.array.set(m.origCol);
    m.mesh.geometry.attributes.color.needsUpdate = true;
    m.painted = false;
  }
  sculptDirty = false;
  updateDirty();
  setStatus('Paint discarded — still painting');
});

$('sculptDiscard').addEventListener('click', () => {
  if (!sculpt) return;
  for (const { mesh, orig } of sculpt.meshes) {
    mesh.geometry.attributes.position.array.set(orig);
    mesh.geometry.attributes.position.needsUpdate = true;
    mesh.geometry.computeVertexNormals();
    mesh.geometry.computeBoundingSphere();
    mesh.geometry.computeBoundingBox();
  }
  sculptDirty = false;
  updateDirty();
  setStatus('Strokes discarded — still sculpting');
});

// diff changed vertices into mesh-local deltas, bake them into the session's
// GLB bytes client-side (sculpt_bake.mjs), and ship the patched bytes to
// sculpt_bake.py which validates + writes the asset file. Exits sculpt on
// success; caller triggers the recompose.
async function bakeSculpt() {
  if (!sculpt) return;
  const mode = sculpt.mode;
  const nodes = {};
  let n = 0;
  if (mode === 'paint') {
    // painted meshes send their FULL color array + base_white — the GLB may
    // have no COLOR_0 yet, so a sparse diff can't express the base-color init
    for (const { mesh, painted } of sculpt.meshes) {
      if (!painted) continue;
      const col = mesh.geometry.attributes.color;
      const colors = [];
      for (let i = 0; i < col.count; i++)
        colors.push([+col.getX(i).toFixed(4), +col.getY(i).toFixed(4),
                     +col.getZ(i).toFixed(4)]);
      nodes[mesh.name] = { colors, base_white: true };
      n += col.count;
    }
  } else {
    for (const { mesh, orig } of sculpt.meshes) {
      const arr = mesh.geometry.attributes.position.array;
      const indices = [], deltas = [];
      for (let i = 0; i < arr.length / 3; i++) {
        const dx = arr[i * 3] - orig[i * 3], dy = arr[i * 3 + 1] - orig[i * 3 + 1],
              dz = arr[i * 3 + 2] - orig[i * 3 + 2];
        if (dx * dx + dy * dy + dz * dz < 1e-12) continue;
        indices.push(i);
        deltas.push([+dx.toFixed(5), +dy.toFixed(5), +dz.toFixed(5)]);
      }
      if (indices.length) { nodes[mesh.name] = { indices, deltas }; n += indices.length; }
    }
  }
  if (!n) { exitSculpt(false); return; }
  setStatus(`Baking ${mode} into asset…`, 'busy');
  const { bytes } = bakeGlb(sculpt.glbBytes, { nodes });
  const res = await fused.runPython('./sculpt_bake.py',
    { model_dir: PROJ, part: sculpt.part, data_b64: b64FromBuffer(bytes) });
  if (res.error) throw new Error(res.error);   // saveAll shows it; strokes stay
  // the part's GLB just changed on disk — refresh THIS part's loaded asset
  // (rather than a full model reload). Caller recomposes after.
  partAssets.set(sculpt.part, await fetchPartAsset(sculpt.part, Date.now()));
  exitSculpt(false);
  setStatus(`${mode === 'paint' ? 'Paint' : 'Sculpt'} baked into ${res.path} (${n} verts)`, 'ok');
}

// --- drag-and-drop .glb import: a dropped file is transformed CLIENT-SIDE by
// import_part.mjs (material split, fit-to-height/pivot normalization, node-tree
// flatten). project_ops.write_part is a dumb validated writer: no bpy, just the
// trust-boundary checks + parts/manifest commit ---
function b64FromBuffer(buf) {
  const bytes = new Uint8Array(buf);
  let bin = '';
  for (let i = 0; i < bytes.length; i += 0x8000)
    bin += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
  return btoa(bin);
}

addEventListener('dragover', e => e.preventDefault());
addEventListener('drop', async e => {
  e.preventDefault();
  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if (!file) return;
  if (!/\.glb$/i.test(file.name)) {
    setStatus('Only .glb files can be dropped', 'err');
    return;
  }
  try {
    setStatus(`Importing ${file.name}…`, 'busy');
    // import_part.mjs vendors the gltf-transform bundle itself; import it lazily
    const { importPart } = await import(fused.rawUrl(TPL_DIR + 'import_part.mjs'));
    const bytes = new Uint8Array(await file.arrayBuffer());
    const { parts } = await importPart(bytes, file.name.replace(/\.glb$/i, ''), partNames.slice());

    const imported = [];
    for (const part of parts) {
      const data_b64 = b64FromBuffer(part.glbBytes);
      const res = await fused.runPython('./project_ops.py', {
        action: 'write_part', model_dir: PROJ, name: part.name, data_b64 });
      if (res.error) { setStatus(res.error, 'err'); return; }
      imported.push(res.part);
    }
    await loadModel();   // re-read manifest + recompose with the new parts
    setStatus(imported.length > 1
      ? `Imported ${imported.length} parts: ${imported.join(', ')}`
      : `Imported ${imported[0]}`, 'ok');
  } catch (err) {
    showError(err);
  }
});

// --- parts panel: click name = select, checkbox = session visibility,
// × = soft delete (GLB moves to .trash/, manifest + placement entries stripped)
const partsEl = $('parts');

async function deletePart(name) {
  const a = await ask(
    `Delete ${name}? Its GLB moves to .trash/ and can be restored by hand.`,
    [{ label: 'Delete', kind: 'danger' }, { label: 'Cancel' }]);
  if (a !== 'Delete') return;
  setStatus(`Deleting ${name}…`, 'busy');
  const res = await fused.runPython('./project_ops.py',
    { action: 'delete_part', model_dir: PROJ, name });
  if (res.error) { setStatus(res.error, 'err'); return; }
  if (selection.some(p => p.name === name)) select(null);
  delete overrides[name];   // its entry was stripped on disk too
  updateDirty();
  await loadModel();        // re-read manifest + recompose without the part
  setStatus(`Deleted ${name} (recoverable from ${res.trash})`, 'ok');
}

function buildPartsPanel() {
  partsEl.innerHTML = '';
  if (!modelRoot) return;
  if (!modelRoot.children.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No parts yet — drag a .glb here to import.';
    partsEl.append(empty);
    return;
  }
  for (const c of modelRoot.children) {
    const row = document.createElement('div');
    row.className = 'prow';
    row.dataset.name = c.name;
    const badge = document.createElement('span');
    badge.className = 'badge frozen';
    badge.textContent = '✳';
    badge.title = 'a GLB part asset (sculpt/paint-able)';
    row.append(badge);
    const nm = document.createElement('span');
    nm.className = 'nm';
    nm.textContent = c.name;
    nm.addEventListener('click', e => {
      if (!sculpt) (e.shiftKey ? toggleSelect(c) : select(c));
    });
    const eye = document.createElement('input');
    eye.type = 'checkbox';
    eye.checked = c.visible;
    eye.title = 'visible (this session only)';
    eye.addEventListener('change', () => {
      c.visible = eye.checked;
      if (!eye.checked && selection.includes(c)) toggleSelect(c);
    });
    row.append(nm, eye);
    const del = document.createElement('span');
    del.className = 'del';
    del.textContent = '×';
    del.title = 'delete part (GLB moves to .trash/)';
    del.addEventListener('click', () => deletePart(c.name));
    row.append(del);
    partsEl.append(row);
  }
  markSelectedRow();
}
function markSelectedRow() {
  for (const row of partsEl.children)
    row.classList.toggle('sel',
      selection.some(p => row.dataset.name === p.name));
}

// debug handle for driving/inspecting the editor from the console
window.__dbg = {
  select, toggleSelect, saveMove, gizmo, camera, enterAssetSession, exitSculpt,
  setTool, saveAll, paintAt, marqueeSelect, undo, redo, recompose, loadModel,
  get sculpt() { return sculpt; },
  get sculptDirty() { return sculptDirty; },
  get tool() { return tool; },
  get root() { return modelRoot; },
  get selected() { return selected; },
  get selection() { return selection; },
  get pivot() { return pivot; },
  get overrides() { return overrides; },
  get parts() { return modelRoot ? modelRoot.children.map(c => c.name) : []; },
  get log() { return dbgLog; },
  get undoStack() { return undoStack; },
  get redoStack() { return redoStack; },
};
const dbgLog = [];

// merge unsaved nudges into placements.json — the saved tier, applied on every
// recompose, survives discard, committed to git
async function savePlacements() {
  let placements = {};
  try { placements = JSON.parse(await fused.readFile(PL_PATH)) || {}; }
  catch { placements = {}; }
  for (const [name, d] of Object.entries(overrides))
    placements[name] = mergePlacement(placements[name] || {}, d);
  await fused.writeFile(PL_PATH, JSON.stringify(placements, null, 2));
  overrides = {};
  await fused.writeFile(OV_PATH, '{}');
  updateDirty();
}

// Save persists EVERYTHING unsaved: active sculpt strokes bake into the part's
// asset GLB, placement/material nudges merge into placements.json, then
// recompose picks up both.
async function saveAll() {
  const hasMoves = Object.keys(overrides).length > 0;
  const hasSculpt = sculpt && sculptDirty;
  if (!hasMoves && !hasSculpt) { setStatus('Nothing to save', 'ok'); return; }
  try {
    if (hasSculpt) await bakeSculpt();
    if (hasMoves) await savePlacements();
    await recompose();
    setStatus('Saved', 'ok');
  } catch (err) {
    showError(err);
  }
}
$('save').addEventListener('click', saveAll);

$('discard').addEventListener('click', async () => {
  const parts = Object.keys(overrides).length;
  const bits = [];
  if (parts) bits.push(`${parts} moved part${parts > 1 ? 's' : ''}`);
  if (sculptDirty) bits.push('the sculpt strokes');
  const a = await ask(`Discard ${bits.join(' and ')}? This can't be undone.`, [
    { label: 'Discard', kind: 'danger' }, { label: 'Cancel' }]);
  if (a !== 'Discard') return;
  if (sculpt) exitSculpt(true);
  overrides = {};
  await fused.writeFile(OV_PATH, '{}');
  updateDirty();
  // only overrides.json changed on disk — recompose snaps parts back to their
  // pristine transform + saved placements.json.
  recompose();
});

function showError(err) {
  setStatus('Error', 'err');
  errEl.style.display = 'block';
  errEl.textContent = err.traceback || err.message || String(err);
}

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

(function tick() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
})();

let autoDist = 6;

function frame(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  if (box.isEmpty()) {   // empty project — no geometry to frame yet
    controls.target.set(0, 0.5, 0);
    autoDist = 6;
    camera.near = 0.01;
    camera.far = 5000;
    camera.updateProjectionMatrix();
    applyCamera();
    return;
  }
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  // orbit the origin column, not the bbox center — models stand on the
  // origin, and one-sided extras would skew the framing
  controls.target.set(0, center.y, 0);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  autoDist = maxDim * 2.2;
  camera.near = maxDim / 100;
  camera.far = maxDim * 100;
  camera.updateProjectionMatrix();
  applyCamera();
}

// Camera state rides in URL params (az/el in degrees, dist in world units) so
// a refreshed/bookmarked URL reproduces the exact view. az=0 faces the model's
// front (glTF +Z).
function num(k, fallback) {
  const v = parseFloat(fused.params.get(k));
  return Number.isFinite(v) ? v : fallback;
}

function applyCamera() {
  const az = num('az', 30) * Math.PI / 180;
  const el = num('el', 18) * Math.PI / 180;
  const d = num('dist', autoDist);
  const t = controls.target;
  camera.position.set(
    t.x + d * Math.cos(el) * Math.sin(az),
    t.y + d * Math.sin(el),
    t.z + d * Math.cos(el) * Math.cos(az));
  controls.update();
}

controls.addEventListener('end', () => {
  const v = camera.position.clone().sub(controls.target);
  const d = v.length();
  fused.params.set('az', String(Math.round(Math.atan2(v.x, v.z) * 180 / Math.PI)));
  fused.params.set('el', String(Math.round(Math.asin(v.y / d) * 180 / Math.PI)));
  fused.params.set('dist', d.toFixed(2));
});

function updateStats() {
  if (!modelRoot || !modelRoot.children.length) { statsEl.textContent = ''; return; }
  let objects = 0, meshes = 0, tris = 0;
  modelRoot.traverse(o => {
    objects++;
    if (o.isMesh && o.geometry) {
      meshes++;
      const g = o.geometry;
      const count = g.index ? g.index.count : g.attributes.position.count;
      tris += count / 3;
    }
  });
  statsEl.textContent = `${objects} obj · ${meshes} mesh · ${Math.round(tris)} tris`;
}

// Fetch + parse one part's GLB bytes and return its pristine (as-authored)
// transform snapshot — the baseline every recompose resets to before
// re-applying placements/overrides, so repeated recomposes against the same
// loaded node are idempotent (no drift from re-adding deltas onto an
// already-moved node). `cacheBust` busts the browser cache; callers pass
// Date.now() so a freshly-written part file is refetched.
async function fetchPartAsset(name, cacheBust) {
  let purl = fused.rawUrl(PROJ + '/parts/' + name + '.glb');
  purl += (purl.includes('?') ? '&' : '?') + 'v=' + cacheBust;
  const bytes = await (await fetch(purl)).arrayBuffer();
  const gltf = await loader.parseAsync(bytes, '');
  // each part GLB's root node is the part itself (named <name>, .extras.part_root)
  const node = gltf.scene.getObjectByName(name) || gltf.scene.children[0];
  node.traverse(o => { if (o.isMesh) meshOrigMaterial.set(o, o.material); });
  return { node, pos: node.position.clone(), quat: node.quaternion.clone(),
           scale: node.scale.clone() };
}

// Load/refresh a set of parts into `partAssets` (in place — entries not in this
// batch are left untouched). Skips a part whose placements.json entry is
// `hidden: true`.
async function loadPartAssets(names, placements, cacheBust) {
  await Promise.all(names.map(async name => {
    if ((placements[name] || {}).hidden) return;
    partAssets.set(name, await fetchPartAsset(name, cacheBust));
  }));
}

// Rebuild modelRoot from whatever's currently in `partAssets` + the given
// placement tiers — no refetch. Resets each node to its pristine transform
// first (idempotent across repeated calls), applies placements.json then
// overrides.json as sequential deltas (mirroring apply_overrides's tier order),
// then the effective material entry (last-tier-wins per key). Re-seeds
// baseXform/history and the parts panel.
function composeFromAssets(placements, overrides) {
  select(null);
  if (modelRoot) scene.remove(modelRoot);
  modelRoot = new THREE.Group();
  for (const [name, asset] of partAssets) {
    const pl = placements[name] || {};
    if (pl.hidden) continue;
    const { node } = asset;
    node.position.copy(asset.pos);
    node.quaternion.copy(asset.quat);
    node.scale.copy(asset.scale);
    const tiers = [pl, overrides[name] || {}];
    for (const tier of tiers) {
      const { dp, dq, ms } = blenderToThreeDelta(tier);
      node.position.add(new THREE.Vector3(dp.x, dp.y, dp.z));
      if (Math.abs(Math.abs(dq.w) - 1) > 1e-9)
        node.quaternion.premultiply(new THREE.Quaternion(dq.x, dq.y, dq.z, dq.w));
      node.scale.set(node.scale.x * ms[0], node.scale.y * ms[1], node.scale.z * ms[2]);
    }
    const matEntry = {};
    for (const tier of tiers) {
      if (tier.color != null) matEntry.color = tier.color;
      if (tier.roughness != null) matEntry.roughness = tier.roughness;
      if (tier.metallic != null) matEntry.metallic = tier.metallic;
    }
    applyMaterialOverrides(node, matEntry);
    modelRoot.add(node);
  }
  scene.add(modelRoot);
  baseXform.clear();
  clearHistory();   // undo/redo snapshots don't survive a recompose either
  for (const c of modelRoot.children) baseXform.set(c.name, snap(c));
  buildPartsPanel();
  frame(modelRoot);
  updateStats();
  updateHint();
}

// Re-read placements.json (overrides is already in memory) and recompose —
// the no-refetch path for a pure placement/material change (Save, discard,
// Reset unsaved nudges).
async function recompose() {
  let placements = {};
  try { placements = JSON.parse(await fused.readFile(PL_PATH)) || {}; }
  catch { placements = {}; }
  composeFromAssets(placements, overrides);
}

// Full (re)load: scaffold the project (info also guarantees an empty .glbproj
// dir works), read the manifest, fetch every part GLB, then compose. Every
// part is a frozen GLB asset here — there is no procedural/render tier.
async function loadModel() {
  exitSculpt(false);   // a reload replaces the scene the sculpt overlays
  errEl.style.display = 'none';
  setStatus('Loading…', 'busy');
  try {
    const info = await fused.runPython('./project_ops.py',
      { action: 'info', model_dir: PROJ });
    if (info.error) { showError(info); return; }
    partNames = info.parts || [];
    let placements = {};
    try { placements = JSON.parse(await fused.readFile(PL_PATH)) || {}; }
    catch { placements = {}; }
    await loadOverrides();
    partAssets.clear();
    await loadPartAssets(partNames, placements, Date.now());
    composeFromAssets(placements, overrides);
    setStatus(partNames.length ? 'Ready' : 'Empty project — drop a .glb to import', 'ok');
  } catch (err) {
    showError(err);
  }
}

// boot
loadModel();
</script>
