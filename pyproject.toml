[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fused-render"
version = "0.1.0"
description = "Local file explorer with Python-powered renderable HTML previews"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
    # openfused local compute backend (dist name "fused"). Dev installs use the
    # local sandbox checkout: pip install -e ~/Documents/fused/sandbox/openfused
    "fused>=2.9",
]

[project.optional-dependencies]
# The packaged .app's data-stack manifest (SPEC DM-2, D58): build_dmg.sh mirrors
# this list (+ pyarrow) into the in-bundle wheelhouse that scripts' PEP 723 venv
# installs resolve from offline. Still also baked into the bundled CPython for
# now — redundant for user code since D56 (scripts import from openfused venvs,
# not the interpreter's site-packages); slimming flagged in D58, not done.
# Dev installs: pip install -e ".[bundled]"
bundled = [
    "numpy",
    "pandas",
    "requests",
    "duckdb",
    "polars",
    "matplotlib",
    "scipy",
    "pillow",
    "openpyxl",
    "shapely",
    "geopandas",
]
# Menu-bar app shell (SPEC DM-3/DM-7). macOS-only; not a core dependency so
# `pip install fused-render` stays cross-platform. Only the packaged .app
# build (scripts/build_dmg.sh) installs this extra.
app = [
    "rumps",
]

[project.scripts]
fused-render = "fused_render.cli:main"
fused-render-app = "fused_render.app:main"

[tool.hatch.build.targets.wheel]
packages = ["fused_render"]
# The Vite-built shell is gitignored (D54) but must ship in the wheel;
# `artifacts` overrides hatchling's VCS-based exclusion for it.
artifacts = ["fused_render/static/shell-dist/**"]

# Builds frontend/ -> fused_render/static/shell-dist/ at package-build time
# (wheel and the DMG pipeline, which pip-installs this repo). Editable
# installs skip it — see scripts/hatch_build.py.
[tool.hatch.build.targets.wheel.hooks.custom]
path = "scripts/hatch_build.py"
