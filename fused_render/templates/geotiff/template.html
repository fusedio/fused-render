<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GeoTIFF map preview</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e8eaed; background: #131417; font-size: 13px; }
  #map { position: absolute; inset: 0; }
  .panel { position: absolute; background: rgba(19,20,23,.92); border: 1px solid #2a2d33;
    border-radius: 10px; padding: 10px 12px; backdrop-filter: blur(6px); z-index: 10; }
  #topbar { top: 10px; left: 10px; right: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  #topbar label { color: #9aa0a6; margin: 0 2px 0 6px; }
  input[type=text], select { font: inherit; color: #e8eaed; background: #1b1d21;
    border: 1px solid #2a2d33; border-radius: 6px; padding: 4px 8px; }
  #path { flex: 1; min-width: 200px; }
  button { font: inherit; color: #e8eaed; background: #2b5fd9; border: 1px solid #2b5fd9;
    border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  button:hover { background: #3a6ee8; }
  button.ghost { background: transparent; border-color: #2a2d33; color: #9aa0a6; }
  button.ghost:hover { color: #e8eaed; border-color: #4a4d55; }
  #histPanel { right: 10px; bottom: 26px; width: 340px; user-select: none; }
  #histPanel h2, #metaPanel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    color: #9aa0a6; margin: 0 0 6px; display: flex; justify-content: space-between; align-items: center; }
  #histCanvas { width: 100%; height: 110px; display: block; cursor: crosshair; }
  #histStats { color: #9aa0a6; font-size: 11px; margin-top: 6px; font-variant-numeric: tabular-nums; }
  #histActions { display: flex; gap: 6px; margin-top: 6px; }
  #histActions button { font-size: 11px; padding: 2px 8px; }
  #readout { left: 56px; bottom: 26px; font-size: 12px; font-variant-numeric: tabular-nums;
    color: #cdd0d4; max-width: 420px; }
  #readout b { color: #8ab4ff; }
  #status { position: absolute; left: 50%; top: 64px; transform: translateX(-50%);
    background: rgba(19,20,23,.9); border: 1px solid #2a2d33; border-radius: 999px;
    padding: 4px 14px; color: #9aa0a6; z-index: 20; display: none; }
  #status.err { color: #ff7b72; display: block; }
  /* Cap height so the info panel stops above the histogram panel pinned
     bottom-right (#histPanel: bottom 26px + ~215px tall) instead of spilling
     over it. */
  #metaPanel { right: 10px; top: 58px; width: 430px; max-height: calc(100vh - 58px - 260px); overflow: auto; display: none; }
  #metaPanel table { border-collapse: collapse; width: 100%; font-size: 12px; }
  #metaPanel td { padding: 3px 6px; border-bottom: 1px solid #23262c; vertical-align: top; word-break: break-all; }
  #metaPanel td:first-child { color: #9aa0a6; white-space: nowrap; }
  #metaPanel th { color: #9aa0a6; font-weight: 500; text-align: left; padding: 3px 6px; border-bottom: 1px solid #23262c; }
  #explorer { left: 10px; top: 58px; width: 420px; max-height: 65vh; display: none; z-index: 30; }
  #crumbs { font-size: 12px; margin-bottom: 8px; color: #9aa0a6; }
  #crumbs a { color: #8ab4ff; cursor: pointer; }
  #explorerList { max-height: 48vh; overflow: auto; border: 1px solid #23262c; border-radius: 6px; }
  .row { display: flex; align-items: center; gap: 8px; padding: 5px 10px; cursor: pointer;
    font-size: 13px; border-bottom: 1px solid #1e2025; }
  .row:hover { background: #23262c; }
  .row .ic { width: 18px; text-align: center; }
  .row .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .sz { color: #6b7178; font-size: 11px; }
  input[type=range] { vertical-align: middle; width: 90px; }
  .maplibregl-ctrl-attrib { font-size: 10px; }
  #imgFallback { position: absolute; inset: 0; display: none; overflow: auto;
    background: #0c0d0f; z-index: 5; text-align: center; padding: 60px 20px 20px; }
  #imgFallback img { max-width: 96%; image-rendering: pixelated; border: 1px solid #2a2d33; }
  /* Full-viewport skeleton shown while a raster is opening (daemon spin-up +
     /meta fetch can take a couple seconds on a cold start) so the view isn't
     just a blank world basemap with a small status pill. A faint tile grid
     plus a shimmer sweep echo the tiled raster canvas that's about to land;
     hidden as soon as tiles are handed to maplibre (which fades individual
     tiles in on its own) or the fallback image is ready. */
  #mapSkeleton { position: absolute; inset: 0; z-index: 6; display: none;
    background: #16181c;
    background-image: linear-gradient(#1d2025 1px, transparent 1px),
      linear-gradient(90deg, #1d2025 1px, transparent 1px);
    background-size: 72px 72px; }
  #mapSkeleton::after { content: ""; position: absolute; inset: 0;
    background: linear-gradient(100deg, transparent 30%, rgba(138,180,255,.12) 50%, transparent 70%);
    background-size: 200% 100%; animation: mapskel-shimmer 1.6s ease-in-out infinite; }
  @keyframes mapskel-shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
</style>
</head>
<body>
  <div id="map"></div>
  <div id="imgFallback"><img id="fallbackImg" /></div>
  <div id="mapSkeleton"></div>

  <div class="panel" id="topbar">
    <button id="browse" class="ghost">📁</button>
    <input type="text" id="path" placeholder="/absolute/path/to/file.tif" />
    <button id="load">Load</button>
    <span id="modeWrap"><label for="mode">view</label>
      <select id="mode"><option value="auto">auto</option><option value="single">band</option><option value="rgb">RGB</option></select></span>
    <span id="bandRow"><select id="band"></select></span>
    <span id="rgbRow" style="display:none">
      <label>R</label><select id="rSel"></select><label>G</label><select id="gSel"></select><label>B</label><select id="bSel"></select></span>
    <span id="cmapRow"><label for="cmap">cmap</label>
      <select id="cmap"><option>viridis</option><option>magma</option><option>turbo</option><option value="rdbu">RdBu</option><option value="grays">grays</option></select></span>
    <span><label for="opacity">opacity</label><input type="range" id="opacity" min="0" max="100" value="100" /></span>
    <span><label for="basemap">basemap</label><input type="checkbox" id="basemap" checked /></span>
    <button id="metaBtn" class="ghost">info</button>
    <button id="fitBtn" class="ghost">⤢ fit</button>
  </div>

  <div id="status"></div>

  <div class="panel" id="explorer">
    <div id="crumbs"></div>
    <div id="explorerList"></div>
    <label style="display:block;margin-top:8px;color:#9aa0a6;font-size:12px">
      <input type="checkbox" id="showAll" /> show all files</label>
  </div>

  <div class="panel" id="metaPanel"><h2>Raster info <a id="metaClose" style="cursor:pointer;color:#8ab4ff">×</a></h2><div id="metaBody"></div></div>

  <div class="panel" id="readout">…</div>

  <div class="panel" id="histPanel">
    <h2>Viewport histogram <span id="histMode" style="text-transform:none;letter-spacing:0"></span></h2>
    <canvas id="histCanvas" width="640" height="220"></canvas>
    <div id="histStats"></div>
    <div id="histActions">
      <label style="color:#9aa0a6;font-size:11px;display:flex;align-items:center;gap:4px"><input type="checkbox" id="autoStretch" /> auto stretch</label>
      <button id="stretchBtn" class="ghost" title="Use this viewport's 2–98th pct as the color stretch">stretch → viewport</button>
      <button id="stretchReset" class="ghost">reset stretch</button>
      <button id="clipReset" class="ghost" style="display:none">clear clip</button>
    </div>
  </div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const els = ['path','load','mode','band','rgbRow','bandRow','rSel','gSel','bSel','cmap','cmapRow',
  'opacity','basemap','metaBtn','metaPanel','metaBody','metaClose','fitBtn','status','readout',
  'histCanvas','histStats','histMode','autoStretch','stretchBtn','stretchReset','clipReset','browse','explorer',
  'crumbs','explorerList','showAll','imgFallback','fallbackImg','mapSkeleton']
  .reduce((o, k) => (o[k] = $(k), o), {});

const DEFAULT_FILE = "";
const P = {
  file:  () => fused.params.get('file') || fused.params.get('_file') || DEFAULT_FILE,
  mode:  () => fused.params.get('mode') || 'auto',
  band:  () => fused.params.get('band') || '1',
  r:     () => fused.params.get('r') || '1',
  g:     () => fused.params.get('g') || '2',
  b:     () => fused.params.get('b') || '3',
  cmap:  () => fused.params.get('cmap') || 'viridis',
  stretch: () => fused.params.get('stretch') || '',
  // off by default: re-stretching to every viewport shifts colors on each
  // pan/zoom, which reads as flicker; opt in via the checkbox / autostretch=1
  autoStretch: () => fused.params.get('autostretch') === '1',
  vlo:   () => fused.params.get('vlo') || '',
  vhi:   () => fused.params.get('vhi') || '',
  dir:   () => fused.params.get('dir') || P.file().replace(/\/[^/]*$/, '') || '~',
  showAll:() => fused.params.get('showall') === '1',
};
const fmt = (x, d) => (x === null || x === undefined || !isFinite(x)) ? '—'
  : Math.abs(x) >= 1000 ? Number(x).toLocaleString('en-US', {maximumFractionDigits: 0})
  : Number(x).toFixed(d === undefined ? (Math.abs(x) >= 10 ? 1 : 3) : d);
const human = n => n > 1e9 ? (n/1e9).toFixed(2)+' GB' : n > 1e6 ? (n/1e6).toFixed(1)+' MB' : Math.round(n/1e3)+' KB';
function status(msg, err){ els.status.textContent = msg || ''; els.status.style.display = msg ? 'block' : 'none'; els.status.className = err ? 'err' : ''; }
function showMapSkeleton(){ els.mapSkeleton.style.display = 'block'; }
function hideMapSkeleton(){ els.mapSkeleton.style.display = 'none'; }

// ---------------- map ----------------
const DARK = "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json";
const map = new maplibregl.Map({ container: 'map', style: DARK, center: [0, 20], zoom: 1.5,
  attributionControl: {compact: true}, fadeDuration: 80 });
map.addControl(new maplibregl.NavigationControl({showCompass: false}), 'bottom-left');
map.addControl(new maplibregl.ScaleControl({unit: 'metric'}), 'bottom-right');
// NOTE: don't gate on map.on('load') — in the fused-render shell the map can
// initialize before the container has its final size and 'load' never fires
// until a resize. Poll isStyleLoaded() and force a resize instead.
async function styleReady(){
  map.resize();
  for (let i = 0; i < 200 && !map.isStyleLoaded(); i++)
    await new Promise(r => setTimeout(r, 50));
  map.resize();
}

// ---------------- daemon + state ----------------
let daemon = null;       // {port}
let meta = null;         // /meta payload for current file
let tileMode = false;    // daemon tiles vs runPython image fallback
let refineTimer = null, histAbort = null;

async function ensureDaemon(){
  if (daemon && daemon.port) return daemon;
  const r = await fused.runPython('./tile_server.py', {});
  if (r && r.port) daemon = r;
  return daemon;
}
// every daemon request carries the per-daemon token (from ensure()) so a
// foreign page that guessed the port can't read tiles cross-origin
const dURL = p => `http://127.0.0.1:${daemon.port}${p}${p.includes('?') ? '&' : '?'}t=${encodeURIComponent(daemon.token || '')}`;

// Every request hands the daemon a range-capable /api/fs/raw locator; the
// daemon asks the server (/api/fs/stat) whether the file is mount-backed and
// only then reads chunks over HTTP instead of mmap'ing the kernel NFS mount,
// whose concurrent page faults stall and drop the mount under a screenful of
// tiles. Local files stay on mmap. The template carries no mount knowledge.
const rawURL = f => `${location.origin}/api/fs/raw?path=${encodeURIComponent(f)}`;
// EVERY daemon query is built here so none can miss `src` — a missed one
// silently regresses that request to the mmap-over-NFS path.
const daemonQuery = params => {
  const q = new URLSearchParams(params);
  q.set('src', rawURL(params.file));
  return q.toString();
};

function renderQuery(){
  const params = { file: P.file(), mode: P.mode(), band: P.band(),
    r: P.r(), g: P.g(), b: P.b(), cmap: P.cmap() };
  if (P.stretch()) params.stretch = P.stretch();
  if (P.vlo() !== '' && P.vhi() !== ''){ params.vlo = P.vlo(); params.vhi = P.vhi(); }
  return daemonQuery(params);
}

// ---------------- raster layer (tile mode) ----------------
function setRasterTiles(){
  const url = dURL(`/tile/{z}/{x}/{y}.png?${renderQuery()}`);
  const src = map.getSource('raster');
  if (src){ src.setTiles([url]); return; }
  const lb = meta.lonlat_bounds;
  const res = (meta.merc_bbox[2] - meta.merc_bbox[0]) / meta.width;
  const maxzoom = Math.min(24, Math.ceil(Math.log2(2 * Math.PI * 6378137 / (256 * res))) + 1);
  map.addSource('raster', { type: 'raster', tiles: [url], tileSize: 256, minzoom: 0,
    maxzoom, bounds: [lb.west, lb.south, lb.east, lb.north], volatile: false });
  map.addLayer({ id: 'raster', type: 'raster', source: 'raster',
    paint: { 'raster-opacity': +els.opacity.value / 100, 'raster-fade-duration': 80,
             'raster-resampling': 'nearest' } });
}

function fitToRaster(instant){
  const lb = meta && meta.lonlat_bounds;
  if (!lb) return;
  // duration 0 on initial load: an animated fit is discarded if the tab is
  // hidden (rAF frozen), and instant is also simply faster to first view
  map.fitBounds([[lb.west, lb.south], [lb.east, lb.north]],
    {padding: 60, duration: instant === false ? 400 : 0, maxZoom: 18});
}

// ---------------- fallback (unsupported compression / no georef) ----------------
async function loadFallback(){
  status('Reading (fallback engine)…');
  const r = await fused.runPython('./tiff_reader.py', { file: P.file(), mode: P.mode(),
    band: P.band(), r: P.r(), g: P.g(), b: P.b(), cmap: P.cmap(), max_cells: '250000',
    stretch: P.stretch(), vlo: P.vlo(), vhi: P.vhi() }).catch(e => ({error: String(e.message || e)}));
  if (!r || r.error){ status((r && r.error) || 'read failed', true); return; }
  meta = meta || r;
  const png = 'data:image/png;base64,' + r.image.png;
  if (r.georef && r.image.merc_bbox){
    const [x0, y0, x1, y1] = r.image.merc_bbox;
    const m2l = (x, y) => [x / 6378137 * 180 / Math.PI,
      (2 * Math.atan(Math.exp(y / 6378137)) - Math.PI / 2) * 180 / Math.PI];
    const co = [m2l(x0, y1), m2l(x1, y1), m2l(x1, y0), m2l(x0, y0)];
    const src = map.getSource('rimg');
    if (src){ src.updateImage({url: png, coordinates: co}); }
    else {
      map.addSource('rimg', {type: 'image', url: png, coordinates: co});
      map.addLayer({id: 'rimg', type: 'raster', source: 'rimg',
        paint: {'raster-opacity': +els.opacity.value / 100, 'raster-fade-duration': 80}});
    }
    if (r.lonlat_bounds){ meta.lonlat_bounds = meta.lonlat_bounds || r.lonlat_bounds; }
    drawStaticHist(r);
  } else {
    // non-georeferenced: plain image view
    els.imgFallback.style.display = 'block';
    els.fallbackImg.src = png;
    drawStaticHist(r);
  }
  status('');
  if (r.note) status(r.note);
}

// progressive refine of the fallback image to the current viewport
function scheduleFallbackRefine(){
  if (tileMode || !meta || !meta.lonlat_bounds) return;
  clearTimeout(refineTimer);
  refineTimer = setTimeout(async () => {
    const lb = meta.lonlat_bounds, b = map.getBounds();
    const fx0 = Math.max(0, (b.getWest() - lb.west) / (lb.east - lb.west));
    const fx1 = Math.min(1, (b.getEast() - lb.west) / (lb.east - lb.west));
    const fy0 = Math.max(0, (lb.north - b.getNorth()) / (lb.north - lb.south));
    const fy1 = Math.min(1, (lb.north - b.getSouth()) / (lb.north - lb.south));
    if (fx1 <= fx0 || fy1 <= fy0) return;
    const win = (fx1 - fx0 > 0.98 && fy1 - fy0 > 0.98) ? '' : [fx0, fy0, fx1, fy1].map(v => v.toFixed(4)).join(',');
    const r = await fused.runPython('./tiff_reader.py', { file: P.file(), mode: P.mode(),
      band: P.band(), r: P.r(), g: P.g(), b: P.b(), cmap: P.cmap(), max_cells: '900000',
      win, stretch: stretchStr() || '', vlo: P.vlo(), vhi: P.vhi() }).catch(() => null);
    if (!r || r.error || !r.georef || !r.image.merc_bbox) return;
    const [x0, y0, x1, y1] = r.image.merc_bbox;
    const m2l = (x, y) => [x / 6378137 * 180 / Math.PI,
      (2 * Math.atan(Math.exp(y / 6378137)) - Math.PI / 2) * 180 / Math.PI];
    const co = [m2l(x0, y1), m2l(x1, y1), m2l(x1, y0), m2l(x0, y0)];
    const png = 'data:image/png;base64,' + r.image.png;
    const src = map.getSource('rimg2');
    if (src) src.updateImage({url: png, coordinates: co});
    else {
      map.addSource('rimg2', {type: 'image', url: png, coordinates: co});
      map.addLayer({id: 'rimg2', type: 'raster', source: 'rimg2',
        paint: {'raster-opacity': +els.opacity.value / 100, 'raster-fade-duration': 80}});
    }
    drawStaticHist(r);
  }, 300);
}

// stretch used by fallback refines so colors stay stable while panning
function stretchStr(){
  if (P.stretch()) return P.stretch();
  if (meta && meta.stretch) return meta.stretch.flat().join(',');
  return '';
}

// ---------------- histogram ----------------
const CH_COLORS = ['#ff6b6b', '#51cf66', '#5c9dff'];
let lastHist = null;     // /hist payload
let histSel = null;      // [px0, px1] during drag

function viewportMercBbox(){
  const b = map.getBounds();
  const R = 6378137, l2m = (lon, lat) => [lon * Math.PI / 180 * R,
    Math.log(Math.tan(Math.PI / 4 + Math.min(85, Math.max(-85, lat)) * Math.PI / 360)) * R];
  const [w, s] = l2m(b.getWest(), b.getSouth()), [e, n] = l2m(b.getEast(), b.getNorth());
  return [w, s, e, n];
}

async function refreshHist(){
  if (!tileMode || !daemon) return;
  const bbox = viewportMercBbox().join(',');
  const q = daemonQuery({file: P.file(), mode: P.mode(), band: P.band(),
    r: P.r(), g: P.g(), b: P.b(), bins: '60', bbox});
  try {
    if (histAbort) histAbort.abort();
    histAbort = new AbortController();
    const r = await fetch(dURL('/hist?' + q), {signal: histAbort.signal});
    lastHist = await r.json();
    drawHist();
    maybeAutoStretch();
  } catch (e) { /* aborted or daemon busy */ }
}

function drawHist(){
  const c = els.histCanvas, ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  if (!lastHist || !lastHist.channels || !lastHist.channels.length) return;
  const chans = lastHist.channels.filter(ch => ch.counts);
  if (!chans.length){ els.histStats.textContent = 'no data in viewport'; return; }
  const maxC = Math.max(...chans.map(ch => Math.max(...ch.counts)));
  const single = chans.length === 1;
  els.histMode.textContent = single ? `band ${P.band()}` : 'R / G / B';
  chans.forEach((ch, ci) => {
    const n = ch.counts.length, bw = c.width / n;
    ctx.fillStyle = single ? '#5c9dff' : CH_COLORS[ci] + '88';
    for (let i = 0; i < n; i++){
      const h = Math.pow(ch.counts[i] / maxC, 0.5) * (c.height - 14);
      ctx.fillRect(i * bw, c.height - h, Math.max(1, bw - 1), h);
    }
  });
  // clip selection overlay (single band)
  if (single && P.vlo() !== '' && P.vhi() !== ''){
    const ch = chans[0], e0 = ch.edges[0], e1 = ch.edges[ch.edges.length - 1];
    const x0 = (P.vlo() - e0) / (e1 - e0) * c.width, x1 = (P.vhi() - e0) / (e1 - e0) * c.width;
    ctx.fillStyle = '#ffffff22'; ctx.fillRect(x0, 0, x1 - x0, c.height);
    ctx.strokeStyle = '#ffcf70'; ctx.strokeRect(x0, 0, x1 - x0, c.height);
  }
  if (histSel){
    ctx.fillStyle = '#ffffff26';
    ctx.fillRect(Math.min(...histSel), 0, Math.abs(histSel[1] - histSel[0]), c.height);
  }
  const s = chans[0];
  els.histStats.textContent = single
    ? `viewport: min ${fmt(s.min)}  max ${fmt(s.max)}  mean ${fmt(s.mean)}  median ${fmt(s.median)}  σ ${fmt(s.std)}  n ${s.count.toLocaleString()}`
    : chans.map((ch, i) => `${'RGB'[i]} [${fmt(ch.min, 0)}–${fmt(ch.max, 0)}]`).join('   ') + `  ·  n ${s.count.toLocaleString()}`;
  els.clipReset.style.display = (P.vlo() !== '') ? '' : 'none';
}

function drawStaticHist(r){
  // fallback mode: single-band hist from returned stats (whole image, not viewport)
  if (!r || !r.stats){ els.histStats.textContent = ''; return; }
  els.histMode.textContent = `band ${P.band()} (image)`;
  els.histStats.textContent = `min ${fmt(r.stats.min)}  max ${fmt(r.stats.max)}  mean ${fmt(r.stats.mean)}  σ ${fmt(r.stats.std)}`;
  if (r.vals){
    const buf = Uint8Array.from(atob(r.vals), ch => ch.charCodeAt(0));
    const v = new Float32Array(buf.buffer);
    const lo = r.stats.min, hi = r.stats.max, bins = 60, counts = new Array(bins).fill(0);
    if (hi > lo) for (let i = 0; i < v.length; i++){
      const x = v[i]; if (!isFinite(x)) continue;
      counts[Math.min(bins - 1, Math.floor((x - lo) / (hi - lo) * bins))]++;
    }
    lastHist = {channels: [{counts, edges: Array.from({length: bins + 1}, (_, i) => lo + (hi - lo) * i / bins),
      min: lo, max: hi, mean: r.stats.mean, std: r.stats.std, median: null, count: r.stats.count,
      p2: r.stats.p2, p98: r.stats.p98}]};
    drawHist();
  }
}

// drag on histogram -> value clip (single band, tile mode re-renders instantly)
let dragX = null;
els.histCanvas.addEventListener('mousedown', e => { dragX = e.offsetX * els.histCanvas.width / els.histCanvas.clientWidth; histSel = [dragX, dragX]; });
window.addEventListener('mousemove', e => {
  if (dragX === null) return;
  const r = els.histCanvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * els.histCanvas.width / r.width;
  histSel = [dragX, Math.max(0, Math.min(els.histCanvas.width, x))];
  drawHist();
});
window.addEventListener('mouseup', () => {
  if (dragX === null) return;
  const ch = lastHist && lastHist.channels && lastHist.channels[0];
  const sel = histSel; dragX = null; histSel = null;
  if (!ch || !ch.edges || !sel || Math.abs(sel[1] - sel[0]) < 4){ drawHist(); return; }
  const c = els.histCanvas, e0 = ch.edges[0], e1 = ch.edges[ch.edges.length - 1];
  const lo = e0 + Math.min(...sel) / c.width * (e1 - e0);
  const hi = e0 + Math.max(...sel) / c.width * (e1 - e0);
  fused.params.set('vlo', String(lo)); fused.params.set('vhi', String(hi));
});
els.clipReset.onclick = () => { fused.params.set('vlo', ''); fused.params.set('vhi', ''); };

// stretch controls
els.stretchBtn.onclick = () => {
  const chans = lastHist && lastHist.channels;
  if (!chans || !chans[0] || chans[0].p2 === undefined) return;
  fused.params.set('stretch', chans.map(ch => `${ch.p2},${ch.p98}`).join(','));
};
els.stretchReset.onclick = () => { fused.params.set('autostretch', '0'); fused.params.set('stretch', ''); };

// auto stretch: re-stretch colors to the current viewport after every pan/zoom
function maybeAutoStretch(){
  if (!P.autoStretch()) return;
  const chans = lastHist && lastHist.channels;
  if (!chans || !chans[0] || chans[0].p2 === undefined) return;
  const s = chans.filter(ch => ch.p2 !== undefined).map(ch => `${ch.p2},${ch.p98}`).join(',');
  if (s && s !== P.stretch()) fused.params.set('stretch', s);
}
els.autoStretch.onchange = () => {
  fused.params.set('autostretch', els.autoStretch.checked ? '1' : '0');
  if (els.autoStretch.checked) maybeAutoStretch();
};

// ---------------- hover readout ----------------
let hoverT = 0;
map.on('mousemove', async e => {
  const now = performance.now();
  if (!tileMode || !daemon || now - hoverT < 120) return;
  hoverT = now;
  const q = daemonQuery({file: P.file(), lon: e.lngLat.lng, lat: e.lngLat.lat});
  try {
    const r = await (await fetch(dURL('/value?' + q))).json();
    const vs = r.values || [];
    els.readout.innerHTML = vs.every(v => v === null)
      ? `${e.lngLat.lng.toFixed(5)}, ${e.lngLat.lat.toFixed(5)} · <span style="color:#6b7178">no data</span>`
      : `${e.lngLat.lng.toFixed(5)}, ${e.lngLat.lat.toFixed(5)} · ` +
        vs.map((v, i) => `<b>b${i + 1}</b> ${v === null ? '—' : fmt(v)}`).join('  ');
  } catch (err) {}
});

// ---------------- metadata panel (gdalinfo-parity stack) ----------------
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function kvTable(rows){
  return '<table>' + rows.filter(r => r).map(([k, v]) =>
    `<tr><td>${k}</td><td>${v ?? '—'}</td></tr>`).join('') + '</table>';
}
function section(title, html){
  return `<h2 style="margin-top:12px">${title}</h2>` + html;
}
function num(x, d){ return (x === null || x === undefined) ? '—' : Number(x).toLocaleString('en-US', {maximumFractionDigits: d ?? 7}); }

function renderMeta(){
  if (!meta) return;
  const t = meta.tiff || {};
  let h = kvTable([
    ['driver', 'GTiff/GeoTIFF'],
    ['file', (meta.file || P.file()).split('/').pop()],
    ['size on disk', meta.file_size ? human(meta.file_size) : '—'],
    ['raster size', `${meta.width} × ${meta.height} px, ${meta.count} band(s)`],
    ['dtype', meta.dtype], ['nodata', meta.nodata ?? 'none'],
    ['engine', tileMode ? 'tile daemon (pure)' : (meta.engine || 'fallback')],
  ]);
  if ((meta.files || []).length > 1)
    h += kvTable([['sidecars', meta.files.slice(1).map(f => f.split('/').pop()).join(', ')]]);

  // --- CRS
  let crsRows = [
    ['CRS', meta.crs && meta.crs.epsg ? `EPSG:${meta.crs.epsg} — ${meta.crs_name || ''}` : (meta.citation || 'unknown')],
  ];
  if (meta.crs_units) crsRows.push(['units', meta.crs_units]);
  if (meta.area_or_point) crsRows.push(['AREA_OR_POINT', meta.area_or_point]);
  h += section('Coordinate system', kvTable(crsRows) +
    (meta.crs_wkt ? `<details style="margin-top:4px"><summary style="cursor:pointer;color:#8ab4ff">full WKT</summary><pre style="font-size:10px;white-space:pre-wrap;color:#9aa0a6;margin:4px 0">${esc(meta.crs_wkt)}</pre></details>` : ''));

  // --- geotransform
  if (meta.origin){
    h += section('Geotransform', kvTable([
      ['origin', `(${num(meta.origin[0])}, ${num(meta.origin[1])})`],
      ['pixel size', `(${num(meta.pixel_size[0])}, ${num(meta.pixel_size[1])})`],
      meta.rotation ? ['rotation', `(${num(meta.rotation[0])}, ${num(meta.rotation[1])})`] : null,
    ]));
  }

  // --- corner coordinates
  if (meta.corners){
    h += section('Corner coordinates',
      '<table><tr><th></th><th>native (x, y)</th><th>lon, lat</th></tr>' +
      meta.corners.map(c =>
        `<tr><td>${c.name}</td><td>${num(c.native[0], 3)}, ${num(c.native[1], 3)}</td>` +
        `<td>${c.lonlat ? c.lonlat[0].toFixed(6) + ', ' + c.lonlat[1].toFixed(6) : '—'}</td></tr>`).join('') +
      '</table>');
  }

  // --- bands
  if (meta.band_info){
    h += section('Bands',
      '<table><tr><th>#</th><th>type</th><th>interp</th><th>min</th><th>max</th><th>block</th></tr>' +
      meta.band_info.map(b =>
        `<tr><td>${b.band}${b.description && !/^band /.test(b.description) ? ' <span style="color:#6b7178">' + esc(b.description) + '</span>' : ''}</td>` +
        `<td>${b.dtype}</td><td>${b.colorinterp}</td>` +
        `<td>${b.min !== null && b.min !== undefined ? fmt(b.min) : '—'}</td>` +
        `<td>${b.max !== null && b.max !== undefined ? fmt(b.max) : '—'}</td>` +
        `<td>${(b.block || []).join('×')}</td></tr>`).join('') + '</table>' +
      (meta.band_info[0] && meta.band_info[0].stats_source ?
        `<div style="color:#6b7178;font-size:11px;margin-top:3px">min/max from ${meta.band_info[0].stats_source}</div>` : ''));
  }

  // --- TIFF structure
  h += section('TIFF structure', kvTable([
    ['compression', t.compression], ['layout', t.layout],
    ['photometric', t.photometric ?? '—'],
    ['predictor', t.predictor ?? 'none'],
    ['byte order', t.byte_order ?? '—'],
    ['overviews', (t.overviews || []).map(o => o.join('×')).join(', ') || 'none'],
  ]));

  // --- extent
  if (meta.lonlat_bounds){
    const lb = meta.lonlat_bounds, nb = meta.bounds;
    h += section('Extent', kvTable([
      nb ? ['native', `${num(nb.left, 3)}, ${num(nb.bottom, 3)} → ${num(nb.right, 3)}, ${num(nb.top, 3)}`] : null,
      ['lon/lat', `${lb.west.toFixed(5)}, ${lb.south.toFixed(5)} → ${lb.east.toFixed(5)}, ${lb.north.toFixed(5)}`],
    ]));
  }

  // --- metadata items (GDAL XML + baseline TIFF tags)
  const gm = Object.entries(meta.gdal_metadata || {});
  const tags = Object.entries(meta.tags || {});
  if (gm.length || tags.length){
    h += section('Metadata', kvTable(
      tags.map(([k, v]) => [k, esc(v)]).concat(gm.map(([k, v]) => [esc(k), esc(v)]))));
  }
  els.metaBody.innerHTML = h;
}
els.metaBtn.onclick = () => { els.metaPanel.style.display = els.metaPanel.style.display === 'block' ? 'none' : 'block'; };
els.metaClose.onclick = () => els.metaPanel.style.display = 'none';
els.fitBtn.onclick = () => fitToRaster(false);

// ---------------- controls ----------------
function bandOptions(sel){
  let h = '';
  const names = (meta && meta.descriptions) || [];
  const n = (meta && meta.count) || 1;
  for (let i = 1; i <= n; i++) h += `<option value="${i}" ${i === +sel ? 'selected' : ''}>${i}${names[i-1] && names[i-1] !== 'band ' + i ? ': ' + names[i-1] : ''}</option>`;
  return h;
}
function syncControls(){
  const isRgb = P.mode() === 'rgb' || (P.mode() === 'auto' && meta && meta.count >= 3);
  els.mode.value = P.mode();
  els.band.innerHTML = bandOptions(P.band());
  els.rSel.innerHTML = bandOptions(P.r()); els.gSel.innerHTML = bandOptions(P.g()); els.bSel.innerHTML = bandOptions(P.b());
  els.bandRow.style.display = isRgb ? 'none' : '';
  els.rgbRow.style.display = isRgb ? '' : 'none';
  els.cmapRow.style.display = isRgb ? 'none' : '';
  els.cmap.value = P.cmap();
  els.path.value = P.file();
  if (els.autoStretch) els.autoStretch.checked = P.autoStretch();
}
els.load.onclick = () => fused.params.set('file', els.path.value.trim());
els.path.addEventListener('keydown', e => { if (e.key === 'Enter') els.load.click(); });
els.mode.onchange = () => fused.params.set('mode', els.mode.value);
els.band.onchange = () => fused.params.set('band', els.band.value);
els.rSel.onchange = () => fused.params.set('r', els.rSel.value);
els.gSel.onchange = () => fused.params.set('g', els.gSel.value);
els.bSel.onchange = () => fused.params.set('b', els.bSel.value);
els.cmap.onchange = () => fused.params.set('cmap', els.cmap.value);
els.opacity.oninput = () => {
  for (const id of ['raster', 'rimg', 'rimg2'])
    if (map.getLayer(id)) map.setPaintProperty(id, 'raster-opacity', +els.opacity.value / 100);
};
els.basemap.onchange = () => {
  const show = els.basemap.checked ? 'visible' : 'none';
  for (const l of map.getStyle().layers)
    if (!['raster', 'rimg', 'rimg2'].includes(l.id)) map.setLayoutProperty(l.id, 'visibility', show);
};

// ---------------- explorer (browse) ----------------
els.browse.onclick = async () => {
  const open = els.explorer.style.display === 'block';
  els.explorer.style.display = open ? 'none' : 'block';
  if (!open) refreshExplorer();
};
els.showAll.onchange = () => { fused.params.set('showall', els.showAll.checked ? '1' : ''); refreshExplorer(); };
async function refreshExplorer(dir){
  dir = dir || P.dir();
  const r = await fused.runPython('./browse.py', { dir, exts: '.tif,.tiff', show_all: P.showAll() ? 'true' : 'false', src: rawURL(dir) }).catch(() => null);
  if (!r || r.error) return;
  els.crumbs.innerHTML = r.crumbs.map(c =>
    `<a data-p="${c.path}">${c.label || '/'}</a>`).join('<span style="color:#4b5058"> / </span>');
  els.crumbs.querySelectorAll('a').forEach(a => a.onclick = () => refreshExplorer(a.dataset.p));
  const entries = [...(r.dirs || []), ...(r.files || [])];
  els.explorerList.innerHTML = entries.map(e =>
    `<div class="row" data-p="${e.path}" data-d="${e.is_dir ? 1 : 0}">
       <span class="ic">${e.is_dir ? '📁' : '🗺'}</span><span class="nm">${e.name}</span>
       <span class="sz">${e.size ? human(e.size) : ''}</span></div>`).join('') || '<div class="row" style="color:#6b7178">empty</div>';
  els.explorerList.querySelectorAll('.row[data-p]').forEach(row => row.onclick = () => {
    if (row.dataset.d === '1') refreshExplorer(row.dataset.p);
    else { fused.params.set('dir', row.dataset.p.replace(/\/[^/]*$/, '')); fused.params.set('file', row.dataset.p); els.explorer.style.display = 'none'; }
  });
}

// ---------------- load orchestration ----------------
let loadedFile = null, loadedQuery = null;

async function loadFile(){
  const file = P.file();
  if (!file) { status('no file — use Browse', true); return; }
  showMapSkeleton();
  status('Opening…');
  await styleReady();
  const d = await ensureDaemon().catch(() => null);
  meta = null; tileMode = false;
  els.imgFallback.style.display = 'none';
  for (const id of ['raster', 'rimg', 'rimg2']){
    if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource(id)) map.removeSource(id);
  }
  if (d && d.port){
    try {
      meta = await (await fetch(dURL('/meta?' + daemonQuery({file})))).json();
      tileMode = !!meta.supported;
    } catch (e) { meta = null; }
  }
  syncControls();
  if (tileMode){
    setRasterTiles();
    hideMapSkeleton();
    fitToRaster();
    status('');
    refreshHist();
  } else {
    await loadFallback();
    hideMapSkeleton();
    fitToRaster();
  }
  renderMeta();
  loadedFile = file;
  loadedQuery = renderQuery();
}

function onParamsChanged(){
  const file = P.file();
  if (file !== loadedFile){ loadFile(); return; }
  syncControls();
  const q = renderQuery();
  if (q !== loadedQuery){
    loadedQuery = q;
    if (tileMode){ setRasterTiles(); refreshHist(); }
    else { loadFallback(); }
  }
  drawHist();
}
fused.params.onChange(onParamsChanged);

let histTimer = null;
map.on('moveend', () => {
  if (tileMode){ clearTimeout(histTimer); histTimer = setTimeout(refreshHist, 150); }
  else scheduleFallbackRefine();
});

loadFile();

</script>
</body>
