type = "canvas"
version = 2
name = "Demo pipeline"

[canvas]
edges = [
  ["load_data", "clean_data"],
  ["clean_data", "aggregate"],
  ["aggregate", "make_chart"],
]

[canvas.viewport]
x = 40.0
y = 30.0
zoom = 0.85

[canvas.viewportBounds]
x = 0.0
y = 0.0
width = 1200.0
height = 800.0

[[canvas.nodes]]
udfName = "load_data"
title = "Load data"
description = "Read the raw source parquet from S3."
x = 40.0
y = 40.0
zIndex = 1
width = 240.0
height = 130.0
visible = true

[[canvas.nodes]]
udfName = "clean_data"
title = "Clean"
description = "Drop nulls, normalize column names."
x = 340.0
y = 220.0
zIndex = 2
width = 240.0
height = 130.0
visible = true

[[canvas.nodes]]
udfName = "aggregate"
title = "Aggregate"
x = 640.0
y = 40.0
zIndex = 3
width = 240.0
height = 130.0
visible = true

[[canvas.nodes]]
udfName = "make_chart"
title = "Chart"
description = "Render the summary as an HTML view."
x = 940.0
y = 220.0
zIndex = 4
width = 240.0
height = 130.0
visible = false

[[canvas.nodes]]
udfName = "etl_group"
type = "udf-folder"
folderName = "ETL"
folderColor = "#5B8DEF33"
childUdfOrder = ["load_data", "clean_data", "aggregate"]
isLocked = false
x = 10.0
y = 10.0
zIndex = 0
width = 880.0
height = 360.0
