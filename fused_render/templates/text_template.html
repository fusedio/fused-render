<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Text preview</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1c1e21;
  }
  pre {
    margin: 0;
    padding: 16px;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #status {
    padding: 24px;
    color: #6b7280;
  }
  #status a {
    color: #2563eb;
  }
</style>
</head>
<body>
  <div id="root">Loading…</div>
  <script>
    const MAX_BYTES = 2 * 1024 * 1024;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function load() {
      const root = document.getElementById("root");
      const file = fused.params.get("_file");
      if (!file) {
        root.innerHTML = `<div id="status">No file selected (missing _file param).</div>`;
        return;
      }
      const rawUrl = "/api/fs/raw?path=" + encodeURIComponent(file);
      try {
        const stat = await fetch("/api/fs/stat?path=" + encodeURIComponent(file)).then((r) => r.json());
        if (stat.size !== null && stat.size !== undefined && stat.size > MAX_BYTES) {
          root.innerHTML = `<div id="status">File is too large to preview inline (${stat.size.toLocaleString()} bytes).
            <a href="${rawUrl}" target="_blank" rel="noopener">Open raw</a></div>`;
          return;
        }
        const text = await fetch(rawUrl).then((r) => r.text());
        root.innerHTML = `<pre>${escapeHtml(text)}</pre>`;
      } catch (err) {
        root.innerHTML = `<div id="status">Failed to load file: ${escapeHtml(err.message)}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
