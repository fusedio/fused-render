<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Folder preview</title>
<style>
  /* Tokens mirror the app shell (shell.css) so the preview reads as a native
     folder view, same as the zip/tar browsers. */
  :root {
    color-scheme: dark;
    --fg: #e8eaed;
    --fg-muted: #9aa0a6;
    --border: #2a2d33;
    --bg: #131417;
    --bg-alt: #1b1d21;
    --sel: #2b3a52;
    --accent: #E5FF44;
    --error: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: var(--fg);
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* Per-filetype icons — same glyphs + tints as the shell's FileIcons.tsx /
     shell.css, so rows read identically to the built-in listing. */
  .file-icon { display: block; width: 16px; height: 16px; }
  .file-icon--folder  { color: #9fb1d2; }
  .file-icon--code    { color: #7fb2a6; }
  .file-icon--data    { color: #a898cb; }
  .file-icon--json    { color: #c3a96b; }
  .file-icon--html    { color: #cd9d75; }
  .file-icon--image   { color: #cd93b6; }
  .file-icon--doc     { color: #9aa0a6; }
  .file-icon--media   { color: #d0939b; }
  .file-icon--geo     { color: #88bf95; }
  .file-icon--archive { color: #baa386; }
  .file-icon--db      { color: #82abbf; }
  .file-icon--file    { color: #868c93; }

  /* Split body: file list (majority) on the left, a compact preview pane on
     the right (Finder list view). The shell shows the folder path in its own
     top bar, so this template has no breadcrumb of its own. */
  .split { flex: 1 1 auto; display: flex; min-height: 0; }
  .list-pane {
    flex: 1 1 auto;
    min-width: 240px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  /* In-folder search box (mirrors the built-in listing's .listing-search). */
  .list-search {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .list-search input {
    flex: 1 1 auto;
    font: inherit;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-alt);
    color: var(--fg);
    outline: none;
  }
  .list-search input:focus { border-color: var(--fg-muted); }
  .list-search .count { flex: 0 0 auto; color: var(--fg-muted); font-size: 12px; white-space: nowrap; }
  .list-body { flex: 1 1 auto; overflow: auto; }
  .divider {
    flex: 0 0 5px;
    cursor: col-resize;
    background: transparent;
    margin: 0 -2px;
    z-index: 2;
  }
  .divider:hover, .divider.dragging { background: var(--border); }
  .preview-pane {
    flex: 0 0 400px;
    min-width: 220px;
    max-width: 65%;
    overflow: auto;
    display: flex;
    flex-direction: column;
    background: var(--bg-alt);
    border-left: 1px solid var(--border);
  }
  #preview-frame { width: 100%; height: 100%; border: 0; display: block; background: var(--bg); }

  table.listing-table { width: 100%; border-collapse: collapse; }
  table.listing-table th {
    text-align: left;
    font-weight: 600;
    color: var(--fg-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 8px 16px;
    position: sticky;
    top: 0;
    z-index: 1;
    background: var(--bg);
    box-shadow: inset 0 -1px 0 var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  table.listing-table th:hover { color: var(--fg); }
  table.listing-table th.sorted { color: var(--accent); }
  table.listing-table .sort-arrow { margin-left: 5px; font-size: 9px; }
  table.listing-table td {
    padding: 7px 16px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  table.listing-table tr.row { cursor: pointer; }
  table.listing-table tr.row:hover { background: var(--bg-alt); }
  table.listing-table tr.row.selected { background: var(--sel); }
  table.listing-table tr.row.ignored td.name { opacity: 0.5; }
  table.listing-table td.name { display: flex; align-items: center; gap: 8px; }
  table.listing-table td.name .icon { flex: 0 0 auto; display: inline-flex; }
  table.listing-table td.name .label { overflow: hidden; text-overflow: ellipsis; }
  table.listing-table td.name .search-path { overflow: hidden; text-overflow: ellipsis; }
  mark.search-mark { background: rgba(229, 255, 68, 0.22); color: var(--fg); border-radius: 2px; }
  table.listing-table td.mtime, table.listing-table td.size {
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
    width: 1%;
  }
  table.listing-table td.size { text-align: right; }

  .status-message { padding: 24px 16px; color: var(--fg-muted); }
  .status-message.error { color: var(--error); }
  #load-more-btn {
    margin-left: 8px; padding: 2px 10px; font: inherit; font-size: 12px;
    color: var(--fg); background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer;
  }
  #load-more-btn:hover:not(:disabled) { background: var(--bg-alt); }
  #load-more-btn:disabled { opacity: .6; cursor: default; }

  /* Placeholder / folder card shown in the preview pane. */
  .pane-center { margin: auto; text-align: center; color: var(--fg-muted); padding: 32px; }
  .pane-center .big-icon { display: inline-flex; margin-bottom: 12px; }
  .pane-center .big-icon .file-icon { width: 48px; height: 48px; stroke-width: 1.5; }
  .pane-center .title { color: var(--fg); font-size: 15px; margin-bottom: 4px; word-break: break-all; }
  .pane-center .hint { font-size: 12.5px; }
  .pane-center button {
    margin-top: 14px;
    font: inherit;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
  }
  .pane-center button:hover { background: var(--bg-alt); }
</style>
</head>
<body>
  <div class="split">
    <div class="list-pane" id="list-pane">
      <div class="list-search">
        <input id="search" type="search" placeholder="Start typing to search…" autocomplete="off" spellcheck="false" />
        <span class="count" id="search-count"></span>
      </div>
      <div class="list-body" id="list-body"><div class="status-message">Loading…</div></div>
    </div>
    <div class="divider" id="divider"></div>
    <div class="preview-pane" id="preview-pane"></div>
  </div>

  <script>
    const listBodyEl = document.getElementById("list-body");
    const previewPaneEl = document.getElementById("preview-pane");
    const searchEl = document.getElementById("search");
    const searchCountEl = document.getElementById("search-count");

    // Per-filetype icons ported from the shell's FileIcons.tsx so preview rows
    // match the built-in listing exactly (glyph geometry + the CSS tints above,
    // grouped from registry.json so an icon agrees with the file's viewer).
    const GLYPHS = {
      folder: '<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',
      code: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m10 12.5-2 2.5 2 2.5"/><path d="m14 12.5 2 2.5-2 2.5"/>',
      data: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M12 3v18"/>',
      json: '<path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5c0 1.1.9 2 2 2h1"/><path d="M16 21h1a2 2 0 0 0 2-2v-5c0-1.1.9-2 2-2a2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"/>',
      html: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
      image: '<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/>',
      doc: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/>',
      media: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/>',
      geo: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
      archive: '<rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/>',
      db: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/>',
      file: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/>',
    };
    const EXT_VARIANT = {
      py: "code", js: "code", ts: "code", tsx: "code", jsx: "code",
      cjs: "code", mjs: "code", cts: "code", mts: "code",
      sh: "code", zsh: "code", fish: "code", ps1: "code", csh: "code",
      "zsh-theme": "code", vim: "code",
      yaml: "code", yml: "code", toml: "code", ini: "code", cfg: "code",
      conf: "code", tf: "code", hcl: "code", css: "code", plist: "code",
      parquet: "data", csv: "data", tsv: "data", xlsx: "data",
      nc: "data", nc4: "data", cdf: "data",
      zgroup: "data", zattrs: "data", zmetadata: "data",
      json: "json", jsonl: "json", ndjson: "json",
      html: "html", htm: "html",
      png: "image", jpg: "image", jpeg: "image", gif: "image", webp: "image", svg: "image",
      pdf: "doc", md: "doc", markdown: "doc", txt: "doc", log: "doc",
      mp4: "media", mov: "media", m4v: "media", webm: "media",
      mp3: "media", wav: "media", m4a: "media", ogg: "media", flac: "media",
      geojson: "geo", shp: "geo", kml: "geo", kmz: "geo", gpx: "geo",
      gpkg: "geo", fgb: "geo", pmtiles: "geo", tif: "geo", tiff: "geo",
      las: "geo", laz: "geo",
      zip: "archive", jar: "archive", whl: "archive", egg: "archive",
      tar: "archive", tgz: "archive", tbz2: "archive", txz: "archive",
      gz: "archive", bz2: "archive", xz: "archive",
      sqlite: "db", sqlite3: "db", db: "db",
    };
    function extOf(name) {
      const dot = name.lastIndexOf(".");
      return dot <= 0 ? "" : name.slice(dot + 1).toLowerCase();
    }
    // Inline SVG for a listing entry; directories always get the folder glyph.
    function iconSvg(name, isDir) {
      const variant = isDir ? "folder" : (EXT_VARIANT[extOf(name)] || "file");
      return `<svg class="file-icon file-icon--${variant}" width="16" height="16" ` +
        `viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ` +
        `stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${GLYPHS[variant]}</svg>`;
    }

    // --- Fuzzy matcher (ported verbatim from the shell's lib/fuzzy.ts) -------
    const SEPARATORS = new Set(["/", ".", "-", "_", " "]);
    function isUpper(ch) { return ch >= "A" && ch <= "Z"; }
    function isSegmentStart(text, i) {
      if (i === 0) return true;
      const prev = text[i - 1];
      if (SEPARATORS.has(prev)) return true;
      return isUpper(text[i]) && !isUpper(prev);
    }
    function fuzzyMatch(query, text) {
      if (query === "") return { score: 0, positions: [], longestRun: 0 };
      const q = query.toLowerCase(), t = text.toLowerCase();
      const sub = t.indexOf(q);
      if (sub !== -1) {
        const positions = [];
        let score = 0;
        for (let ti = sub; ti < sub + q.length; ti++) {
          positions.push(ti); score += 1;
          if (ti > sub) score += 3;
          if (isSegmentStart(text, ti)) score += 5;
        }
        return { score, positions, longestRun: q.length };
      }
      const positions = [];
      let qi = 0, score = 0, prev = -2, run = 0, longestRun = 0;
      for (let ti = 0; ti < t.length && qi < q.length; ti++) {
        if (t[ti] !== q[qi]) continue;
        positions.push(ti); score += 1;
        run = ti === prev + 1 ? run + 1 : 1;
        if (run > longestRun) longestRun = run;
        if (ti === prev + 1) score += 3;
        if (isSegmentStart(text, ti)) score += 5;
        prev = ti; qi++;
      }
      if (qi < q.length) return null;
      return { score, positions, longestRun };
    }
    function highlightSegments(text, positions) {
      if (!positions.length) return text ? [{ text, match: false }] : [];
      const marked = new Set(positions);
      const segments = [];
      let run = "", runMatch = marked.has(0);
      for (let i = 0; i < text.length; i++) {
        const m = marked.has(i);
        if (m === runMatch) { run += text[i]; }
        else { segments.push({ text: run, match: runMatch }); run = text[i]; runMatch = m; }
      }
      segments.push({ text: run, match: runMatch });
      return segments;
    }
    function highlightHtml(text, positions) {
      return highlightSegments(text, positions).map((s) =>
        s.match ? `<mark class="search-mark">${escapeHtml(s.text)}</mark>` : escapeHtml(s.text)
      ).join("");
    }

    let ENTRIES = [];       // [{name, path, is_dir, size, mtime, ignored}]
    // fs/list truncation contract (mirrors views/Listing.tsx): TRUNCATED means
    // the listing is a partial page (server cap), CURSOR a continuation token
    // to append the next page when the route is resumable.
    let TRUNCATED = false;
    let CURSOR = null;
    let loadingMore = false;
    let selectedPath = null;
    let sortKey = "name";   // name | size | mtime
    let sortOrder = "asc";
    let baseDir = null;     // absolute path of the folder (no trailing slash)
    let currentRows = [];   // rows currently rendered (listing OR search hits)
    // In-folder search (mirrors views/Listing.tsx): a query swaps the listing
    // for a flat, fuzzy-ranked walk of the whole subtree.
    let query = "";
    let WALK = null;        // { dir, hidden, entries, truncated } cache
    const MAX_RESULTS = 250;

    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    // formatSize/formatMtime mirror the shell's lib/format.ts so the columns
    // read identically to the built-in directory listing.
    function formatSize(bytes) {
      if (bytes === null || bytes === undefined) return "";
      if (bytes < 1024) return bytes + " B";
      const units = ["KB", "MB", "GB", "TB"];
      let v = bytes, u = -1;
      do { v /= 1024; u++; } while (v >= 1024 && u < units.length - 1);
      return v.toFixed(v < 10 ? 1 : 0) + " " + units[u];
    }
    function formatMtime(epochSeconds) {
      if (!epochSeconds) return "";
      return new Date(epochSeconds * 1000).toLocaleString();
    }

    // --- Navigating the shell itself (double-click open) ---------------------
    // This template runs in an iframe whose ancestor (window.top) is the shell.
    // "Opening" a child means navigating the shell to it — for a file, its
    // default view; for a folder, back into this preview (?_mode=preview) so
    // browsing stays in the preview. Standalone (/render opened directly) has
    // window.top === window, so it just navigates itself.
    function shellPrefix() {
      try {
        return window.top.location.pathname.startsWith("/embed/") ? "/embed/" : "/view/";
      } catch (e) {
        return "/view/";
      }
    }
    function urlForPath(absPath, search) {
      const enc = absPath.replace(/^\/+/, "").split("/").filter(Boolean)
        .map(encodeURIComponent).join("/");
      return shellPrefix() + enc + (search || "");
    }
    function openInShell(absPath, isDir) {
      window.top.location.href = urlForPath(absPath, isDir ? "?_mode=preview" : "");
    }

    // --- Preview pane --------------------------------------------------------
    function showPlaceholder(html) {
      previewPaneEl.innerHTML = `<div class="pane-center">${html}</div>`;
    }

    function previewFolder(entry) {
      showPlaceholder(
        `<div class="big-icon">${iconSvg(entry.name, true)}</div>` +
        `<div class="title">${escapeHtml(entry.name)}</div>` +
        `<div class="hint">Folder — double-click to open</div>` +
        `<button type="button" id="open-folder-btn">Open folder</button>`
      );
      const btn = document.getElementById("open-folder-btn");
      if (btn) btn.addEventListener("click", () => openInShell(entry.path, true));
    }

    // Reuse the app's own template pipeline: stat the clicked file to discover
    // its default template, then embed the normal /render iframe. A file with
    // no bound template falls back to a metadata card.
    async function previewFile(entry) {
      showPlaceholder(`<div class="hint">Loading preview…</div>`);
      try {
        const st = await fused.stat(entry.path);
        if (selectedPath !== entry.path) return; // superseded by another click
        const t = st.templates && st.templates[0];
        if (!t) {
          showPlaceholder(
            `<div class="big-icon">${iconSvg(entry.name, false)}</div>` +
            `<div class="title">${escapeHtml(entry.name)}</div>` +
            `<div class="hint">No preview for this file type — ${escapeHtml(formatSize(entry.size))}.</div>` +
            `<button type="button" id="open-file-btn">Open</button>`
          );
          const btn = document.getElementById("open-file-btn");
          if (btn) btn.addEventListener("click", () => openInShell(entry.path, false));
          return;
        }
        const src = t.mode === "_render"
          ? `/render?path=${encodeURIComponent(entry.path)}`
          : `/render?path=${encodeURIComponent(t.path)}&_file=${encodeURIComponent(entry.path)}`;
        const frame = document.createElement("iframe");
        frame.id = "preview-frame";
        frame.src = src;
        previewPaneEl.innerHTML = "";
        previewPaneEl.appendChild(frame);
      } catch (err) {
        if (selectedPath !== entry.path) return;
        showPlaceholder(`<div class="status-message error"><strong>` +
          `${escapeHtml(err.type || "Error")}</strong>: ${escapeHtml(err.message || "")}</div>`);
      }
    }

    function select(entry) {
      selectedPath = entry ? entry.path : null;
      // Persist selection so refresh/auto-reload restores the same preview.
      try { if (entry) fused.params.set("sel", entry.path); } catch (e) {}
      listBodyEl.querySelectorAll("tr.row").forEach((tr) => {
        tr.classList.toggle("selected", tr.getAttribute("data-path") === selectedPath);
      });
      if (!entry) { showPlaceholder(`<div class="hint">Select a file to preview.</div>`); return; }
      if (entry.is_dir) previewFolder(entry);
      else previewFile(entry);
    }

    // --- Listing -------------------------------------------------------------
    // Column order + sort rules mirror the shell's built-in listing
    // (views/Listing.tsx sortEntries): dot-entries always group last, dirs
    // group first within each, then the active key, with a name tiebreak.
    const COLUMNS = [["name", "Name"], ["size", "Size"], ["mtime", "Modified"]];

    function sortedEntries() {
      const flip = sortOrder === "desc" ? -1 : 1;
      // Case-insensitive primary order, then an exact (case-sensitive) tiebreak
      // so names differing only by case/accent get a stable, deterministic
      // order (otherwise the sort falls back to arbitrary listdir order and
      // changes between refreshes). Mirrors views/Listing.tsx byName.
      const byName = (a, b) => {
        const c = a.name.localeCompare(b.name, undefined, { sensitivity: "base" });
        return c !== 0 ? c : a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
      };
      return [...ENTRIES].sort((a, b) => {
        const aDot = a.name.startsWith("."), bDot = b.name.startsWith(".");
        if (aDot !== bDot) return aDot ? 1 : -1;              // dot entries last
        if (a.is_dir !== b.is_dir) return a.is_dir ? -1 : 1;  // dirs first
        let c;
        if (sortKey === "size") c = (a.size ?? -1) - (b.size ?? -1);
        else if (sortKey === "mtime") c = (a.mtime ?? 0) - (b.mtime ?? 0);
        else c = byName(a, b);
        if (c === 0) c = byName(a, b);
        return c * flip;
      });
    }

    function th(key, label) {
      const sorted = sortKey === key;
      const arrow = sorted ? (sortOrder === "asc" ? " ▲" : " ▼") : "";
      return `<th data-key="${key}" class="${sorted ? "sorted" : ""}">${escapeHtml(label)}` +
        `<span class="sort-arrow">${arrow}</span></th>`;
    }

    // One <tr>; `label` is pre-built HTML for the name cell (plain name, or a
    // highlighted relative path when searching).
    function rowHtml(r, label) {
      const size = r.is_dir ? "" : formatSize(r.size);
      const sel = r.path === selectedPath ? " selected" : "";
      const ign = r.ignored ? " ignored" : "";
      return `<tr class="row${sel}${ign}" data-path="${escapeHtml(r.path)}" data-dir="${r.is_dir ? 1 : 0}">` +
        `<td class="name"><span class="icon">${iconSvg(r.name, r.is_dir)}</span>${label}</td>` +
        `<td class="size">${escapeHtml(size)}</td>` +
        `<td class="mtime">${escapeHtml(formatMtime(r.mtime))}</td></tr>`;
    }

    // Attach click/dblclick to every rendered row, resolving the row against
    // `currentRows` (the listing entries OR the search hits).
    function bindRows() {
      listBodyEl.querySelectorAll("tr.row").forEach((tr) => {
        const path = tr.getAttribute("data-path");
        const r = currentRows.find((e) => e.path === path);
        if (!r) return;
        tr.addEventListener("click", () => select(r));
        tr.addEventListener("dblclick", () => openInShell(r.path, r.is_dir));
      });
    }

    // Route between the plain listing and the search results.
    function render() {
      if (query.trim()) renderSearch();
      else { searchCountEl.textContent = ""; renderList(); }
    }

    function renderList() {
      currentRows = sortedEntries();
      const head = `<thead><tr>${COLUMNS.map(([k, l]) => th(k, l)).join("")}</tr></thead>`;
      let body = currentRows.length === 0 && !TRUNCATED
        ? `<tr><td colspan="3" class="status-message">Empty directory</td></tr>`
        : currentRows.map((r) => rowHtml(r, `<span class="label">${escapeHtml(r.name)}</span>`)).join("");
      // A truncated listing gets a slim banner row after the entries (mirrors
      // views/Listing.tsx): the directory has more entries than the server
      // cap. When the route is resumable (cursor non-null) it carries a Load
      // more button that appends the next page.
      if (TRUNCATED) {
        body += `<tr><td colspan="3" class="status-message">` +
          `Showing first ${currentRows.length} entries — directory listing is partial. ` +
          (CURSOR
            ? `<button type="button" id="load-more-btn"${loadingMore ? " disabled" : ""}>` +
              `${loadingMore ? "Loading…" : "Load more"}</button>`
            : "") +
          `</td></tr>`;
      }
      listBodyEl.innerHTML = `<table class="listing-table">${head}<tbody>${body}</tbody></table>`;

      listBodyEl.querySelectorAll("th[data-key]").forEach((el) => {
        el.addEventListener("click", () => {
          const key = el.getAttribute("data-key");
          if (sortKey === key) sortOrder = sortOrder === "asc" ? "desc" : "asc";
          else { sortKey = key; sortOrder = "asc"; }
          renderList();
        });
      });
      const moreBtn = document.getElementById("load-more-btn");
      if (moreBtn) moreBtn.addEventListener("click", loadMore);
      bindRows();
    }

    // Fetch the next page of a truncated resumable listing and APPEND it
    // (dedupe by name — a rename between pages could repeat an entry). A
    // navigation while the fetch is in flight changes baseDir; the stale page
    // is discarded, not merged (mirrors views/Listing.tsx loadMore).
    async function loadMore() {
      if (!CURSOR || loadingMore) return;
      const dirAtStart = baseDir, cursor = CURSOR;
      loadingMore = true;
      renderList();
      try {
        const res = await fetch("/api/fs/list?path=" + encodeURIComponent(dirAtStart) +
          "&cursor=" + encodeURIComponent(cursor));
        const data = await res.json();
        if (!res.ok) throw new Error((data && data.error) || "HTTP " + res.status);
        if (baseDir !== dirAtStart || CURSOR !== cursor) return; // superseded
        const seen = new Set(ENTRIES.map((e) => e.name));
        for (const e of data.entries || []) {
          if (seen.has(e.name)) continue;
          ENTRIES.push({ ...e, path: dirAtStart + "/" + e.name });
        }
        TRUNCATED = !!data.truncated;
        CURSOR = data.cursor || null;
      } catch (err) {
        // Leave the partial listing in place; the button just re-arms so the
        // user can retry (a continuation failure is a retryable 503).
        console.error("load more failed:", err);
      } finally {
        loadingMore = false;
        if (baseDir === dirAtStart) render();
      }
    }

    // A dot-leading query (".foo" or "sub/.foo") is explicit intent to include
    // hidden entries — the walk otherwise prunes them (matches Listing.tsx).
    function queryWantsHidden(q) {
      const t = q.trim();
      return t.startsWith(".") || t.includes("/.");
    }

    // Rank: longest consecutive matched run, then fuzzy score, then shallower
    // path, then alphabetical (mirrors Listing.tsx). On top of the fuzzy score
    // the entry NAME (last path segment) gets intent bonuses: an exact name
    // match outranks everything, a name-prefix match ranks above a scattered
    // subsequence — so "Downloads" beats "DownloadStage" for the query
    // "downloads" (Listing.tsx scoreEntries).
    function searchWalk(q, entries) {
      const ql = q.toLowerCase();
      const hits = [];
      for (const entry of entries) {
        const m = fuzzyMatch(q, entry.rel);
        if (!m) continue;
        const name = entry.rel.split("/").pop().toLowerCase();
        let score = m.score;
        if (name === ql) score += 100;
        else if (name.startsWith(ql)) score += 25;
        hits.push({ entry, positions: m.positions, score, longestRun: m.longestRun });
      }
      hits.sort((a, b) => {
        if (b.longestRun !== a.longestRun) return b.longestRun - a.longestRun;
        if (b.score !== a.score) return b.score - a.score;
        const ad = a.entry.rel.split("/").length, bd = b.entry.rel.split("/").length;
        if (ad !== bd) return ad - bd;
        return a.entry.rel.localeCompare(b.entry.rel, undefined, { sensitivity: "base" });
      });
      return hits;
    }

    async function renderSearch() {
      const q = query.trim();
      const wantHidden = queryWantsHidden(q);
      // (Re)fetch the recursive walk when the cache is missing or for the wrong
      // folder / hidden generation.
      if (!WALK || WALK.dir !== baseDir || WALK.hidden !== wantHidden) {
        // Clear the selectable rows while a message-only view is up, so arrow
        // keys / Enter can't drive preview or navigation against a stale list.
        currentRows = [];
        listBodyEl.innerHTML = `<div class="status-message">Searching…</div>`;
        searchCountEl.textContent = "";
        try {
          const url = "/api/fs/walk?path=" + encodeURIComponent(baseDir) + (wantHidden ? "&hidden=1" : "");
          const res = await fetch(url);
          const data = await res.json();
          if (!res.ok) throw new Error((data && data.error) || "HTTP " + res.status);
          WALK = { dir: baseDir, hidden: wantHidden, entries: data.entries || [], truncated: !!data.truncated };
        } catch (err) {
          listBodyEl.innerHTML = `<div class="status-message error">Search failed: ${escapeHtml(err.message || String(err))}</div>`;
          return;
        }
        if (query.trim() !== q) return; // query moved on while fetching
      }

      const ranked = searchWalk(q, WALK.entries);
      currentRows = ranked.slice(0, MAX_RESULTS).map(({ entry, positions }) => ({
        name: entry.rel.split("/").pop(),
        rel: entry.rel,
        path: baseDir + "/" + entry.rel,
        is_dir: entry.is_dir,
        size: entry.size,
        mtime: entry.mtime,
        ignored: entry.ignored,
        positions,
      }));

      const head = `<thead><tr>${COLUMNS.map(([, l]) => `<th>${escapeHtml(l)}</th>`).join("")}</tr></thead>`;
      // Distinguish "nothing matched" from "nothing matched in the part we
      // could scan" — a truncated walk means the file may simply never have
      // been walked (matches Listing.tsx's honest empty state).
      const noMatchMsg = WALK.truncated
        ? "No matches in the first entries scanned — this folder tree is too large to search fully"
        : "No matches";
      const body = currentRows.length === 0
        ? `<tr><td colspan="3" class="status-message">${escapeHtml(noMatchMsg)}</td></tr>`
        : currentRows.map((r) =>
            rowHtml(r, `<span class="search-path">${highlightHtml(r.rel, r.positions)}</span>`)).join("");
      listBodyEl.innerHTML = `<table class="listing-table">${head}<tbody>${body}</tbody></table>`;
      bindRows();

      const total = ranked.length;
      const suffix = WALK.truncated ? "+" : "";
      searchCountEl.textContent = total === 0 ? ""
        : total > MAX_RESULTS ? `${MAX_RESULTS} of ${total}${suffix}`
        : `${total}${suffix} match${total === 1 ? "" : "es"}`;
    }

    // Arrow-key navigation over whatever is rendered (listing or search hits).
    // Up/Down drive the selection even while the caret is in the search box (a
    // single-line input doesn't need them for the caret), so you can type to
    // filter and keep navigating without reaching for the mouse; Left/Right
    // still move the caret. Enter opens the selection, or the top row when
    // nothing is selected yet.
    function onKey(e) {
      // While an IME is composing, Enter confirms a candidate and the arrows
      // move through the candidate list — never repurpose them for navigation.
      if (e.isComposing) return;
      const el = document.activeElement;
      const typing = el === searchEl;
      // Only drive navigation from the search box or when nothing in particular
      // is focused (body). If focus is on a control — the "Open" button in the
      // preview pane, or the preview iframe — leave its keys alone.
      const onBody = !el || el === document.body || el === document.documentElement;
      const navActive = typing || onBody;
      // Start typing → focus the search box so the character lands there. Only
      // when nothing else is focused, and only plain printable keys (no
      // modifiers), so Space on a focused button and shortcuts keep working.
      if (onBody && e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        searchEl.focus();
        return; // let the keystroke fall through into the now-focused input
      }
      const rows = currentRows;
      if (!rows.length) return;
      if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        if (!navActive) return;
        e.preventDefault();
        const idx = rows.findIndex((r) => r.path === selectedPath);
        // Nothing selected yet: Down starts at the top, Up starts at the bottom.
        let next = idx === -1
          ? (e.key === "ArrowDown" ? 0 : rows.length - 1)
          : (e.key === "ArrowDown" ? idx + 1 : idx - 1);
        next = Math.max(0, Math.min(rows.length - 1, next));
        const entry = rows[next];
        select(entry);
        const tr = listBodyEl.querySelector(`tr.row[data-path="${CSS.escape(entry.path)}"]`);
        if (tr) tr.scrollIntoView({ block: "nearest" });
      } else if (e.key === "Enter") {
        if (!navActive) return;
        e.preventDefault();
        const entry = rows.find((r) => r.path === selectedPath) || rows[0];
        if (entry) openInShell(entry.path, entry.is_dir);
      }
    }

    // --- Search box ----------------------------------------------------------
    (function () {
      let timer = null;
      searchEl.addEventListener("input", () => {
        query = searchEl.value;
        // Debounce so the fuzzy scan/render doesn't run on every keystroke.
        clearTimeout(timer);
        timer = setTimeout(render, 120);
      });
      searchEl.addEventListener("keydown", (e) => {
        if (e.key === "Escape") { e.preventDefault(); searchEl.value = ""; query = ""; render(); searchEl.blur(); }
      });
    })();

    // --- Draggable divider ---------------------------------------------------
    (function () {
      const divider = document.getElementById("divider");
      let dragging = false;
      divider.addEventListener("mousedown", (e) => {
        dragging = true;
        divider.classList.add("dragging");
        document.body.style.userSelect = "none";
        e.preventDefault();
      });
      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        const rect = previewPaneEl.parentElement.getBoundingClientRect();
        // Preview is the right pane: its width tracks the distance from the
        // cursor to the container's right edge.
        const w = Math.max(220, Math.min(rect.width * 0.65, rect.right - e.clientX));
        previewPaneEl.style.flexBasis = w + "px";
      });
      window.addEventListener("mouseup", () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove("dragging");
        document.body.style.userSelect = "";
      });
    })();

    // --- Load ----------------------------------------------------------------
    // Reuse the shell's own directory endpoint (the same one the built-in
    // listing uses via lib/api.listDir), so entries — dotfiles included, plus
    // the gitignore `ignored` flag and raw size/mtime — match it exactly.
    async function load() {
      const dir = fused.params.get("_file");
      if (!dir) {
        listBodyEl.innerHTML = `<div class="status-message error">No folder selected (missing _file param).</div>`;
        return;
      }
      try {
        const res = await fetch("/api/fs/list?path=" + encodeURIComponent(dir));
        const data = await res.json();
        if (!res.ok) throw new Error((data && data.error) || "HTTP " + res.status);
        baseDir = data.path.replace(/\/+$/, "");
        WALK = null; // invalidate any cached walk for a previous folder
        // Give each entry an absolute path (the endpoint returns bare names);
        // everything downstream keys on `path`.
        ENTRIES = (data.entries || []).map((e) => ({ ...e, path: baseDir + "/" + e.name }));
        TRUNCATED = !!data.truncated;
        CURSOR = data.cursor || null;
        loadingMore = false;
        render();
        // Restore a previously-selected child if it still exists.
        const sel = fused.params.get("sel");
        const entry = sel ? ENTRIES.find((e) => e.path === sel) : null;
        select(entry || null);
      } catch (err) {
        listBodyEl.innerHTML = `<div class="status-message error"><strong>Error</strong>: ` +
          `${escapeHtml(err.message || String(err))}</div>`;
      }
    }

    document.addEventListener("keydown", onKey);
    load();
  </script>
</body>
</html>
