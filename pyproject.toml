[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fused-render"
version = "0.1.0"
description = "Local file explorer with Python-powered renderable HTML previews"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "pyarrow>=14",
]

[project.optional-dependencies]
# Baked into the bundled CPython of the .app (SPEC DM-2): users of the packaged
# app cannot pip install, so the interpreter ships with the popular data stack.
# Dev installs: pip install -e ".[bundled]"
bundled = [
    "numpy",
    "pandas",
    "requests",
    "duckdb",
    "polars",
    "matplotlib",
    "scipy",
    "pillow",
    "openpyxl",
    "shapely",
    "geopandas",
]

[project.scripts]
fused-render = "fused_render.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["fused_render"]
