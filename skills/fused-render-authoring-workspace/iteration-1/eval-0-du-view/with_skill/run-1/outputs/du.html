<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Largest files</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    padding: 24px;
    background: #1e1e1e;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 16px; color: #fff; }
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .field { display: flex; align-items: center; gap: 8px; }
  label { color: #999; }
  input[type="text"] {
    width: 420px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 4px;
    color: #eee;
    padding: 6px 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
  }
  input[type="number"] {
    width: 80px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 4px;
    color: #eee;
    padding: 6px 8px;
    font-size: 13px;
  }
  input:focus { outline: 1px solid #6cf; }
  .summary { color: #888; margin-bottom: 12px; }
  .summary b { color: #ccc; }
  table { border-collapse: collapse; width: 100%; }
  th, td {
    text-align: left;
    padding: 6px 12px;
    border-bottom: 1px solid #333;
  }
  th {
    color: #999;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.03em;
  }
  td.size { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  th.size { text-align: right; }
  td.path { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #bbb; }
  tr:hover td { background: #262626; }
  .bar { display: inline-block; height: 8px; background: #4a90d9; border-radius: 2px; margin-left: 8px; vertical-align: middle; }
  .error { color: #e88; padding: 8px 0; }
  .muted { color: #777; }
</style>
</head>
<body>

<h1>Largest files</h1>

<div class="controls">
  <div class="field">
    <label for="path">directory</label>
    <input id="path" type="text" spellcheck="false" autocomplete="off">
  </div>
  <div class="field">
    <label for="topN">top N</label>
    <input id="topN" type="number" min="1" max="1000" step="1">
  </div>
</div>

<div id="summary" class="summary"></div>
<div id="out">Loading&hellip;</div>

<script>
  const pathEl = document.getElementById("path");
  const topNEl = document.getElementById("topN");
  const summaryEl = document.getElementById("summary");
  const out = document.getElementById("out");

  const DEFAULT_PATH = ".";
  const DEFAULT_TOP_N = "20";

  let debounceTimer = null;
  let requestSeq = 0;

  function debounce(fn, ms) {
    return (...args) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => fn(...args), ms);
    };
  }

  function fmtBytes(n) {
    if (n < 1024) return n + " B";
    const units = ["KB", "MB", "GB", "TB", "PB"];
    let v = n;
    for (const u of units) {
      v /= 1024;
      if (v < 1024) return v.toFixed(v < 10 ? 2 : 1) + " " + u;
    }
    return v.toFixed(1) + " PB";
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function renderTable(entries, maxSize) {
    if (entries.length === 0) {
      return '<div class="muted">No files found.</div>';
    }
    const rows = entries.map(e => {
      const pct = maxSize > 0 ? Math.max(2, Math.round((e.size / maxSize) * 120)) : 0;
      return `<tr>
        <td class="path">${escapeHtml(e.path)}</td>
        <td class="size">${fmtBytes(e.size)}<span class="bar" style="width:${pct}px"></span></td>
      </tr>`;
    }).join("");
    return `<table>
      <thead><tr><th>path</th><th class="size">size</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  async function draw() {
    const path = fused.params.get("path") || DEFAULT_PATH;
    const topN = fused.params.get("top_n") || DEFAULT_TOP_N;

    // reflect URL state into controls without fighting the user's cursor
    if (document.activeElement !== pathEl) pathEl.value = path;
    if (document.activeElement !== topNEl) topNEl.value = topN;

    const mySeq = ++requestSeq;
    summaryEl.textContent = "";
    out.textContent = "Loading…";

    try {
      const data = await fused.runPython("./du.py", { path, top_n: topN });
      if (mySeq !== requestSeq) return; // stale response, drop it

      if (data.error) {
        out.innerHTML = `<div class="error">${escapeHtml(data.error)}</div>`;
        return;
      }

      const maxSize = data.entries.length ? data.entries[0].size : 0;
      summaryEl.innerHTML = `<b>${data.total_files}</b> files scanned under <b>${escapeHtml(data.path)}</b>, ` +
        `total <b>${fmtBytes(data.total_size)}</b>` +
        (data.scan_errors ? `, <span class="muted">${data.scan_errors} unreadable</span>` : "") +
        ` &mdash; showing top ${data.entries.length}`;
      out.innerHTML = renderTable(data.entries, maxSize);
    } catch (err) {
      if (mySeq !== requestSeq) return;
      out.innerHTML = `<div class="error">${escapeHtml(err.type || "Error")}: ${escapeHtml(err.message || String(err))}</div>`;
    }
  }

  const commitPath = debounce(() => fused.params.set("path", pathEl.value || DEFAULT_PATH), 400);
  const commitTopN = debounce(() => {
    const n = parseInt(topNEl.value, 10);
    fused.params.set("top_n", String(Number.isFinite(n) && n > 0 ? n : DEFAULT_TOP_N));
  }, 400);

  pathEl.addEventListener("input", commitPath);
  topNEl.addEventListener("input", commitTopN);

  fused.params.onChange(draw);
  draw();
</script>

</body>
</html>
