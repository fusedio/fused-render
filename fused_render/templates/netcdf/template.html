<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>NetCDF map preview</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e8eaed; background: #131417; font-size: 13px; }
  #map { position: absolute; inset: 0; }
  .panel { position: absolute; background: rgba(19,20,23,.92); border: 1px solid #2a2d33;
    border-radius: 10px; padding: 10px 12px; backdrop-filter: blur(6px); z-index: 10; }
  #topbar { top: 10px; left: 10px; right: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  #topbar label { color: #9aa0a6; margin: 0 2px 0 6px; }
  input[type=text], select { font: inherit; color: #e8eaed; background: #1b1d21;
    border: 1px solid #2a2d33; border-radius: 6px; padding: 4px 8px; }
  #path { flex: 1; min-width: 200px; }
  button { font: inherit; color: #e8eaed; background: #2b5fd9; border: 1px solid #2b5fd9;
    border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  button:hover { background: #3a6ee8; }
  button.ghost { background: transparent; border-color: #2a2d33; color: #9aa0a6; }
  button.ghost:hover { color: #e8eaed; border-color: #4a4d55; }
  #histPanel { right: 10px; bottom: 26px; width: 340px; user-select: none; }
  #histPanel h2, #metaPanel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    color: #9aa0a6; margin: 0 0 6px; display: flex; justify-content: space-between; align-items: center; }
  #histCanvas { width: 100%; height: 110px; display: block; cursor: crosshair; }
  #histStats { color: #9aa0a6; font-size: 11px; margin-top: 6px; font-variant-numeric: tabular-nums; }
  #histActions { display: flex; gap: 6px; margin-top: 6px; }
  #histActions button { font-size: 11px; padding: 2px 8px; }
  #readout { left: 56px; bottom: 26px; font-size: 12px; font-variant-numeric: tabular-nums;
    color: #cdd0d4; max-width: 460px; }
  #readout b { color: #8ab4ff; }
  #status { position: absolute; left: 50%; top: 64px; transform: translateX(-50%);
    background: rgba(19,20,23,.9); border: 1px solid #2a2d33; border-radius: 999px;
    padding: 4px 14px; color: #9aa0a6; z-index: 20; display: none; }
  #status.err { color: #ff7b72; display: block; }
  #metaPanel { right: 10px; top: 58px; width: 360px; max-height: 60vh; overflow: auto; display: none; }
  #metaPanel table { border-collapse: collapse; width: 100%; font-size: 12px; }
  #metaPanel td { padding: 3px 6px; border-bottom: 1px solid #23262c; vertical-align: top; word-break: break-all; }
  #metaPanel td:first-child { color: #9aa0a6; white-space: nowrap; }
  #explorer { left: 10px; top: 58px; width: 420px; max-height: 65vh; display: none; z-index: 30; }
  #crumbs { font-size: 12px; margin-bottom: 8px; color: #9aa0a6; }
  #crumbs a { color: #8ab4ff; cursor: pointer; }
  #explorerList { max-height: 48vh; overflow: auto; border: 1px solid #23262c; border-radius: 6px; }
  .row { display: flex; align-items: center; gap: 8px; padding: 5px 10px; cursor: pointer;
    font-size: 13px; border-bottom: 1px solid #1e2025; }
  .row:hover { background: #23262c; }
  .row .ic { width: 18px; text-align: center; }
  .row .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .sz { color: #6b7178; font-size: 11px; }
  input[type=range] { vertical-align: middle; }
  #idxRange { width: 160px; }
  #idxLabel { color: #cdd0d4; min-width: 9em; display: inline-block; font-variant-numeric: tabular-nums; }
  #imgFallback { position: absolute; inset: 0; display: none; overflow: auto;
    background: #0c0d0f; z-index: 5; text-align: center; padding: 70px 20px 20px; }
  #imgFallback img { max-width: 96%; image-rendering: pixelated; border: 1px solid #2a2d33; }
</style>
</head>
<body>
  <div id="map"></div>
  <div id="imgFallback"><img id="fallbackImg" /></div>

  <div class="panel" id="topbar">
    <button id="browse" class="ghost">📁</button>
    <input type="text" id="path" placeholder="/absolute/path/to/file.nc" />
    <button id="load">Load</button>
    <span><label for="var">variable</label><select id="var"></select></span>
    <span id="idxRow" style="display:none"><label id="idxName">index</label>
      <input type="range" id="idxRange" min="0" max="0" value="0" />
      <span id="idxLabel"></span></span>
    <span><label for="cmap">cmap</label>
      <select id="cmap"><option>viridis</option><option>magma</option><option>turbo</option><option value="rdbu">RdBu</option><option value="grays">grays</option></select></span>
    <span><label for="opacity">opacity</label><input type="range" id="opacity" min="0" max="100" value="90" style="width:90px" /></span>
    <span><label for="basemap">basemap</label><input type="checkbox" id="basemap" checked /></span>
    <button id="metaBtn" class="ghost">info</button>
    <button id="fitBtn" class="ghost">⤢ fit</button>
  </div>

  <div id="status"></div>

  <div class="panel" id="explorer">
    <div id="crumbs"></div>
    <div id="explorerList"></div>
    <label style="display:block;margin-top:8px;color:#9aa0a6;font-size:12px">
      <input type="checkbox" id="showAll" /> show all files</label>
  </div>

  <div class="panel" id="metaPanel"><h2>Dataset info <a id="metaClose" style="cursor:pointer;color:#8ab4ff">×</a></h2><div id="metaBody"></div></div>

  <div class="panel" id="readout">…</div>

  <div class="panel" id="histPanel">
    <h2>Viewport histogram <span id="histMode" style="text-transform:none;letter-spacing:0"></span></h2>
    <canvas id="histCanvas" width="640" height="220"></canvas>
    <div id="histStats"></div>
    <div id="histActions">
      <label style="color:#9aa0a6;font-size:11px;display:flex;align-items:center;gap:4px"><input type="checkbox" id="autoStretch" /> auto stretch</label>
      <button id="stretchBtn" class="ghost" title="Use this viewport's 2–98th pct as the color stretch">stretch → viewport</button>
      <button id="stretchReset" class="ghost">reset stretch</button>
      <button id="clipReset" class="ghost" style="display:none">clear clip</button>
    </div>
  </div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const els = ['path','load','var','idxRow','idxName','idxRange','idxLabel','cmap','opacity','basemap',
  'metaBtn','metaPanel','metaBody','metaClose','fitBtn','status','readout',
  'histCanvas','histStats','histMode','autoStretch','stretchBtn','stretchReset','clipReset','browse','explorer',
  'crumbs','explorerList','showAll','imgFallback','fallbackImg']
  .reduce((o, k) => (o[k] = $(k), o), {});

// ---- format-specific bits (netcdf vs zarr differ ONLY here) ----
const EXTS = '.nc';
const DEFAULT_FILE = "";
function storeRoot(p){
  // zarr dispatch hands us a marker file inside the store — use its folder
  return p.replace(/\/(\.zgroup|\.zattrs|\.zmetadata)$/, '');
}

const P = {
  file:  () => storeRoot(fused.params.get('file') || fused.params.get('_file') || DEFAULT_FILE),
  vr:    () => fused.params.get('var') || '',
  index: () => fused.params.get('index') || '0',
  cmap:  () => fused.params.get('cmap') || 'viridis',
  stretch: () => fused.params.get('stretch') || '',
  autoStretch: () => (fused.params.get('autostretch') ?? '1') === '1',
  vlo:   () => fused.params.get('vlo') || '',
  vhi:   () => fused.params.get('vhi') || '',
  dir:   () => fused.params.get('dir') || P.file().replace(/\/[^/]*$/, '') || '~',
  showAll:() => fused.params.get('showall') === '1',
};
const fmt = (x, d) => (x === null || x === undefined || !isFinite(x)) ? '—'
  : Math.abs(x) >= 1000 ? Number(x).toLocaleString('en-US', {maximumFractionDigits: 0})
  : Number(x).toFixed(d === undefined ? (Math.abs(x) >= 10 ? 1 : 3) : d);
const human = n => n > 1e9 ? (n/1e9).toFixed(2)+' GB' : n > 1e6 ? (n/1e6).toFixed(1)+' MB' : Math.round(n/1e3)+' KB';
function status(msg, err){ els.status.textContent = msg || ''; els.status.style.display = msg ? 'block' : 'none'; els.status.className = err ? 'err' : ''; }

// ---------------- map ----------------
const DARK = "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json";
const map = new maplibregl.Map({ container: 'map', style: DARK, center: [0, 20], zoom: 1.2,
  attributionControl: {compact: true}, fadeDuration: 80 });
map.addControl(new maplibregl.NavigationControl({showCompass: false}), 'bottom-left');
map.addControl(new maplibregl.ScaleControl({unit: 'metric'}), 'bottom-right');
async function styleReady(){
  map.resize();
  for (let i = 0; i < 200 && !map.isStyleLoaded(); i++)
    await new Promise(r => setTimeout(r, 50));
  map.resize();
}

// ---------------- daemon + state ----------------
let daemon = null, meta = null, geographic = false;
let histTimer = null, histAbort = null;

async function ensureDaemon(){
  if (daemon && daemon.port) return daemon;
  const r = await fused.runPython('./grid_tile_server.py', {}).catch(() => null);
  if (r && r.port) daemon = r;
  return daemon;
}
const dURL = p => `http://127.0.0.1:${daemon.port}${p}`;

function sliceQuery(){
  return new URLSearchParams({ file: P.file(), var: P.vr(), index: P.index() });
}
function renderQuery(){
  const q = sliceQuery();
  q.set('cmap', P.cmap());
  if (P.stretch()) q.set('stretch', P.stretch());
  if (P.vlo() !== '' && P.vhi() !== ''){ q.set('vlo', P.vlo()); q.set('vhi', P.vhi()); }
  return q.toString();
}

function setRasterTiles(){
  const url = dURL(`/tile/{z}/{x}/{y}.png?${renderQuery()}`);
  const src = map.getSource('raster');
  if (src){ src.setTiles([url]); return; }
  const lb = meta.lonlat_bounds;
  map.addSource('raster', { type: 'raster', tiles: [url], tileSize: 256, minzoom: 0,
    maxzoom: 12, bounds: [lb.west, lb.south, lb.east, lb.north] });
  map.addLayer({ id: 'raster', type: 'raster', source: 'raster',
    paint: { 'raster-opacity': +els.opacity.value / 100, 'raster-fade-duration': 80,
             'raster-resampling': 'nearest' } });
}

function fitToData(instant){
  const lb = meta && meta.lonlat_bounds;
  if (!lb) return;
  map.fitBounds([[lb.west, lb.south], [lb.east, lb.north]],
    {padding: 60, duration: instant === false ? 400 : 0, maxZoom: 10});
}

function showImgFallback(){
  els.imgFallback.style.display = 'block';
  els.fallbackImg.src = dURL(`/img?${renderQuery()}&max_cells=800000&_t=${Date.now()}`);
  drawWholeHist();
}

// ---------------- histogram ----------------
let lastHist = null, histSel = null;

function viewportMercBbox(){
  const b = map.getBounds();
  const R = 6378137, l2m = (lon, lat) => [lon * Math.PI / 180 * R,
    Math.log(Math.tan(Math.PI / 4 + Math.min(85, Math.max(-85, lat)) * Math.PI / 360)) * R];
  const [w, s] = l2m(b.getWest(), b.getSouth()), [e, n] = l2m(b.getEast(), b.getNorth());
  return [w, s, e, n];
}

async function refreshHist(useViewport){
  if (!daemon || !meta) return;
  const q = sliceQuery();
  q.set('bins', '60');
  if (useViewport !== false && geographic) q.set('bbox', viewportMercBbox().join(','));
  try {
    if (histAbort) histAbort.abort();
    histAbort = new AbortController();
    const r = await fetch(dURL('/hist?' + q), {signal: histAbort.signal});
    lastHist = await r.json();
    drawHist();
    maybeAutoStretch();
  } catch (e) {}
}
function drawWholeHist(){ refreshHist(false); }

function drawHist(){
  const c = els.histCanvas, ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  const ch = lastHist && lastHist.channels && lastHist.channels[0];
  if (!ch || !ch.counts){ els.histStats.textContent = 'no data in viewport'; return; }
  const maxC = Math.max(...ch.counts);
  els.histMode.textContent = P.vr() || (meta && meta.selected) || '';
  const n = ch.counts.length, bw = c.width / n;
  ctx.fillStyle = '#5c9dff';
  for (let i = 0; i < n; i++){
    const h = Math.pow(ch.counts[i] / maxC, 0.5) * (c.height - 14);
    ctx.fillRect(i * bw, c.height - h, Math.max(1, bw - 1), h);
  }
  if (P.vlo() !== '' && P.vhi() !== ''){
    const e0 = ch.edges[0], e1 = ch.edges[ch.edges.length - 1];
    const x0 = (P.vlo() - e0) / (e1 - e0) * c.width, x1 = (P.vhi() - e0) / (e1 - e0) * c.width;
    ctx.fillStyle = '#ffffff22'; ctx.fillRect(x0, 0, x1 - x0, c.height);
    ctx.strokeStyle = '#ffcf70'; ctx.strokeRect(x0, 0, x1 - x0, c.height);
  }
  if (histSel){
    ctx.fillStyle = '#ffffff26';
    ctx.fillRect(Math.min(...histSel), 0, Math.abs(histSel[1] - histSel[0]), c.height);
  }
  els.histStats.textContent =
    `${geographic ? 'viewport' : 'slice'}: min ${fmt(ch.min)}  max ${fmt(ch.max)}  mean ${fmt(ch.mean)}  median ${fmt(ch.median)}  σ ${fmt(ch.std)}  n ${ch.count.toLocaleString()}`;
  els.clipReset.style.display = (P.vlo() !== '') ? '' : 'none';
}

let dragX = null;
els.histCanvas.addEventListener('mousedown', e => { dragX = e.offsetX * els.histCanvas.width / els.histCanvas.clientWidth; histSel = [dragX, dragX]; });
window.addEventListener('mousemove', e => {
  if (dragX === null) return;
  const r = els.histCanvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * els.histCanvas.width / r.width;
  histSel = [dragX, Math.max(0, Math.min(els.histCanvas.width, x))];
  drawHist();
});
window.addEventListener('mouseup', () => {
  if (dragX === null) return;
  const ch = lastHist && lastHist.channels && lastHist.channels[0];
  const sel = histSel; dragX = null; histSel = null;
  if (!ch || !ch.edges || !sel || Math.abs(sel[1] - sel[0]) < 4){ drawHist(); return; }
  const c = els.histCanvas, e0 = ch.edges[0], e1 = ch.edges[ch.edges.length - 1];
  const lo = e0 + Math.min(...sel) / c.width * (e1 - e0);
  const hi = e0 + Math.max(...sel) / c.width * (e1 - e0);
  fused.params.set('vlo', String(lo)); fused.params.set('vhi', String(hi));
});
els.clipReset.onclick = () => { fused.params.set('vlo', ''); fused.params.set('vhi', ''); };
els.stretchBtn.onclick = () => {
  const ch = lastHist && lastHist.channels && lastHist.channels[0];
  if (!ch || ch.p2 === undefined) return;
  fused.params.set('stretch', `${ch.p2},${ch.p98}`);
};
els.stretchReset.onclick = () => { fused.params.set('autostretch', '0'); fused.params.set('stretch', ''); };

// auto stretch: re-stretch colors to the current viewport after every pan/zoom
function maybeAutoStretch(){
  if (!P.autoStretch()) return;
  const chans = lastHist && lastHist.channels;
  if (!chans || !chans[0] || chans[0].p2 === undefined) return;
  const s = chans.filter(ch => ch.p2 !== undefined).map(ch => `${ch.p2},${ch.p98}`).join(',');
  if (s && s !== P.stretch()) fused.params.set('stretch', s);
}
els.autoStretch.onchange = () => {
  fused.params.set('autostretch', els.autoStretch.checked ? '1' : '0');
  if (els.autoStretch.checked) maybeAutoStretch();
};

// ---------------- hover readout ----------------
let hoverT = 0;
map.on('mousemove', async e => {
  const now = performance.now();
  if (!daemon || !geographic || now - hoverT < 120) return;
  hoverT = now;
  const q = sliceQuery();
  q.set('lon', e.lngLat.lng); q.set('lat', e.lngLat.lat);
  try {
    const r = await (await fetch(dURL('/value?' + q))).json();
    const v = (r.values || [null])[0];
    const varName = P.vr() || (meta && meta.selected) || '';
    els.readout.innerHTML = `${e.lngLat.lng.toFixed(4)}, ${e.lngLat.lat.toFixed(4)} · ` +
      (v === null ? '<span style="color:#6b7178">no data</span>' : `<b>${varName}</b> ${fmt(v)}`);
  } catch (err) {}
});

// ---------------- metadata panel ----------------
function renderMeta(){
  if (!meta) return;
  const rows = [
    ['file', P.file().split('/').pop()],
    ['size', meta.file_size ? human(meta.file_size) : '—'],
    ['engine', meta.engine],
    ['variable', meta.selected],
    ['slice shape', (meta.shape || []).join(' × ')],
    ['geographic', String(meta.geographic)],
  ];
  for (const d of meta.extra_dims || []) rows.push(['dim: ' + d.name, String(d.size)]);
  if (meta.lonlat_bounds){
    const lb = meta.lonlat_bounds;
    rows.push(['extent', `${lb.west.toFixed(3)}, ${lb.south.toFixed(3)} → ${lb.east.toFixed(3)}, ${lb.north.toFixed(3)}`]);
  }
  for (const [k, v] of Object.entries(meta.attrs || {}).slice(0, 12)) rows.push(['attr: ' + k, v]);
  els.metaBody.innerHTML = '<table>' + rows.map(([k, v]) =>
    `<tr><td>${k}</td><td>${v ?? '—'}</td></tr>`).join('') + '</table>' +
    '<h2 style="margin-top:10px">Variables</h2><table>' +
    (meta.vars || []).map(v => `<tr><td>${v.name}</td><td>${v.dims.join(',')} — ${v.dtype}${v.units ? ' (' + v.units + ')' : ''}</td></tr>`).join('') + '</table>';
}
els.metaBtn.onclick = () => { els.metaPanel.style.display = els.metaPanel.style.display === 'block' ? 'none' : 'block'; };
els.metaClose.onclick = () => els.metaPanel.style.display = 'none';
els.fitBtn.onclick = () => fitToData(false);

// ---------------- controls ----------------
function syncControls(){
  els.path.value = P.file();
  if (els.autoStretch) els.autoStretch.checked = P.autoStretch();
  els.cmap.value = P.cmap();
  if (!meta) return;
  els.var.innerHTML = (meta.vars || []).map(v =>
    `<option value="${v.name}" ${v.name === meta.selected ? 'selected' : ''}>${v.name}${v.long_name && v.long_name !== v.name ? ': ' + v.long_name.slice(0, 30) : ''}</option>`).join('');
  const ed = (meta.extra_dims || [])[0];
  if (ed && ed.size > 1){
    els.idxRow.style.display = '';
    els.idxName.textContent = ed.name;
    els.idxRange.max = ed.size - 1;
    els.idxRange.value = meta.index;
    els.idxLabel.textContent = ed.values ? String(ed.values[meta.index]).slice(0, 19)
                                         : `${meta.index} / ${ed.size - 1}`;
  } else {
    els.idxRow.style.display = 'none';
  }
}
els.load.onclick = () => fused.params.set('file', els.path.value.trim());
els.path.addEventListener('keydown', e => { if (e.key === 'Enter') els.load.click(); });
els.var.onchange = () => { fused.params.set('var', els.var.value); fused.params.set('index', '0'); };
let idxTimer = null;
els.idxRange.oninput = () => {
  const ed = (meta.extra_dims || [])[0];
  els.idxLabel.textContent = ed && ed.values ? String(ed.values[+els.idxRange.value]).slice(0, 19)
                                             : `${els.idxRange.value} / ${els.idxRange.max}`;
  clearTimeout(idxTimer);
  idxTimer = setTimeout(() => fused.params.set('index', els.idxRange.value), 200);
};
els.cmap.onchange = () => fused.params.set('cmap', els.cmap.value);
els.opacity.oninput = () => {
  if (map.getLayer('raster')) map.setPaintProperty('raster', 'raster-opacity', +els.opacity.value / 100);
};
els.basemap.onchange = () => {
  const show = els.basemap.checked ? 'visible' : 'none';
  for (const l of map.getStyle().layers)
    if (l.id !== 'raster') map.setLayoutProperty(l.id, 'visibility', show);
};

// ---------------- explorer ----------------
els.browse.onclick = async () => {
  const open = els.explorer.style.display === 'block';
  els.explorer.style.display = open ? 'none' : 'block';
  if (!open) refreshExplorer();
};
els.showAll.onchange = () => { fused.params.set('showall', els.showAll.checked ? '1' : ''); refreshExplorer(); };
const rawURL = f => `${location.origin}/api/fs/raw?path=${encodeURIComponent(f)}`;
async function refreshExplorer(dir){
  dir = dir || P.dir();
  const r = await fused.runPython('./browse.py', { dir, exts: EXTS, show_all: P.showAll() ? 'true' : 'false', src: rawURL(dir) }).catch(() => null);
  if (!r || r.error) return;
  els.crumbs.innerHTML = r.crumbs.map(c =>
    `<a data-p="${c.path}">${c.label || '/'}</a>`).join('<span style="color:#4b5058"> / </span>');
  els.crumbs.querySelectorAll('a').forEach(a => a.onclick = () => refreshExplorer(a.dataset.p));
  const entries = [...(r.dirs || []), ...(r.files || [])];
  els.explorerList.innerHTML = entries.map(e =>
    `<div class="row" data-p="${e.path}" data-d="${e.is_dir ? 1 : 0}">
       <span class="ic">${e.is_dir ? (e.name.endsWith('.zarr') ? '🧊' : '📁') : '🌐'}</span><span class="nm">${e.name}</span>
       <span class="sz">${e.size ? human(e.size) : ''}</span></div>`).join('') || '<div class="row" style="color:#6b7178">empty</div>';
  els.explorerList.querySelectorAll('.row[data-p]').forEach(row => row.onclick = () => {
    const p = row.dataset.p;
    if (row.dataset.d === '1' && !p.endsWith('.zarr')) refreshExplorer(p);
    else { fused.params.set('dir', p.replace(/\/[^/]*$/, '')); fused.params.set('var', ''); fused.params.set('index', '0'); fused.params.set('file', p); els.explorer.style.display = 'none'; }
  });
}

// ---------------- load orchestration ----------------
let loadedSlice = null, loadedQuery = null;

async function loadSlice(){
  if (!P.file()){ status('no file — use Browse or enter a path'); return; }
  const sq = sliceQuery().toString();
  status('Loading slice…');
  await styleReady();
  const d = await ensureDaemon();
  if (!d || !d.port){ status('daemon failed to start', true); return; }
  let m;
  try {
    m = await (await fetch(dURL('/meta?' + sq))).json();
  } catch (e) { status('daemon unreachable', true); return; }
  if (m.error){ status(m.error, true); return; }
  const firstFile = !meta || meta.file !== m.file;
  meta = m;
  geographic = !!m.geographic;
  syncControls();
  renderMeta();
  if (geographic){
    els.imgFallback.style.display = 'none';
    if (map.getLayer('raster') && firstFile){ map.removeLayer('raster'); map.removeSource('raster'); }
    setRasterTiles();
    if (firstFile) fitToData();
    refreshHist();
  } else {
    if (map.getLayer('raster')){ map.removeLayer('raster'); map.removeSource('raster'); }
    showImgFallback();
  }
  status('');
  loadedSlice = sq;
  loadedQuery = renderQuery();
}

function onParamsChanged(){
  const sq = sliceQuery().toString();
  if (sq !== loadedSlice){ loadSlice(); return; }
  syncControls();
  const q = renderQuery();
  if (q !== loadedQuery){
    loadedQuery = q;
    if (geographic){ setRasterTiles(); refreshHist(); }
    else showImgFallback();
  }
  drawHist();
}
fused.params.onChange(onParamsChanged);

map.on('moveend', () => {
  if (geographic){ clearTimeout(histTimer); histTimer = setTimeout(refreshHist, 150); }
});

loadSlice();

</script>
</body>
</html>
