<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Log preview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #e8eaed;
    background: #131417;
  }
  #bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-bottom: 1px solid #2a2d33;
    background: #1b1d21;
    position: sticky;
    top: 0;
    flex-wrap: wrap;
  }
  #bar label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #9aa0a6;
  }
  #bar input[type="number"] {
    width: 90px;
    font: inherit;
    padding: 4px 8px;
    border: 1px solid #2a2d33;
    border-radius: 6px;
    background: #131417;
    color: #e8eaed;
  }
  #meta {
    color: #9aa0a6;
  }
  #legend {
    margin-left: auto;
    display: flex;
    gap: 14px;
    color: #9aa0a6;
  }
  #legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  #legend i {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }
  #legend i.error { background: #ff6b6b; }
  #legend i.warn { background: #e3b341; }
  #log {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12.5px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .line {
    display: flex;
    gap: 12px;
    padding: 1px 12px;
    border-left: 3px solid transparent;
  }
  .line:hover {
    background: #1b1d21;
  }
  .lineno {
    flex: 0 0 auto;
    color: #5f6368;
    user-select: none;
    text-align: right;
    min-width: 4.5em;
  }
  .text {
    white-space: pre-wrap;
    word-break: break-word;
  }
  .line.error {
    background: rgba(255, 107, 107, 0.14);
    border-left-color: #ff6b6b;
  }
  .line.error .text {
    color: #ffb3b3;
  }
  .line.warn {
    background: rgba(227, 179, 65, 0.12);
    border-left-color: #e3b341;
  }
  .line.warn .text {
    color: #f0d497;
  }
  #status {
    padding: 24px;
    color: #9aa0a6;
  }
  #status.error {
    color: #ff6b6b;
  }
</style>
</head>
<body>
  <div id="bar">
    <label>last <input id="n" type="number" min="1" step="1" value="200"> lines</label>
    <span id="meta"></span>
    <span id="legend">
      <span><i class="error"></i> ERROR</span>
      <span><i class="warn"></i> WARN</span>
    </span>
  </div>
  <div id="root"><div id="status">Loading…</div></div>
  <script>
    const DEFAULT_N = 200;
    const nEl = document.getElementById("n");
    const metaEl = document.getElementById("meta");
    const root = document.getElementById("root");

    let debounceTimer = null;
    let requestId = 0;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function currentN() {
      const raw = fused.params.get("n");
      const n = raw ? parseInt(raw, 10) : DEFAULT_N;
      return Number.isFinite(n) && n > 0 ? n : DEFAULT_N;
    }

    function renderLines(data) {
      if (data.lines.length === 0) {
        root.innerHTML = `<div id="status">File is empty.</div>`;
        return;
      }
      const html = data.lines
        .map((l) => {
          const cls = l.level ? ` ${l.level}` : "";
          const num = l.lineno !== null && l.lineno !== undefined ? l.lineno : "";
          return `<div class="line${cls}"><span class="lineno">${num}</span><span class="text">${escapeHtml(l.text)}</span></div>`;
        })
        .join("");
      root.innerHTML = `<div id="log">${html}</div>`;
    }

    function renderMeta(data) {
      const total = data.counted_exact ? data.total_lines.toLocaleString() : `${data.total_lines === null ? "?" : data.total_lines} (not counted, file too large)`;
      metaEl.textContent = `showing last ${data.shown.toLocaleString()} of ${total} lines — ${data.file}`;
    }

    async function load() {
      const n = currentN();
      nEl.value = n; // reflect URL state into the control

      const file = fused.params.get("_file");
      if (!file) {
        root.innerHTML = `<div id="status" class="error">No file selected (missing _file param).</div>`;
        return;
      }

      const myRequest = ++requestId;
      root.innerHTML = `<div id="status">Loading…</div>`;
      try {
        const data = await fused.runPython("./log_reader.py", { file, n: String(n) });
        if (myRequest !== requestId) return; // a newer request superseded this one
        renderMeta(data);
        renderLines(data);
      } catch (err) {
        if (myRequest !== requestId) return;
        root.innerHTML = `<div id="status" class="error"><strong>${escapeHtml(err.type || "Error")}</strong>: ${escapeHtml(err.message || "")}</div>`;
      }
    }

    nEl.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      const val = nEl.value;
      debounceTimer = setTimeout(() => {
        const n = parseInt(val, 10);
        fused.params.set("n", String(Number.isFinite(n) && n > 0 ? n : DEFAULT_N));
      }, 200);
    });

    fused.params.onChange(load);
    load();
  </script>
</body>
</html>
