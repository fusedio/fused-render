name: test

on:
  push:
    branches: [main]
  pull_request: {}

concurrency:
  # PR number is unique repo-wide, unlike head_ref — two fork PRs that happen
  # to share a branch name (e.g. "patch-1") must not land in the same group
  # and cancel each other's runs.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # for dorny/paths-filter on pull_request

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      linux_desktop: ${{ steps.filter.outputs.linux_desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Packaging paths shared by both filters. Defined as a YAML anchor
            # (must precede the aliases that reference it) so the two filters
            # cannot drift: every linux_desktop path must also be an app path,
            # because the linux-desktop job (where the gated smoke step lives)
            # only runs when app fires. dorny/paths-filter flattens the aliased
            # sequence into each filter's own list.
            packaging: &packaging
              - 'scripts/build_linux_appimage.sh'
              - 'scripts/linux/**'
              - 'scripts/file_associations.*'
            app:
              - 'fused_render/**'
              - 'tests/**'
              - 'frontend/**'
              - 'examples_seed/**'
              - 'scripts/hatch_build.py'
              - 'pyproject.toml'
              - '.github/workflows/test.yml'
              - *packaging
            # Gates only the expensive AppImage build smoke (several minutes of
            # toolchain downloads); the cheap Linux backend test run stays on
            # the broad `app` filter above. macOS has no per-PR packaging job
            # at all (the DMG is release-tag only), so this keeps Linux at
            # parity-or-better without paying the smoke on every server PR.
            linux_desktop:
              - 'fused_render/supervisor/**'
              - 'fused_render/shell/mounts.py'
              - 'pyproject.toml'
              - '.github/workflows/test.yml'
              - *packaging

  # The React shell (frontend/) is built once here and shared with every
  # python-version job below — fused_render/server.py refuses to start
  # (RuntimeError) until fused_render/static/shell-dist/ exists (D52/D54),
  # and the output is never committed, so tests always need a fresh build.
  frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Typecheck + build shell (tsc --noEmit && vite build)
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: shell-dist
          path: fused_render/static/shell-dist/
          retention-days: 1

  test-python:
    needs: [detect-changes, frontend]
    if: needs.detect-changes.outputs.app == 'true' && needs.frontend.result == 'success'
    # Job-level permissions override (not merge with) the workflow-level
    # block above — restated here because the coverage-comment step below
    # needs pull-requests: write, which the other jobs must not have.
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: shell-dist
          path: fused_render/static/shell-dist

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install fused-render (dev extra)
        run: pip install -e ".[dev]"

      # shell/mounts.py shells out to rclone (D102/D103); not bundled outside
      # the packaged macOS app, so CI installs the real binary like a dev
      # machine would (README's "Remote storage (mounts)" section).
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Run tests
        run: >
          python -m pytest tests/ -v
          --cov=fused_render --cov-report=term-missing --cov-report=xml --cov-report=html

      # One representative version avoids 4 duplicate reports/artifacts for
      # the same source tree; 3.11 is the floor for the optional fused engine
      # (D69) so it exercises the most code paths of the matrix.
      - name: Coverage summary
        if: matrix.python-version == '3.11'
        run: |
          echo "## Coverage Report (Python ${{ matrix.python-version }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report -m >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          TOTAL=$(python -m coverage report --format=total)
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total coverage: ${TOTAL}%**" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ github.sha }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30
          # Default "warn" would let this step succeed even if pytest's --cov
          # never wrote htmlcov/coverage.xml — fail loudly instead of quietly
          # shipping an empty coverage artifact.
          if-no-files-found: error

      # Same action + pin as the `fused` and `application/fused-py` CI (org
      # convention). Reads the .coverage data file pytest-cov just wrote in
      # this same job/workspace; PR-only (no badge-storage branch on push to
      # main, unlike some setups — this repo doesn't maintain one).
      - name: Post coverage comment
        if: matrix.python-version == '3.11' && github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@53ff7553078bad69030786e486677315346c2dd2
        with:
          GITHUB_TOKEN: ${{ github.token }}

  # Linux desktop supervisor (docs/LINUX_DESKTOP_SPEC.md). With the
  # linux-desktop extra installed, the _linux backend tests EXECUTE here instead
  # of skipping as they do on macOS — this job is where gate (a) (no-orphans)
  # runs in CI form. Desktop-session gates (tray, dialogs, open-with) stay a
  # manual checklist in the spec: a headless runner cannot see them.
  linux-desktop:
    needs: [detect-changes, frontend]
    if: needs.detect-changes.outputs.app == 'true' && needs.frontend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: shell-dist
          path: fused_render/static/shell-dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      # desktop-file-utils provides desktop-file-validate, which appimagetool
      # runs against the bundled .desktop file during the AppImage build smoke.
      # (No rclone install here: every test file below monkeypatches or never
      # execs rclone, and the build script downloads its own pinned binary.)
      - name: Install desktop-file-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils

      - name: Install fused-render (dev + linux-desktop extras)
        run: pip install -e ".[dev,linux-desktop]"

      - name: Lint the AppImage build script
        # Errors only — style/info findings are a manual review concern, not a
        # gate (the script cannot be run end-to-end off-Linux; see the spec).
        run: shellcheck --severity=error scripts/build_linux_appimage.sh

      - name: Run the Linux backend + packaging suite
        # These skip on macOS but execute here: the process-tree gate,
        # Unix-socket IPC, XDG paths/autostart/UI resolution, the tray retry
        # contract, the association-table sync, and rclone_bin resolution.
        env:
          # pystray picks its backend at import time; on a headless runner the
          # X11 backend raises DisplayNameError during test collection. The
          # tray test stubs the run loop anyway — force the dummy backend.
          PYSTRAY_BACKEND: dummy
        run: >
          python -m pytest -q
          tests/test_supervisor_core.py
          tests/test_supervisor_linux_tree.py
          tests/test_supervisor_linux_instance.py
          tests/test_supervisor_linux_paths.py
          tests/test_supervisor_tray.py
          tests/test_file_associations.py
          tests/test_mounts_rclone_bin.py

      - name: Build the AppImage (smoke)
        # Exercises the full pipeline (wheel → relocatable CPython → desktop
        # extra → DuckDB extensions → bundled uv + rclone → import/_child.py/
        # rclone smoke tests → AppDir → appimagetool with the static runtime).
        # Step-gated to desktop/packaging changes: it's minutes of toolchain
        # downloads, pointless on a server-only PR.
        if: needs.detect-changes.outputs.linux_desktop == 'true'
        run: bash scripts/build_linux_appimage.sh

  test-status:
    name: Test Status
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend, test-python, linux-desktop]
    if: always()
    steps:
      - name: Check test status
        run: |
          if [[ "${{ needs.detect-changes.result }}" != "success" ]]; then
            echo "detect-changes did not succeed (${{ needs.detect-changes.result }})"
            exit 1
          fi
          if [[ "${{ needs.detect-changes.outputs.app }}" != "true" ]]; then
            echo "No relevant changes; skipped."
            exit 0
          fi
          for result in "${{ needs.frontend.result }}" "${{ needs.test-python.result }}" "${{ needs.linux-desktop.result }}"; do
            if [[ "$result" != "success" ]]; then
              echo "Job did not succeed: $result"
              exit 1
            fi
          done
          echo "Tests passed"
          exit 0
