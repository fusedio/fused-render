<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Spreadsheet preview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #e8eaed;
    background: #131417;
  }
  #bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-bottom: 1px solid #2a2d33;
    background: #1b1d21;
    position: sticky;
    top: 0;
  }
  #bar button {
    font: inherit;
    padding: 4px 10px;
    border: 1px solid #2a2d33;
    border-radius: 6px;
    background: #131417;
    color: #e8eaed;
    cursor: pointer;
  }
  #bar button:disabled {
    opacity: 0.4;
    cursor: default;
  }
  #sheet {
    font: inherit;
    padding: 4px 8px;
    border: 1px solid #2a2d33;
    border-radius: 6px;
    background: #131417;
    color: #e8eaed;
    margin-left: auto;
  }
  #rowcount {
    color: #9aa0a6;
  }
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    padding: 5px 10px;
    border-bottom: 1px solid #24262b;
    text-align: left;
    white-space: nowrap;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th {
    background: #1b1d21;
    position: sticky;
    top: 37px;
    font-weight: 600;
  }
  #status {
    padding: 24px;
    color: #9aa0a6;
  }
  #status.error {
    color: #ff6b6b;
  }
</style>
</head>
<body>
  <div id="bar" data-fa-passthrough>
    <button id="prev">&larr; Prev</button>
    <button id="next">Next &rarr;</button>
    <span id="rowcount"></span>
    <select id="sheet" hidden></select>
  </div>
  <div id="tablewrap"></div>
  <script>
    const LIMIT = 100;
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const rowcountEl = document.getElementById("rowcount");
    const sheetSel = document.getElementById("sheet");
    const wrap = document.getElementById("tablewrap");

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function cell(v) {
      return v === null || v === undefined ? "" : String(v);
    }

    function currentOffset() {
      const raw = fused.params.get("offset");
      const n = raw ? parseInt(raw, 10) : 0;
      return Number.isFinite(n) && n >= 0 ? n : 0;
    }

    function renderSheetSelector(sheets, active) {
      if (!sheets || sheets.length <= 1) {
        sheetSel.hidden = true;
        return;
      }
      sheetSel.hidden = false;
      sheetSel.innerHTML = sheets
        .map((s) => `<option value="${escapeHtml(s)}"${s === active ? " selected" : ""}>${escapeHtml(s)}</option>`)
        .join("");
    }

    function render(data, offset) {
      renderSheetSelector(data.sheets, data.sheet);
      const total = data.total_rows;
      const shown = data.rows.length;
      const from = shown === 0 ? 0 : offset + 1;
      const to = offset + shown;
      rowcountEl.textContent = `rows ${from.toLocaleString()}–${to.toLocaleString()} of ${total.toLocaleString()}`;
      prevBtn.disabled = offset <= 0;
      nextBtn.disabled = offset + LIMIT >= total;

      const cols = data.columns;
      const head = `<tr>${cols.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
      // Cell ids carry the sheet INDEX + ABSOLUTE data-row index, so an
      // annotation anchored to a cell stays on that cell across pagination and
      // sheet switches (AN-38). Index (not name) keeps the id unambiguous.
      const sIdx = Math.max(0, data.sheets.indexOf(data.sheet));
      const body = data.rows
        .map((row, i) => `<tr>${cols.map((c, j) => `<td id="__fr_s${sIdx}_r${offset + i}_c${j}" title="${escapeHtml(cell(row[c]))}">${escapeHtml(cell(row[c]))}</td>`).join("")}</tr>`)
        .join("");
      wrap.innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
      sheetsCache = data.sheets;
      activeSheetIdx = sIdx;
      totalRowsBySheet[sIdx] = total;
    }

    let loadSeq = 0; // stale-response guard: two rapid param changes race their reloads
    async function load() {
      const seq = ++loadSeq;
      const file = fused.params.get("_file");
      const offset = currentOffset();
      const sheet = fused.params.get("sheet") || "";
      wrap.innerHTML = `<div id="status">Loading…</div>`;
      if (!file) {
        wrap.innerHTML = `<div id="status" class="error">No file selected (missing _file param).</div>`;
        resetResolverState(); // unknown — resolver must not classify with stale counts
        return;
      }
      try {
        const data = await fused.runPython("./reader.py", {
          file,
          sheet,
          offset: String(offset),
          limit: String(LIMIT),
        });
        if (seq !== loadSeq) return; // a newer load superseded this one
        render(data, offset);
      } catch (err) {
        if (seq !== loadSeq) return;
        wrap.innerHTML = `<div id="status" class="error"><strong>${escapeHtml(err.type || "Error")}</strong>: ${escapeHtml(err.message || "")}</div>`;
        resetResolverState(); // unknown — resolver must not classify with stale counts
      }
    }

    prevBtn.addEventListener("click", () => {
      fused.params.set("offset", String(Math.max(0, currentOffset() - LIMIT)));
    });
    nextBtn.addEventListener("click", () => {
      fused.params.set("offset", String(currentOffset() + LIMIT));
    });
    sheetSel.addEventListener("change", () => {
      // New sheet starts at the top. Reset offset first so the change lands on
      // page 0, then switch sheet (each set fires onChange → reload).
      fused.params.set("offset", "0");
      fused.params.set("sheet", sheetSel.value);
    });
    fused.params.onChange(load);
    load();

    // Annotation anchor resolver (AN-38): an unresolved __fr_s<sheet>_r<row>_c<col>
    // cell id is on another page or sheet — not detached. reveal() switches
    // sheet and/or offset (param changes → reload) to bring the cell on screen.
    let sheetsCache = [];
    let activeSheetIdx = 0;
    let totalRowsBySheet = {}; // honest counts per visited sheet
    // After a failed load nothing about the workbook is trustworthy — clear so
    // match() answers "unknown, accept" instead of misclassifying anchors.
    function resetResolverState() {
      sheetsCache = [];
      totalRowsBySheet = {};
    }
    const CELL_ID = /^__fr_s(\d+)_r(\d+)_c(\d+)$/;
    window.__fusedAnnotateAnchorResolver = {
      match(id) {
        const m = CELL_ID.exec(id);
        if (!m) return null;
        const s = parseInt(m[1], 10);
        const row = parseInt(m[2], 10);
        if (sheetsCache.length && s >= sheetsCache.length) return null; // sheet gone
        const known = totalRowsBySheet[s];
        if (known !== undefined && row >= known) return null; // row truly gone
        const rowLabel = "row " + (row + 1).toLocaleString();
        return { label: s === activeSheetIdx ? rowLabel : (sheetsCache[s] || "sheet " + (s + 1)) + " · " + rowLabel };
      },
      reveal(id) {
        const m = CELL_ID.exec(id);
        if (!m) return;
        const s = parseInt(m[1], 10);
        const row = parseInt(m[2], 10);
        // Offset first, sheet second — mirrors the sheet selector's ordering
        // (each set fires onChange; the last one decides the loaded state).
        fused.params.set("offset", String(Math.floor(row / LIMIT) * LIMIT));
        if (s !== activeSheetIdx && sheetsCache[s]) fused.params.set("sheet", sheetsCache[s]);
      },
    };
    if (window.__fusedAnnotate) {
      window.__fusedAnnotate.registerAnchorResolver(window.__fusedAnnotateAnchorResolver);
    }
  </script>
</body>
</html>
