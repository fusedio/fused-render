name: release dmg

on:
  push:
    tags:
      - "v*"

jobs:
  build-sign-notarize-release:
    runs-on: macos-14
    permissions:
      contents: write # needed to attach the DMG to a GitHub Release
      id-token: write # needed to assume the AWS role via OIDC
    env:
      KEYCHAIN_PATH: ${{ github.workspace }}/ci-signing.keychain-db
      NOTARY_PROFILE: ci-notary
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4
        with:
          # release notes generation below needs every tag reachable, not
          # just the one that triggered this run (default fetch-depth: 1
          # only grabs the tagged commit itself)
          fetch-depth: 0

      # build_dmg.sh's own version check needs `str | None` syntax (py>=3.10);
      # macOS runners' default `python3` can resolve to an older CLT/system
      # python that chokes on this (hit locally with Xcode's bundled 3.9).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import signing cert + notary credentials into ephemeral keychain
        env:
          CODESIGN_CERT_P12: ${{ secrets.CODESIGN_CERT_P12 }}
          CODESIGN_CERT_PASSWORD: ${{ secrets.CODESIGN_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          NOTARY_API_KEY_P8: ${{ secrets.NOTARY_API_KEY_P8 }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/codesign-cert.p12"
          echo "$CODESIGN_CERT_P12" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 14400 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CODESIGN_CERT_PASSWORD" -T /usr/bin/codesign
          # Without this, codesign blocks on a keychain-access UI prompt that
          # can never be answered in CI (see docs/signing.md's CI notes).
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # notarytool profiles live in a keychain too; store into the same
          # ephemeral one so it's gone with the runner, nothing persists.
          # App Store Connect API key: no personal Apple ID tied to CI, and
          # unlike an app-specific password it doesn't expire.
          API_KEY_PATH="$RUNNER_TEMP/notary-api-key.p8"
          printf '%s' "$NOTARY_API_KEY_P8" > "$API_KEY_PATH"
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --key "$API_KEY_PATH" --key-id "$NOTARY_API_KEY_ID" --issuer "$NOTARY_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"
          rm -f "$API_KEY_PATH"

          rm -f "$CERT_PATH"

      - name: Build, sign, notarize, staple DMG
        env:
          FUSED_RENDER_CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          FUSED_RENDER_CODESIGN_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
          FUSED_RENDER_NOTARY_PROFILE: ${{ env.NOTARY_PROFILE }}
        run: bash scripts/build_dmg.sh

      - name: Delete ephemeral keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::926411091187:role/github_fused_render_role
          role-session-name: GithubFusedRenderRelease
          aws-region: us-west-2

      - name: Upload DMG + wheel to S3
        run: |
          set -euo pipefail
          # Not `brew install awscli`: GH's macos-14 image doesn't have the
          # `aws/tap` cask pre-trusted, and Homebrew's tap-trust gate fails
          # the install outright. Apple's own .pkg installer sidesteps
          # Homebrew (and its taps) entirely.
          if ! command -v aws >/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o "$RUNNER_TEMP/AWSCLIV2.pkg"
            sudo installer -pkg "$RUNNER_TEMP/AWSCLIV2.pkg" -target /
          fi
          DMG_PATH="$(ls dist/*.dmg)"
          DMG_SHA256="$(shasum -a 256 "$DMG_PATH" | cut -d' ' -f1)"
          WHL_PATH="$(ls dist/*.whl)"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "DMG_SHA256=$DMG_SHA256" >> "$GITHUB_ENV"
          echo "WHL_PATH=$WHL_PATH" >> "$GITHUB_ENV"
          aws s3 cp "$DMG_PATH" "s3://fused-magic/fused-render-dmgs/$(basename "$DMG_PATH")"
          aws s3 cp "$WHL_PATH" "s3://fused-magic/fused-render-wheels/$(basename "$WHL_PATH")"

      - name: Find previous tag
        id: prev_tag
        run: |
          set -euo pipefail
          # GitHub's own previous-tag auto-detection has proven unreliable
          # here (past releases each listed the full PR history instead of
          # just what changed since the prior release) — pin it explicitly.
          # grep exits 1 (failing the pipeline under pipefail) when there's
          # no other tag yet, e.g. on the very first release — that's a
          # legitimate case, not an error, so tolerate it and leave PREV_TAG
          # empty; the release action falls back to its own auto-detection.
          PREV_TAG="$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.WHL_PATH }}
          name: FusedRender ${{ github.ref_name }}
          generate_release_notes: true
          previous_tag: ${{ steps.prev_tag.outputs.tag }}

      - name: Bump homebrew-tap cask
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          # Version comes from the DMG that was actually built+uploaded+hashed
          # above, not the git tag — keeps cask version/sha256 tied to one
          # artifact even if a tag is pushed before pyproject.toml is bumped.
          VERSION="$(basename "$DMG_PATH" .dmg | sed 's/^FusedRender-//')"

          git clone --depth 1 "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/fusedio/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' \
            -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"${DMG_SHA256}\"/" \
            Casks/fused-render.rb

          git config user.name "fused-render-ci"
          git config user.email "ci@fused.io"
          git add Casks/fused-render.rb
          git commit -m "fused-render ${VERSION}"
          git push origin main
