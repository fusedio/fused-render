<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>PDF preview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e8eaed;
    background: #131417;
  }
  #bar {
    flex: 0 0 auto;
    padding: 8px 12px;
    border-bottom: 1px solid #2a2d33;
    background: #1b1d21;
    font-size: 13px;
    color: #9aa0a6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  embed, #status {
    flex: 1 1 auto;
    width: 100%;
    border: none;
  }
  #status {
    padding: 24px;
    color: #9aa0a6;
  }
  #status.error { color: #ff6b6b; }
</style>
</head>
<body>
  <div id="bar"></div>
  <div id="mount" style="flex:1 1 auto; display:flex;"></div>
  <script>
    const file = fused.params.get("_file");
    const bar = document.getElementById("bar");
    const mount = document.getElementById("mount");
    if (!file) {
      bar.textContent = "PDF";
      mount.innerHTML = `<div id="status" class="error">No file selected (missing _file param).</div>`;
    } else {
      bar.textContent = file.split("/").pop();
      const src = fused.rawUrl(file);
      const embed = document.createElement("embed");
      embed.type = "application/pdf";
      embed.src = src;
      embed.style.flex = "1 1 auto";
      embed.style.width = "100%";
      mount.appendChild(embed);
    }
  </script>
</body>
</html>
