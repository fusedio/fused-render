<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Annotate</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #e8eaed;
    background: #131417;
  }
  #bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    border-bottom: 1px solid #2a2d33;
    background: #1b1d21;
    color: #9aa0a6;
  }
  #bar select {
    font: inherit;
    padding: 3px 8px;
    border: 1px solid #2a2d33;
    border-radius: 6px;
    background: #131417;
    color: #e8eaed;
  }
  #main { flex: 1 1 auto; display: flex; min-height: 0; }
  /* Stage: the file's ordinary view rendered live in a same-origin iframe;
     the pin layer sits over it in stage coordinates. */
  #stage { position: relative; flex: 1 1 auto; min-width: 0; }
  #page { width: 100%; height: 100%; border: none; display: block; }
  #pins { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .pin {
    position: absolute; pointer-events: auto;
    transform: translate(-50%, -50%);
    width: 22px; height: 22px;
    border-radius: 50% 50% 50% 2px;
    background: #E5FF44; color: #10131a;
    border: 1.5px solid #131417;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4); user-select: none;
  }
  .pin.resolved { opacity: 0.55; }
  #hl {
    position: absolute; pointer-events: none; display: none;
    border: 1.5px solid #E5FF44;
    background: rgba(229, 255, 68, 0.08);
    border-radius: 3px;
  }
  /* Composer popover, stage coordinates. */
  #pop {
    position: absolute; display: none; z-index: 10;
    width: 280px; padding: 10px;
    background: #1b1d21; border: 1px solid #2a2d33; border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
  }
  #pop textarea {
    width: 100%; min-height: 56px; resize: vertical;
    font: inherit; color: #e8eaed;
    background: #131417; border: 1px solid #2a2d33; border-radius: 6px;
    padding: 7px 9px; outline: none;
  }
  #pop textarea:focus { border-color: #E5FF44; }
  #pop .hint { color: #9aa0a6; font-size: 11px; margin-top: 6px; }
  /* Comments sidebar — this template owns it entirely. */
  #side {
    flex: 0 0 300px;
    border-left: 1px solid #2a2d33;
    background: #1b1d21;
    display: flex; flex-direction: column;
  }
  #side h1 {
    margin: 0; padding: 12px 16px;
    font-size: 14px; font-weight: 600;
    border-bottom: 1px solid #2a2d33;
  }
  #list { flex: 1 1 auto; overflow-y: auto; }
  .card {
    padding: 12px 16px;
    border-bottom: 1px solid #2a2d33;
    cursor: pointer;
  }
  .card:hover { background: #131417; }
  .card .when { color: #9aa0a6; font-size: 11px; margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }
  .card .body { white-space: pre-wrap; word-break: break-word; }
  .card .acts { margin-top: 8px; display: flex; gap: 6px; }
  .card button {
    font: inherit; font-size: 11px; cursor: pointer;
    color: #e8eaed; background: #131417;
    border: 1px solid #2a2d33; border-radius: 6px; padding: 3px 8px;
  }
  .card button:hover { border-color: #E5FF44; }
  .card.resolved { opacity: 0.6; }
  #empty { padding: 40px 20px; color: #9aa0a6; text-align: center; }
  #status { padding: 24px; color: #9aa0a6; }
  #status.error { color: #ff6b6b; }
</style>
</head>
<body>
  <div id="bar">
    <span>Annotating</span>
    <select id="viewsel" title="Which view to annotate"></select>
    <span id="budgetnote" style="color:#ffb64d"></span>
    <span style="margin-left:auto">comments live in the URL — share it to share the review</span>
  </div>
  <div id="main">
    <div id="stage">
      <iframe id="page"></iframe>
      <div id="hl"></div>
      <div id="pins"></div>
      <div id="pop">
        <textarea placeholder="Add a comment…"></textarea>
        <div class="hint">Enter to save · Shift+Enter for newline · Esc to cancel</div>
      </div>
    </div>
    <div id="side">
      <h1>Comments</h1>
      <div id="list"></div>
    </div>
  </div>
  <script>
    // =========================================================================
    // Annotate — a VIEW TEMPLATE of its own (same pattern as templates/claude/):
    // registry-bound mode, self-contained template.html, nothing injected into
    // other views and nothing shipped in the shell. It renders the file's
    // ordinary view in a same-origin iframe and implements the entire
    // annotation experience itself — hover highlight, pins, composer, sidebar.
    //
    // Storage: `comments` template param (ordinary visible param, synced to
    // the shell URL by the runtime — bookmarkable/shareable) — JSON array of
    //   { id, content, createdAt, resolved?, anchorPath }
    // anchorPath = tag:nth-of-type chain inside the framed document. The path
    // model works for ANY view (everything the iframe shows is DOM); the
    // `view` param picks WHICH of the file's modes is being annotated, and
    // anchors are per-view (a code-view path means nothing in table view, so
    // pins simply don't resolve there — cards mark them "other view").
    // =========================================================================
    const file = fused.params.get("_file");
    const frame = document.getElementById("page");
    const stage = document.getElementById("stage");
    const pinsEl = document.getElementById("pins");
    const hl = document.getElementById("hl");
    const pop = document.getElementById("pop");
    const ta = pop.querySelector("textarea");
    const list = document.getElementById("list");
    const viewSel = document.getElementById("viewsel");

    // This template's own registry name (folder name from its /render URL) —
    // excluded from the view picker: annotating the annotate view recurses.
    const OWN_NAME = (() => {
      const p = (new URLSearchParams(location.search).get("path") || "").replace(/\\/g, "/").split("/");
      return p.length >= 2 ? p[p.length - 2] : "annotate";
    })();

    let activeView = null; // {mode, path} currently framed

    if (!file) {
      document.body.innerHTML = `<div id="status" class="error">No file selected (missing _file param).</div>`;
      throw new Error("no _file");
    }

    // --- data ---------------------------------------------------------------
    // Legacy import: the removed built-in stored comments in the RESERVED
    // `_comments` shell param, which fused.params doesn't expose. If this
    // page has no `comments` param but the shell URL carries `_comments`,
    // convert once (same-origin parent): content/timestamps/status/view map
    // directly; anchorId/anchorPath carry over (selection anchors have no
    // native equivalent — they surface as detached, content preserved).
    function legacyComments() {
      try {
        const raw = new URLSearchParams(window.parent.location.search).get("_comments");
        if (!raw) return null;
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return null;
        return arr.map((t) => {
          // The native schema has no reply threads — fold legacy replies into
          // the content so nothing is silently dropped on the first save.
          let content = typeof t.content === "string" ? t.content : "";
          if (Array.isArray(t.replies)) {
            for (const r of t.replies) {
              if (r && typeof r.content === "string" && r.content) {
                content += "\n↳ " + r.content;
              }
            }
          }
          return {
            id: typeof t.id === "string" ? t.id : crypto.randomUUID(),
            content,
            createdAt: Number(t.createdAt) || Date.now(),
            resolved: t.status === "resolved" || undefined,
            anchorPath: typeof t.anchorPath === "string" ? t.anchorPath : undefined,
            anchorId: typeof t.anchorId === "string" ? t.anchorId : undefined,
            // Free pins (document coords, no element anchor) carry over too.
            x: typeof t.x === "number" ? t.x : undefined,
            y: typeof t.y === "number" ? t.y : undefined,
            // Unstamped legacy threads infer their view from anchor shape
            // (selection ↔ editor, everything else ↔ preview) — leaving view
            // unset would resolve them against WHATEVER view is framed.
            view:
              typeof t.mode === "string"
                ? t.mode
                : t.selFrom && t.selTo
                  ? "code"
                  : "_render",
          };
        });
      } catch (e) {
        return null;
      }
    }
    function load() {
      try {
        const raw = fused.params.get("comments");
        if (raw) {
          const arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        }
        return legacyComments() || [];
      } catch (e) {
        return [];
      }
    }
    // The URL is the store, so it has a budget (~6 KB, matching the removed
    // overlay): over it, evict oldest RESOLVED threads first — open comments
    // are never dropped silently; if still over, keep the write (a long URL
    // beats lost data) and say so in the bar.
    const BUDGET = 6000;
    // Measure what actually lands on the URL — the encoded form (quotes and
    // braces percent-encode, roughly tripling), not the raw JSON.
    const urlSize = (arr) => encodeURIComponent(JSON.stringify(arr)).length;
    function save(arr) {
      let dropped = 0;
      while (urlSize(arr) > BUDGET) {
        const resolved = arr.filter((c) => c.resolved);
        if (!resolved.length) break;
        const oldest = resolved.reduce((a, b) => (a.createdAt <= b.createdAt ? a : b));
        arr = arr.filter((c) => c.id !== oldest.id);
        dropped++;
      }
      const over = urlSize(arr) > BUDGET;
      const note = document.getElementById("budgetnote");
      note.textContent = dropped
        ? `${dropped} oldest resolved comment${dropped === 1 ? "" : "s"} removed — URL size limit`
        : over
          ? "comment list exceeds the URL budget — resolve or delete some"
          : "";
      // Always a string — the runtime's set() rejects non-strings (there is
      // no delete API), so an emptied list persists as "[]".
      fused.params.set("comments", JSON.stringify(arr));
      render();
    }

    // --- anchors (tag:nth-of-type path inside the framed doc) ---------------
    function pathOf(el, doc) {
      const segs = [];
      let node = el;
      while (node && node !== doc.body && node.nodeType === 1) {
        let n = 1, sib = node.previousElementSibling;
        while (sib) { if (sib.tagName === node.tagName) n++; sib = sib.previousElementSibling; }
        segs.unshift(node.tagName.toLowerCase() + ":nth-of-type(" + n + ")");
        node = node.parentElement;
      }
      return node === doc.body ? segs.join(">") : null;
    }
    function resolveAnchor(c, doc) {
      // Element-id anchors (legacy imports carry them) win over paths.
      if (c.anchorId && doc) {
        const el = doc.getElementById(c.anchorId);
        if (el) return el;
      }
      const path = c.anchorPath;
      if (!path || !doc || !doc.body) return null;
      let node = doc.body;
      for (const seg of path.split(">")) {
        const m = /^([a-z0-9-]+):nth-of-type\((\d+)\)$/i.exec(seg);
        if (!m) return null;
        let count = 0, found = null;
        for (const child of node.children) {
          if (child.tagName === m[1].toUpperCase() && ++count === parseInt(m[2], 10)) { found = child; break; }
        }
        if (!found) return null;
        node = found;
      }
      return node === doc.body ? null : node;
    }

    // Stage coords of an element inside the iframe = iframe offset + element
    // viewport rect within the frame (rects already account for frame scroll).
    function stagePoint(el) {
      const fr = frame.getBoundingClientRect();
      const st = stage.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      return { x: fr.left - st.left + r.right, y: fr.top - st.top + r.top };
    }
    function stageRect(el) {
      const fr = frame.getBoundingClientRect();
      const st = stage.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      return { left: fr.left - st.left + r.left, top: fr.top - st.top + r.top, width: r.width, height: r.height };
    }

    // --- pins + sidebar ------------------------------------------------------
    function render() {
      const doc = frame.contentDocument;
      const comments = load();
      pinsEl.innerHTML = "";
      list.innerHTML = "";
      if (!comments.length) {
        list.innerHTML = `<div id="empty">No comments yet.<br>Click anything on the page.</div>`;
      }
      for (const c of comments) {
        // Anchors are per-view: only resolve/pin comments made on the view
        // that's currently framed; others are listed with their view's tag.
        const ownView = !c.view || !activeView || c.view === activeView.mode;
        const el = ownView && doc ? resolveAnchor(c, doc) : null;
        // Free pins (legacy imports): document coords inside the framed page
        // → stage coords via frame offset minus the frame's own scroll.
        let free = null;
        if (!el && ownView && doc && typeof c.x === "number" && typeof c.y === "number") {
          const fr = frame.getBoundingClientRect();
          const st = stage.getBoundingClientRect();
          const win = frame.contentWindow;
          free = {
            x: fr.left - st.left + c.x - (win ? win.scrollX : 0),
            y: fr.top - st.top + c.y - (win ? win.scrollY : 0),
          };
        }
        if (el || free) {
          const p = el ? stagePoint(el) : free;
          const pin = document.createElement("div");
          pin.className = "pin" + (c.resolved ? " resolved" : "");
          pin.style.left = Math.min(stage.clientWidth - 14, Math.max(14, p.x)) + "px";
          pin.style.top = Math.max(14, p.y) + "px";
          pin.textContent = c.resolved ? "✓" : "";
          pin.title = c.content;
          pin.onclick = () => reveal(c);
          pinsEl.appendChild(pin);
        }
        const tag = !ownView
          ? `<span style="color:#9aa0a6;border:1px solid #2a2d33;border-radius:4px;padding:0 5px">${c.view === "_render" ? "preview" : c.view}</span>`
          : el || free
            ? ""
            : "<span style='color:#ff6b6b'>detached</span>";
        const card = document.createElement("div");
        card.className = "card" + (c.resolved ? " resolved" : "");
        card.innerHTML = `
          <div class="when">${new Date(c.createdAt).toLocaleString()} ${tag}</div>
          <div class="body"></div>
          <div class="acts">
            <button data-a="resolve">${c.resolved ? "Reopen" : "Resolve"}</button>
            <button data-a="delete">Delete</button>
          </div>`;
        card.querySelector(".body").textContent = c.content;
        card.onclick = (e) => {
          if (e.target.closest("button")) return;
          if (!ownView && c.view) switchView(c.view); // jump to its view
          else reveal(c);
        };
        card.querySelector('[data-a="resolve"]').onclick = () => {
          c.resolved = !c.resolved; save(comments);
        };
        card.querySelector('[data-a="delete"]').onclick = () => {
          save(comments.filter((x) => x.id !== c.id));
        };
        list.appendChild(card);
      }
    }

    function reveal(c) {
      const doc = frame.contentDocument;
      const el = doc ? resolveAnchor(c, doc) : null;
      if (!el) {
        // Free pin: center its stored document coords in the framed view.
        if (doc && typeof c.y === "number" && frame.contentWindow) {
          frame.contentWindow.scrollTo({
            top: Math.max(0, c.y - frame.clientHeight / 2),
            behavior: "smooth",
          });
        }
        return;
      }
      el.scrollIntoView({ block: "center", behavior: "smooth" });
      setTimeout(() => {
        const r = stageRect(el);
        hl.style.display = "block";
        hl.style.left = r.left + "px";
        hl.style.top = r.top + "px";
        hl.style.width = r.width + "px";
        hl.style.height = r.height + "px";
        setTimeout(() => (hl.style.display = "none"), 1200);
      }, 350);
    }

    // Switching the annotated view reloads this template — an editor framed
    // inside with unsaved edits must be flushed FIRST (same contract as the
    // shell's own mode switch); refuse the switch when it can't be made safe.
    let switchingView = false;
    async function switchView(mode) {
      if (switchingView || (activeView && mode === activeView.mode)) return;
      switchingView = true;
      try {
        const inner = frame.contentWindow && frame.contentWindow.__fusedFlushEdits;
        if (typeof inner === "function") {
          const res = await Promise.race([
            inner(),
            new Promise((r) => setTimeout(() => r({ ok: false }), 10000)),
          ]);
          if (res && res.ok === false) {
            if (activeView) viewSel.value = activeView.mode; // snap the picker back
            return;
          }
        }
        fused.params.set("view", mode); // inside the lock — param write is part of the switch
      } catch (e) {
        /* torn-down frame — nothing to flush */
      } finally {
        switchingView = false;
      }
    }

    // --- create flow ---------------------------------------------------------
    let draftAnchor = null; // { anchorId? , anchorPath? }
    function openComposer(x, y, anchor) {
      draftAnchor = anchor;
      pop.style.display = "block";
      pop.style.left = Math.min(stage.clientWidth - 292, Math.max(0, x + 10)) + "px";
      pop.style.top = Math.min(stage.clientHeight - 130, Math.max(0, y + 10)) + "px";
      ta.value = "";
      ta.focus();
    }
    function closeComposer() {
      pop.style.display = "none";
      draftAnchor = null;
    }
    ta.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeComposer();
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        const content = ta.value.trim();
        if (content && draftAnchor) {
          const comments = load();
          comments.push({
            id: crypto.randomUUID(),
            content,
            createdAt: Date.now(),
            anchorId: draftAnchor.anchorId,
            anchorPath: draftAnchor.anchorPath,
            view: activeView ? activeView.mode : undefined,
          });
          save(comments);
        }
        closeComposer();
      }
    });

    // Wire the framed document once it loads: hover highlight + click-to-comment.
    frame.addEventListener("load", () => {
      const doc = frame.contentDocument;
      if (!doc) return;
      // An event target can be a TEXT node (Safari, SVG oddities) — anchor
      // math needs its owning element.
      const elementOf = (t) => (t && t.nodeType === 1 ? t : t && t.parentElement);
      doc.addEventListener("mousemove", (e) => {
        const el = elementOf(e.target);
        if (!el || el === doc.body || el === doc.documentElement) { hl.style.display = "none"; return; }
        const r = stageRect(el);
        hl.style.display = "block";
        hl.style.left = r.left + "px";
        hl.style.top = r.top + "px";
        hl.style.width = r.width + "px";
        hl.style.height = r.height + "px";
      });
      doc.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        const el = elementOf(e.target);
        if (!el) return;
        // Element ids are stabler anchors than structural paths — prefer them.
        const anchor = el.id ? { anchorId: el.id } : { anchorPath: pathOf(el, doc) };
        if (!anchor.anchorId && !anchor.anchorPath) return;
        const fr = frame.getBoundingClientRect();
        const st = stage.getBoundingClientRect();
        openComposer(fr.left - st.left + e.clientX, fr.top - st.top + e.clientY, anchor);
      }, true);
      // Capture-phase scroll catches nested scrolling containers (a code
      // editor's scroller, a table wrapper), not just the document. Scroll
      // and mutation storms coalesce to one render per frame — an editor
      // mutates on every keystroke, and unthrottled full rebuilds jank.
      let renderQueued = false;
      const queueRender = () => {
        if (renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(() => {
          renderQueued = false;
          render();
        });
      };
      doc.addEventListener("scroll", queueRender, { capture: true, passive: true });
      // Async views (tables, editors) build their DOM after load — re-resolve
      // anchors when the framed document mutates.
      new MutationObserver(queueRender).observe(doc.body || doc.documentElement, { childList: true, subtree: true });
      render();
    });
    window.addEventListener("resize", () => render());

    // Remount-safety relay: the shell flushes __fusedFlushEdits on the TOP
    // preview iframe before a mode switch — but in annotate mode the live
    // editor (if the framed view is the code template) sits one iframe
    // deeper. Delegate so leaving annotate can't discard unsaved edits.
    window.__fusedFlushEdits = async () => {
      try {
        const inner = frame.contentWindow && frame.contentWindow.__fusedFlushEdits;
        if (typeof inner === "function") return await inner();
      } catch (e) {
        /* cross-origin or torn-down frame — nothing to flush */
      }
      return { ok: true };
    };
    fused.params.onChange(() => {
      // A view change reframes the stage; a comments change just re-renders.
      const v = fused.params.get("view") || "";
      if (activeView && v && v !== activeView.mode) location.reload();
      else render();
    });

    // --- boot: pick which of the file's views to annotate --------------------
    (async () => {
      let stat;
      try {
        stat = await fused.stat(file);
      } catch (e) {
        document.body.innerHTML = `<div id="status" class="error">Cannot stat file.</div>`;
        return;
      }
      const views = (stat.templates || []).filter((t) => t.mode !== OWN_NAME);
      if (!views.length) {
        document.body.innerHTML = `<div id="status" class="error">No annotatable view for this file.</div>`;
        return;
      }
      const saved = fused.params.get("view");
      activeView = views.find((v) => v.mode === saved) || views[0];
      viewSel.innerHTML = views
        .map((v) => `<option value="${v.mode}"${v.mode === activeView.mode ? " selected" : ""}>${v.mode === "_render" ? "preview" : v.mode}</option>`)
        .join("");
      viewSel.hidden = views.length <= 1;
      viewSel.addEventListener("change", () => switchView(viewSel.value));
      frame.src =
        activeView.mode === "_render"
          ? "/render?path=" + encodeURIComponent(file)
          : "/render?path=" + encodeURIComponent(activeView.path) + "&_file=" + encodeURIComponent(file);
    })();
  </script>
</body>
</html>
