<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Map preview</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@9/dist.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e8eaed; background: #131417; font-size: 13px; }
  #map { position: absolute; inset: 0; }
  .panel { position: absolute; background: rgba(19,20,23,.92); border: 1px solid #2a2d33;
    border-radius: 10px; backdrop-filter: blur(6px); z-index: 10; }
  #topbar { top: 10px; left: 10px; right: 10px; display: flex; gap: 8px; align-items: center;
    pointer-events: none; }
  #topbar .pill { pointer-events: auto; padding: 0 12px; height: 34px; display: flex;
    align-items: center; gap: 8px; }
  #title { font-weight: 600; }
  #title small { color: #9aa0a6; font-weight: 400; margin-left: 4px; }
  #coords { margin-left: auto; font-variant-numeric: tabular-nums; color: #9aa0a6; }
  #ctrls { position: absolute; top: 54px; right: 10px; z-index: 10; display: flex;
    flex-direction: column; gap: 8px; }
  .fab { width: 36px; height: 36px; border-radius: 9px; border: 1px solid #2a2d33;
    background: rgba(19,20,23,.92); backdrop-filter: blur(6px); color: #9aa0a6;
    display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .fab:hover { color: #e8eaed; border-color: #4a4d55; }
  .fab.on { color: #46c5d8; border-color: #46c5d877; background: #46c5d81f; }
  #status { position: absolute; left: 50%; top: 54px; transform: translateX(-50%);
    background: rgba(19,20,23,.9); border: 1px solid #2a2d33; border-radius: 999px;
    padding: 4px 14px; color: #9aa0a6; z-index: 20; display: none; max-width: 70%; }
  #status.err { color: #ff7b72; display: block; }
  #empty { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    color: #6b7178; font-size: 13px; text-align: center; z-index: 25; }
  #geobox { top: 54px; right: 54px; width: 300px; display: none; overflow: hidden; }
  #geobox .field { display: flex; align-items: center; gap: 7px; padding: 8px 10px;
    border-bottom: 1px solid #2a2d33; }
  #geobox input { flex: 1; min-width: 0; background: transparent; border: 0; outline: 0;
    color: #e8eaed; font: inherit; }
  #georesults { max-height: 260px; overflow: auto; }
  .geores { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #ffffff08; }
  .geores:hover { background: #1b1d21; }
  .geores .g1 { font-size: 13px; }
  .geores .g2 { font-size: 11px; color: #9aa0a6; }
  .geores.none { color: #6b7178; cursor: default; }
  #addpanel { top: 54px; right: 54px; width: 340px; max-height: 60vh; display: none;
    flex-direction: column; overflow: hidden; }
  #addpanel .field { display: flex; align-items: center; gap: 7px; padding: 8px 10px;
    border-bottom: 1px solid #2a2d33; }
  #addpanel input[type=text] { flex: 1; min-width: 0; background: transparent; border: 0;
    outline: 0; color: #e8eaed; font: inherit; }
  #addpanel button.mini { background: transparent; border: 1px solid #2a2d33; color: #9aa0a6;
    border-radius: 6px; padding: 3px 8px; cursor: pointer; }
  #addpanel button.mini:hover { color: #e8eaed; border-color: #4a4d55; }
  #crumbs { font-size: 11px; padding: 6px 10px; color: #9aa0a6; border-bottom: 1px solid #23262c; }
  #crumbs a { color: #8ab4ff; cursor: pointer; }
  #explorerList { flex: 1; overflow: auto; }
  .row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; cursor: pointer;
    font-size: 12.5px; border-bottom: 1px solid #1e2025; }
  .row:hover { background: #1b1d21; }
  .row.dim { color: #55585f; cursor: default; }
  .row .ic { width: 16px; text-align: center; flex: none; }
  .row .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .sz { color: #6b7178; font-size: 11px; }
  #layerpanel { top: 54px; right: 10px; bottom: 34px; width: 320px; display: none;
    flex-direction: column; }
  .lp-head { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid #2a2d33;
    font-weight: 600; }
  .lp-head .x { margin-left: auto; background: transparent; border: 0; color: #6b7178;
    font-size: 18px; cursor: pointer; }
  .lp-head .x:hover { color: #e8eaed; }
  #layercards { flex: 1; overflow-y: auto; padding: 8px; }
  .lp-empty { color: #6b7178; text-align: center; padding: 22px 12px; font-size: 12px; line-height: 1.6; }
  .lc { background: #1b1d21; border: 1px solid #2a2d33; border-radius: 8px; margin-bottom: 8px;
    overflow: hidden; }
  .lc-h { display: flex; align-items: center; gap: 7px; padding: 8px 9px; }
  .lc-eye { background: transparent; border: 0; color: #9aa0a6; display: flex; cursor: pointer; padding: 1px; }
  .lc-eye.off { color: #55585f; }
  .lc-eye:hover { color: #e8eaed; }
  .lc-nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 12px; font-weight: 560; cursor: pointer; }
  .lc-badge { font-size: 9px; text-transform: uppercase; letter-spacing: .04em; color: #6b7178;
    border: 1px solid #2f333b; border-radius: 5px; padding: 1px 5px; }
  .lc-x { background: transparent; border: 0; color: #6b7178; font-size: 15px; cursor: pointer; padding: 0 2px; }
  .lc-x:hover { color: #ff7b72; }
  .lc-body { padding: 2px 10px 10px; border-top: 1px solid #23262c; display: none; }
  .lc.open .lc-body { display: block; }
  .ctl { margin-top: 10px; }
  .ctl-lbl { font-size: 10.5px; color: #9aa0a6; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .ctl-lbl b { color: #e8eaed; font-weight: 560; font-family: ui-monospace, Menlo, monospace; font-size: 10px; }
  input[type=range] { width: 100%; vertical-align: middle; }
  input[type=color] { width: 28px; height: 24px; border: 1px solid #2a2d33; border-radius: 6px;
    background: none; padding: 0; cursor: pointer; }
  select { width: 100%; background: #232329; color: #e8eaed; border: 1px solid #2a2d33;
    border-radius: 6px; padding: 5px 7px; font-size: 11.5px; }
  .stat { font-size: 10.5px; color: #9aa0a6; line-height: 1.6; margin-top: 8px;
    font-family: ui-monospace, Menlo, monospace; white-space: pre-line; }
  .warnline { font-size: 10.5px; color: #fbbf24; margin-top: 6px; line-height: 1.5; }
  .legend { margin-top: 8px; }
  .legend .bar { height: 9px; border-radius: 5px; }
  .legend .ends { display: flex; justify-content: space-between; font-size: 9.5px; color: #9aa0a6;
    font-family: ui-monospace, Menlo, monospace; margin-top: 3px; }
  .swatchrow { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
  .swatch { display: flex; align-items: center; gap: 4px; font-size: 10.5px; color: #9aa0a6; }
  .swatch i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  #basemaprow { border-top: 1px solid #2a2d33; padding: 9px 11px; }
  .seg { display: flex; background: #1b1d21; border: 1px solid #2a2d33; border-radius: 7px; overflow: hidden; }
  .seg button { flex: 1; background: transparent; border: 0; color: #9aa0a6; padding: 5px 4px;
    font-size: 11px; cursor: pointer; }
  .seg button.on { background: #232329; color: #e8eaed; }
  #attr { position: absolute; left: 12px; bottom: 8px; z-index: 5; font-size: 10.5px; color: #6b7178;
    background: rgba(12,12,14,.6); padding: 2px 8px; border-radius: 6px; pointer-events: none; }
  .maplibregl-popup-content { background: rgba(19,20,23,.97); color: #e8eaed;
    border: 1px solid #2a2d33; border-radius: 8px; font-size: 12px; max-height: 40vh;
    overflow: auto; padding: 8px 10px; font-family: inherit; }
  .maplibregl-popup-close-button { color: #8ab4ff; font-size: 16px; }
</style>
</head>
<body>
  <div id="map"></div>
  <div id="empty">No file selected — open this template for a geospatial file.</div>

  <div class="panel pill" id="topbar">
    <span id="title">Map</span>
    <span id="coords">—</span>
  </div>

  <div id="ctrls">
    <button class="fab" id="btn-add" title="Add another layer">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="fab" id="btn-search" title="Search place / address">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    </button>
    <button class="fab" id="btn-layers" title="Layers & style">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 5-9 5-9-5 9-5zM3 12l9 5 9-5M3 17l9 5 9-5"/></svg>
    </button>
    <button class="fab" id="btn-full" title="Toggle fullscreen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
  </div>

  <div id="status"></div>

  <div class="panel" id="geobox">
    <div class="field">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="geoinput" placeholder="Search address or place…" spellcheck="false" autocomplete="off" />
    </div>
    <div id="georesults"></div>
  </div>

  <div class="panel" id="addpanel">
    <div class="field">
      <input type="text" id="addpath" placeholder="/path/to/file.geojson or a URL…" spellcheck="false" />
      <button class="mini" id="add-go">Add</button>
    </div>
    <div id="crumbs"></div>
    <div id="explorerList"></div>
  </div>

  <div class="panel" id="layerpanel">
    <div class="lp-head">Layers &amp; style <button class="x" id="lp-close">×</button></div>
    <div id="layercards"></div>
    <div id="basemaprow">
      <div class="ctl-lbl">Basemap</div>
      <div class="seg" id="basemap-seg">
        <button data-b="dark" class="on">Dark</button>
        <button data-b="light">Light</button>
        <button data-b="sat">Satellite</button>
      </div>
    </div>
  </div>

  <div id="attr">© OpenStreetMap © CARTO</div>

<script>
"use strict";
const qs = id => document.getElementById(id);
const P = fused.params;
const FILE = P.get("_file") || "";

const CAT_COLORS = [[255,99,71],[70,193,216],[255,193,7],[126,211,33],[171,71,188],[255,138,101],
                    [41,182,246],[141,110,99],[236,64,122],[102,187,106]];
const CMAPS = {
  viridis: [[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]],
  plasma:  [[13,8,135],[126,3,168],[204,71,120],[248,149,64],[240,249,33]],
  magma:   [[0,0,4],[81,18,124],[183,55,121],[252,137,97],[252,253,191]],
  inferno: [[0,0,4],[87,16,110],[188,55,84],[249,142,9],[252,255,164]],
  turbo:   [[48,18,59],[42,160,215],[103,241,105],[249,182,45],[122,4,3]],
  greys:   [[240,240,240],[20,20,20]],
};
function cmapColor(name, t) {
  const stops = CMAPS[name] || CMAPS.viridis;
  t = Math.max(0, Math.min(1, t));
  const f = t * (stops.length - 1), i = Math.floor(f), r = f - i;
  const a = stops[i], b = stops[Math.min(i + 1, stops.length - 1)];
  return [Math.round(a[0]+(b[0]-a[0])*r), Math.round(a[1]+(b[1]-a[1])*r), Math.round(a[2]+(b[2]-a[2])*r)];
}
function cmapGradient(name) {
  const stops = CMAPS[name] || CMAPS.viridis;
  return "linear-gradient(90deg," + stops.map((c,i) =>
    `rgb(${c[0]},${c[1]},${c[2]}) ${Math.round(i/(stops.length-1)*100)}%`).join(",") + ")";
}
const rgbToHex = c => "#" + c.slice(0,3).map(x => x.toString(16).padStart(2,"0")).join("");
const hexToRgb = h => { const n = parseInt(h.replace("#",""),16); return [(n>>16)&255,(n>>8)&255,n&255]; };
const human = n => n > 1e9 ? (n/1e9).toFixed(2)+' GB' : n > 1e6 ? (n/1e6).toFixed(1)+' MB' : Math.round(n/1e3)+' KB';
const fmt = v => v == null ? "—" : (Math.abs(v) >= 1000 || (v !== 0 && Math.abs(v) < 0.01) ? Number(v).toExponential(1) : Number(v).toFixed(2));
function status(msg, err){ qs("status").innerHTML = msg || ''; qs("status").style.display = msg ? 'block' : 'none'; qs("status").className = err ? 'err' : ''; }
let toastTimer = null;
function toast(kind, msg){ status(msg, kind === 'bad'); clearTimeout(toastTimer); if (kind !== 'bad') toastTimer = setTimeout(() => status(''), 6000); }

if (!FILE) {
  qs("empty").style.display = "flex";
  qs("title").textContent = "Map";
} else {

qs("title").innerHTML = FILE.split("/").pop() + " <small>· map</small>";
document.title = FILE.split("/").pop() + " — Map preview";

/* ---------------- map ---------------- */
function rasterStyle(tiles, attribution, maxzoom) {
  return { version: 8, sources: { base: { type: "raster", tiles, tileSize: 256, attribution, maxzoom } },
           layers: [{ id: "base", type: "raster", source: "base" }] };
}
const BASEMAPS = {
  dark:  rasterStyle(["a","b","c","d"].map(s=>`https://${s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png`), "© OpenStreetMap © CARTO", 20),
  light: rasterStyle(["a","b","c","d"].map(s=>`https://${s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png`), "© OpenStreetMap © CARTO", 20),
  sat:   rasterStyle(["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"], "Esri, Maxar, Earthstar Geographics", 18),
};
const startCam = (P.get("cam") || "37.7749,-122.4194,11").split(",").map(Number);
let baseName = ["dark","light","sat"].includes(P.get("base")) ? P.get("base") : "dark";
const map = new maplibregl.Map({ container: "map", style: BASEMAPS[baseName],
  center: [startCam[1] || -122.4194, startCam[0] || 37.7749], zoom: startCam[2] || 11,
  attributionControl: false });
map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "bottom-left");
map.addControl(new maplibregl.ScaleControl({ unit: "metric" }), "bottom-right");

const overlay = new deck.MapboxOverlay({
  interleaved: false, layers: [],
  getTooltip: ({ object, layer, index }) => {
    if (!layer || !layer.id.startsWith("v_")) return null;
    const L = state.layers.get(layer.id.slice(2));
    if (L && L.binary && index != null && index >= 0) {
      const b = L.binary, lon = b.positions[index*2], lat = b.positions[index*2+1];
      let t = `#${index}\n${lat.toFixed(4)}, ${lon.toFixed(4)}`;
      for (const col in b.colCache) {
        const cc = b.colCache[col];
        const v = cc.meta.dtype === "u8" ? cc.meta.categories[cc.arr[index]] : cc.arr[index];
        t += `\n${col}: ${typeof v === "number" ? (+v).toFixed(3) : v}`;
      }
      return { text: t };
    }
    if (object && object.properties) {
      const rows = Object.keys(object.properties).slice(0, 8).map(k => `${k}: ${object.properties[k]}`).join("\n");
      return rows ? { text: rows } : null;
    }
    return null;
  },
});
map.addControl(overlay);

/* ---------------- state + sidecar ---------------- */
const state = { layers: new Map(), selected: P.get("sel") ? decodeURIComponent(P.get("sel")) : FILE };

const SIDECAR_PATH = FILE + ".json";
async function loadSidecarLayers() {
  try {
    const data = JSON.parse(await fused.readFile(SIDECAR_PATH));
    return (data && data.map && Array.isArray(data.map.layers)) ? data.map.layers : [];
  } catch { return []; }
}
let persistTimer = null;
function schedulePersist() { clearTimeout(persistTimer); persistTimer = setTimeout(persistNow, 250); }
async function persistNow() {
  const overlays = [...state.layers.values()]
    .filter(L => !L.isPrimary && L.descriptor && L.descriptor.status === "ok")
    .map(L => ({ path: L.target, opacity: L.opacity, style: L.style }));
  let data = {}, mtime;
  try {
    const st = await fused.stat(SIDECAR_PATH);
    mtime = st.mtime;
    data = JSON.parse(await fused.readFile(SIDECAR_PATH));
  } catch { /* no sidecar yet */ }
  if (!data || typeof data !== "object") data = {};
  data.map = { layers: overlays };
  try {
    await fused.writeFile(SIDECAR_PATH, JSON.stringify(data, null, 2), mtime ? { expectedMtime: mtime } : undefined);
  } catch (e) {
    if (e && e.type === "conflict") await fused.writeFile(SIDECAR_PATH, JSON.stringify(data, null, 2)).catch(() => {});
  }
}

function primaryOverridesFromParams() {
  const ov = {};
  const op = P.get("opacity"); if (op) ov.opacity = parseFloat(op);
  const cm = P.get("colormap"); if (cm) ov.colormap = cm;
  const rs = P.get("rescale");
  if (rs) { const parts = rs.split(",").map(Number); if (parts.length === 2 && parts.every(Number.isFinite)) ov.rescale = parts; }
  const cb = P.get("colorby"); if (cb) ov.color_by = cb;
  const fill = P.get("fill"); if (fill) ov.fill_rgb = hexToRgb(fill);
  const line = P.get("line"); if (line) ov.line_rgb = hexToRgb(line);
  const lw = P.get("linewidth"); if (lw) ov.line_width = parseFloat(lw);
  const ps = P.get("pointsize"); if (ps) ov.point_radius = parseFloat(ps);
  return ov;
}
function applyStyleOverrides(base, ov) {
  const out = Object.assign({}, base);
  for (const k of ["colormap", "rescale", "color_by", "line_width", "point_radius"])
    if (ov[k] !== undefined) out[k] = ov[k];
  if (ov.fill_rgb) out.fill_color = [...ov.fill_rgb, (base.fill_color || [0,0,0,90])[3] ?? 90];
  if (ov.line_rgb) out.line_color = [...ov.line_rgb, (base.line_color || [0,0,0,220])[3] ?? 220];
  return out;
}
function persistPrimaryParams(L) {
  P.set("opacity", String(+L.opacity.toFixed(2)));
  P.set("colormap", L.style.colormap || "");
  P.set("rescale", L.style.rescale ? L.style.rescale.join(",") : "");
  P.set("colorby", L.style.color_by || "");
  P.set("fill", L.style.fill_color ? rgbToHex(L.style.fill_color) : "");
  P.set("line", L.style.line_color ? rgbToHex(L.style.line_color) : "");
  P.set("linewidth", L.style.line_width != null ? String(L.style.line_width) : "");
  P.set("pointsize", L.style.point_radius != null ? String(L.style.point_radius) : "");
}
function onLayerStyleChanged(L) {
  if (L.isPrimary) { clearTimeout(persistTimer); persistTimer = setTimeout(() => persistPrimaryParams(L), 250); }
  else schedulePersist();
}

/* ---------------- load / render ---------------- */
async function fetchJson(path) { return (await fetch(fused.rawUrl(path))).json(); }

function computeColorByStats(L) {
  const col = L.style.color_by;
  if (!col || !L.geojson) { L._cb = null; return; }
  let mn = Infinity, mx = -Infinity, numeric = true; const cats = new Set();
  for (const f of L.geojson.features) {
    const v = f.properties ? f.properties[col] : undefined;
    if (v === undefined || v === null) continue;
    const n = Number(v);
    if (Number.isFinite(n) && typeof v !== "string") { mn = Math.min(mn, n); mx = Math.max(mx, n); }
    else { numeric = false; cats.add(String(v)); }
  }
  if (numeric && Number.isFinite(mn)) L._cb = { numeric: true, min: mn, max: mx };
  else L._cb = { numeric: false, cats: [...cats].slice(0, 24) };
}
async function ensureColumn(L, col) {
  const b = L.binary;
  if (b.colCache[col]) return b.colCache[col];
  const meta = b.columns[col];
  const buf = await (await fetch(fused.rawUrl(meta.path))).arrayBuffer();
  const arr = meta.dtype === "u8" ? new Uint8Array(buf) : new Float32Array(buf);
  b.colCache[col] = { arr, meta };
  return b.colCache[col];
}
async function computeBinaryColors(L) {
  const s = L.style, b = L.binary;
  if (!s.color_by || !b.columns[s.color_by]) { L._colorBuf = null; L._cb = null; return; }
  const { arr, meta } = await ensureColumn(L, s.color_by);
  const a = (s.fill_color && s.fill_color[3]) ?? 220;
  const out = new Uint8Array(b.count * 4);
  const name = s.colormap || "viridis";
  if (meta.dtype === "f32") {
    const mn = meta.min ?? 0, mx = meta.max ?? 1, rng = mx > mn ? mx - mn : 1;
    for (let i = 0; i < b.count; i++) { const c = cmapColor(name, (arr[i] - mn) / rng); const o = i*4; out[o]=c[0]; out[o+1]=c[1]; out[o+2]=c[2]; out[o+3]=a; }
    L._cb = { numeric: true, min: mn, max: mx };
  } else {
    for (let i = 0; i < b.count; i++) { const c = CAT_COLORS[arr[i] % CAT_COLORS.length]; const o = i*4; out[o]=c[0]; out[o+1]=c[1]; out[o+2]=c[2]; out[o+3]=a; }
    L._cb = { numeric: false, cats: meta.categories };
  }
  L._colorBuf = out;
}

async function loadLayer(target, isPrimary, initial) {
  const L = state.layers.get(target) || {
    target, name: target.split("/").pop(), isPrimary, visible: true,
    opacity: (initial && initial.opacity) ?? 1, style: (initial && initial.style) || {},
    defaultColor: CAT_COLORS[state.layers.size % CAT_COLORS.length],
  };
  L.loading = true;
  state.layers.set(target, L);
  renderAll();
  const desc = await fused.runPython("./map_render.py", {
    target, colormap: L.style.colormap || "viridis",
    rescale: L.style.rescale ? L.style.rescale.join(",") : "",
  }).catch(e => ({ status: "error", message: e.message, kind: null, bounds: null, data: {}, warnings: [] }));
  L.loading = false;
  L.descriptor = desc;
  if (desc.status !== "ok") {
    L.visible = false;
    toast(desc.status === "not_georeferenced" ? "warn" : "bad",
          (isPrimary ? "" : `${L.name}: `) + (desc.message || "could not render"));
    if (!isPrimary) state.layers.delete(target);
    renderAll();
    return;
  }
  const ov = isPrimary ? primaryOverridesFromParams() : {};
  L.style = isPrimary ? applyStyleOverrides(desc.style, ov) : Object.assign({}, desc.style, L.style);
  if (desc.kind === "vector_geojson") {
    L.geojson = await fetchJson(desc.data.geojson_path);
    computeColorByStats(L);
  } else if (desc.kind === "vector_points_binary") {
    const buf = await (await fetch(fused.rawUrl(desc.data.points_path))).arrayBuffer();
    L.binary = { count: desc.data.count, columns: desc.data.columns, positions: new Float32Array(buf), colCache: {} };
    if (L.style.color_by) await computeBinaryColors(L);
  }
  state.selected = state.selected || target;
  renderAll();
  fitTo(desc.bounds);
}

function fitTo(bounds) {
  if (!bounds) return;
  const [w, s, e, n] = bounds;
  if (![w, s, e, n].every(Number.isFinite)) return;
  if (w === e && s === n) { map.flyTo({ center: [w, s], zoom: Math.max(map.getZoom(), 13) }); return; }
  map.fitBounds([[w, s], [e, n]], { padding: 60, maxZoom: 16, duration: 800 });
}

async function addOverlay(path) {
  path = path.trim();
  if (!path || state.layers.has(path)) return;
  await loadLayer(path, false);
  schedulePersist();
}
function removeOverlay(path) {
  state.layers.delete(path);
  if (state.selected === path) state.selected = FILE;
  renderAll();
  schedulePersist();
}

/* ---------------- deck layers ---------------- */
function rebuildDeck() {
  const rasters = [], vectors = [];
  for (const [key, L] of state.layers) {
    if (!L.visible || !L.descriptor || L.descriptor.status !== "ok") continue;
    const d = L.descriptor;
    if (d.kind === "raster_image" && d.data.image_path) {
      rasters.push(new deck.BitmapLayer({ id: "r_" + key, image: fused.rawUrl(d.data.image_path),
        bounds: d.bounds, opacity: L.opacity }));
    } else if (d.kind === "vector_geojson" && L.geojson) {
      vectors.push(makeGeoJsonLayer(key, L));
    } else if (d.kind === "vector_points_binary" && L.binary) {
      vectors.push(makePointsBinaryLayer(key, L));
    }
  }
  overlay.setProps({ layers: [...rasters, ...vectors] });
}
function makePointsBinaryLayer(key, L) {
  const s = L.style, b = L.binary;
  const fill = s.fill_color || [...L.defaultColor, 220];
  const useCB = s.color_by && b.columns[s.color_by] && L._colorBuf;
  return new deck.ScatterplotLayer({
    id: "v_" + key,
    data: { length: b.count, attributes: { getPosition: { value: b.positions, size: 2 } } },
    getFillColor: useCB ? { value: L._colorBuf, size: 4 } : fill,
    getRadius: s.point_radius ?? 4, radiusUnits: "pixels", radiusMinPixels: 1, radiusMaxPixels: 40,
    stroked: false, opacity: L.opacity, pickable: true,
    updateTriggers: { getFillColor: [!!useCB, s.fill_color, s.color_by, s.colormap], getRadius: [s.point_radius] },
  });
}
function makeGeoJsonLayer(key, L) {
  const s = L.style;
  const fill = s.fill_color || [...L.defaultColor, 90];
  const line = s.line_color || [...L.defaultColor, 220];
  let getFill = fill, getLine = line;
  if (s.color_by && L._cb) {
    const cb = L._cb, name = s.colormap || "viridis";
    const colorFor = v => {
      if (v === undefined || v === null) return [130,130,140,180];
      if (cb.numeric) {
        const t = cb.max > cb.min ? (Number(v) - cb.min) / (cb.max - cb.min) : 0.5;
        const c = cmapColor(name, t); return [c[0], c[1], c[2], fill[3] ?? 200];
      }
      const i = cb.cats.indexOf(String(v)); const c = CAT_COLORS[(i < 0 ? 0 : i) % CAT_COLORS.length];
      return [c[0], c[1], c[2], fill[3] ?? 200];
    };
    getFill = f => colorFor(f.properties && f.properties[s.color_by]);
    getLine = f => colorFor(f.properties && f.properties[s.color_by]);
  }
  return new deck.GeoJsonLayer({
    id: "v_" + key, data: L.geojson, pickable: true,
    stroked: true, filled: true, pointType: "circle",
    getFillColor: getFill, getLineColor: (s.color_by && L._cb) ? getLine : line,
    getLineWidth: s.line_width ?? 1.5, lineWidthUnits: "pixels", lineWidthMinPixels: 1,
    getPointRadius: s.point_radius ?? 5, pointRadiusUnits: "pixels", pointRadiusMinPixels: 2,
    opacity: L.opacity,
    updateTriggers: {
      getFillColor: [s.fill_color, s.color_by, s.colormap],
      getLineColor: [s.line_color, s.color_by, s.colormap],
      getLineWidth: [s.line_width], getPointRadius: [s.point_radius],
    },
  });
}
function renderAll() { rebuildDeck(); renderLayerPanel(); }

/* ---------------- layer / style panel ---------------- */
const EYE = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYEOFF = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.9 17.9A10.7 10.7 0 0 1 12 20C5 20 1 12 1 12a19.6 19.6 0 0 1 5.1-5.9m3.9-1.8A10.7 10.7 0 0 1 12 4c7 0 11 8 11 8a19.6 19.6 0 0 1-2.3 3.3M1 1l22 22"/></svg>';

function renderLayerPanel() {
  const box = qs("layercards");
  const active = [...state.layers.values()].filter(L => L.descriptor && L.descriptor.status === "ok");
  if (!active.length) { box.innerHTML = '<div class="lp-empty">No layers loaded yet.</div>'; return; }
  box.innerHTML = "";
  for (const L of active) box.appendChild(layerCard(L));
}
function layerCard(L) {
  const d = L.descriptor, open = state.selected === L.target;
  const card = document.createElement("div");
  card.className = "lc" + (open ? " open" : "");
  const badge = d.kind === "raster_image" ? "raster" : d.kind === "vector_tiles_pmtiles" ? "pmtiles" : "vector";
  const h = document.createElement("div"); h.className = "lc-h";
  h.innerHTML =
    `<button class="lc-eye ${L.visible?'':'off'}" title="Toggle">${L.visible?EYE:EYEOFF}</button>` +
    `<span class="lc-nm" title="${L.target}">${L.name}${L.isPrimary ? ' (primary)' : ''}</span>` +
    `<span class="lc-badge">${badge}</span>` +
    (L.isPrimary ? '' : '<button class="lc-x" title="Remove">×</button>');
  h.querySelector(".lc-eye").onclick = () => { L.visible = !L.visible; renderAll(); };
  h.querySelector(".lc-nm").onclick = () => {
    state.selected = open ? null : L.target;
    P.set("sel", state.selected ? encodeURIComponent(state.selected) : "");
    renderLayerPanel();
  };
  const xBtn = h.querySelector(".lc-x");
  if (xBtn) xBtn.onclick = () => removeOverlay(L.target);
  card.appendChild(h);

  const body = document.createElement("div"); body.className = "lc-body";
  body.appendChild(sliderCtl("Opacity", Math.round(L.opacity*100)+"%", 0, 100, Math.round(L.opacity*100),
    v => { L.opacity = v/100; rebuildDeck(); updateCtlLabel(body,"Opacity",v+"%"); onLayerStyleChanged(L); }));

  if (d.kind === "raster_image") rasterControls(body, L);
  else if (d.kind === "vector_points_binary") binaryPointControls(body, L);
  else if (d.kind === "vector_geojson") vectorControls(body, L);

  const st = d.stats || {};
  let statTxt = "";
  if (d.kind === "raster_image") statTxt = `${st.bands}-band · ${st.width}×${st.height} · ${st.dtype}`;
  else if (d.kind === "vector_geojson" || d.kind === "vector_points_binary") statTxt = `${(st.feature_count||0).toLocaleString()} features · ${(st.geometry_types||[]).join(", ")}`;
  if (d.crs_original) statTxt += `\nCRS: ${d.crs_original}`;
  if (statTxt) { const s = document.createElement("div"); s.className = "stat"; s.textContent = statTxt; body.appendChild(s); }
  (d.warnings||[]).forEach(w => { const el = document.createElement("div"); el.className="warnline"; el.textContent="⚠ "+w; body.appendChild(el); });
  card.appendChild(body);
  return card;
}
function rasterControls(body, L) {
  const s = L.style;
  if (s.render_mode !== "rgb") {
    body.appendChild(selectCtl("Colormap", Object.keys(CMAPS), s.colormap || "viridis", v => {
      s.colormap = v; reloadRaster(L);
    }));
    const st = (L.descriptor.stats.band_stats || [{}])[0];
    const leg = document.createElement("div"); leg.className = "legend";
    leg.innerHTML = `<div class="bar" style="background:${cmapGradient(s.colormap||'viridis')}"></div>
      <div class="ends"><span>${fmt(st.p2 ?? st.min)}</span><span>${fmt(st.p98 ?? st.max)}</span></div>`;
    body.appendChild(leg);
  } else {
    const note = document.createElement("div"); note.className="stat"; note.textContent="RGB composite (bands 1–3)"; body.appendChild(note);
  }
}
async function reloadRaster(L) {
  L.loading = true; renderLayerPanel();
  const desc = await fused.runPython("./map_render.py", { target: L.target, colormap: L.style.colormap || "viridis",
    rescale: L.style.rescale ? L.style.rescale.join(",") : "" }).catch(e => null);
  L.loading = false;
  if (desc && desc.status === "ok") { const keepStyle = L.style; L.descriptor = desc; L.style = Object.assign({}, desc.style, keepStyle); }
  renderAll();
  onLayerStyleChanged(L);
}
function vectorControls(body, L) {
  const s = L.style, d = L.descriptor;
  const gtypes = d.stats.geometry_types || [];
  const isPoint = gtypes.some(g => g.includes("Point"));
  const isLine = gtypes.some(g => g.includes("Line"));
  const allCols = Object.keys(d.stats.columns || {});

  body.appendChild(selectCtl("Color by", ["(single color)", ...allCols], s.color_by || "(single color)", v => {
    s.color_by = v === "(single color)" ? null : v;
    computeColorByStats(L); rebuildDeck(); renderLayerPanel(); onLayerStyleChanged(L);
  }));
  if (s.color_by && L._cb) {
    body.appendChild(selectCtl("Palette", Object.keys(CMAPS), s.colormap || "viridis", v => { s.colormap=v; rebuildDeck(); renderLayerPanel(); onLayerStyleChanged(L); }));
    const leg = document.createElement("div"); leg.className="legend";
    if (L._cb.numeric) leg.innerHTML = `<div class="bar" style="background:${cmapGradient(s.colormap||'viridis')}"></div><div class="ends"><span>${fmt(L._cb.min)}</span><span>${fmt(L._cb.max)}</span></div>`;
    else leg.innerHTML = `<div class="swatchrow">${L._cb.cats.map((c,i)=>{const col=CAT_COLORS[i%CAT_COLORS.length];return `<span class="swatch"><i style="background:rgb(${col[0]},${col[1]},${col[2]})"></i>${c}</span>`;}).join("")}</div>`;
    body.appendChild(leg);
  } else {
    if (!isLine) body.appendChild(colorCtl("Fill", rgbToHex(s.fill_color||L.defaultColor), hex => {
      const a = (s.fill_color && s.fill_color[3]) ?? 90; s.fill_color = [...hexToRgb(hex), a]; rebuildDeck(); onLayerStyleChanged(L);
    }));
    body.appendChild(colorCtl("Line / point", rgbToHex(s.line_color||L.defaultColor), hex => {
      const a = (s.line_color && s.line_color[3]) ?? 220; s.line_color = [...hexToRgb(hex), a];
      if (isPoint) { const fa=(s.fill_color&&s.fill_color[3])??220; s.fill_color=[...hexToRgb(hex),fa]; }
      rebuildDeck(); onLayerStyleChanged(L);
    }));
  }
  if (!isPoint) body.appendChild(sliderCtl("Line width", (s.line_width??1.5).toFixed(1), 0, 8, Math.round((s.line_width??1.5)*2),
    v => { s.line_width = v/2; rebuildDeck(); updateCtlLabel(body,"Line width",(v/2).toFixed(1)); onLayerStyleChanged(L); }));
  if (isPoint) body.appendChild(sliderCtl("Point size", String(s.point_radius??5), 1, 24, s.point_radius??5,
    v => { s.point_radius = v; rebuildDeck(); updateCtlLabel(body,"Point size",String(v)); onLayerStyleChanged(L); }));
}
function binaryPointControls(body, L) {
  const s = L.style, b = L.binary;
  const cols = Object.keys(b.columns);
  body.appendChild(selectCtl("Color by", ["(single color)", ...cols], s.color_by || "(single color)", async v => {
    s.color_by = v === "(single color)" ? null : v;
    await computeBinaryColors(L); rebuildDeck(); renderLayerPanel(); onLayerStyleChanged(L);
  }));
  if (s.color_by && L._cb) {
    body.appendChild(selectCtl("Palette", Object.keys(CMAPS), s.colormap || "viridis", async v => {
      s.colormap = v; await computeBinaryColors(L); rebuildDeck(); renderLayerPanel(); onLayerStyleChanged(L);
    }));
    const leg = document.createElement("div"); leg.className = "legend";
    if (L._cb.numeric) leg.innerHTML = `<div class="bar" style="background:${cmapGradient(s.colormap||'viridis')}"></div><div class="ends"><span>${fmt(L._cb.min)}</span><span>${fmt(L._cb.max)}</span></div>`;
    else leg.innerHTML = `<div class="swatchrow">${(L._cb.cats||[]).slice(0,24).map((c,i)=>{const col=CAT_COLORS[i%CAT_COLORS.length];return `<span class="swatch"><i style="background:rgb(${col[0]},${col[1]},${col[2]})"></i>${c}</span>`;}).join("")}</div>`;
    body.appendChild(leg);
  } else {
    body.appendChild(colorCtl("Color", rgbToHex(s.fill_color||L.defaultColor), hex => {
      const a = (s.fill_color && s.fill_color[3]) ?? 220; s.fill_color = [...hexToRgb(hex), a]; rebuildDeck(); onLayerStyleChanged(L);
    }));
  }
  body.appendChild(sliderCtl("Point size", String(s.point_radius??4), 1, 24, s.point_radius??4,
    v => { s.point_radius = v; rebuildDeck(); updateCtlLabel(body,"Point size",String(v)); onLayerStyleChanged(L); }));
}
function ctlShell(label, valTxt) {
  const c = document.createElement("div"); c.className = "ctl"; c.dataset.label = label;
  const l = document.createElement("div"); l.className = "ctl-lbl";
  l.innerHTML = `<span>${label}</span><b>${valTxt||""}</b>`; c.appendChild(l); return c;
}
function updateCtlLabel(body, label, val) {
  const c = [...body.querySelectorAll(".ctl")].find(x => x.dataset.label === label);
  if (c) c.querySelector("b").textContent = val;
}
function sliderCtl(label, valTxt, min, max, val, on) {
  const c = ctlShell(label, valTxt);
  const r = document.createElement("input"); r.type="range"; r.min=min; r.max=max; r.value=val;
  r.oninput = e => on(Number(e.target.value)); c.appendChild(r); return c;
}
function selectCtl(label, opts, val, on) {
  const c = ctlShell(label, "");
  const sel = document.createElement("select");
  for (const o of opts) { const op=document.createElement("option"); op.value=o; op.textContent=o; if(o===val)op.selected=true; sel.appendChild(op); }
  sel.onchange = e => on(e.target.value); c.appendChild(sel); return c;
}
function colorCtl(label, hex, on) {
  const c = ctlShell(label, "");
  const inp = document.createElement("input"); inp.type = "color"; inp.value = hex;
  inp.oninput = e => on(e.target.value);
  c.querySelector(".ctl-lbl b").replaceWith(inp);
  return c;
}

/* ---------------- top controls ---------------- */
qs("btn-full").onclick = () => {
  if (!document.fullscreenElement) document.body.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
};
document.addEventListener("fullscreenchange", () => {
  qs("btn-full").classList.toggle("on", !!document.fullscreenElement);
  setTimeout(()=>map.resize(), 120);
});
qs("btn-layers").onclick = () => {
  const p = qs("layerpanel"); const show = p.style.display !== "flex";
  p.style.display = show ? "flex" : "none"; qs("btn-layers").classList.toggle("on", show);
  if (show) { qs("geobox").style.display = "none"; qs("addpanel").style.display = "none"; }
};
qs("lp-close").onclick = () => { qs("layerpanel").style.display = "none"; qs("btn-layers").classList.remove("on"); };

qs("basemap-seg").querySelectorAll("button").forEach(b => b.onclick = () => setBasemap(b.dataset.b));
function setBasemap(name) {
  if (!BASEMAPS[name] || name === baseName) return;
  baseName = name; P.set("base", name);
  qs("basemap-seg").querySelectorAll("button").forEach(b => b.classList.toggle("on", b.dataset.b === name));
  map.setStyle(BASEMAPS[name]);
}

qs("btn-search").onclick = () => {
  const g = qs("geobox"); const show = g.style.display !== "block";
  g.style.display = show ? "block" : "none"; qs("btn-search").classList.toggle("on", show);
  if (show) { qs("layerpanel").style.display = "none"; qs("addpanel").style.display = "none"; qs("geoinput").focus(); }
};
let geoTimer = null;
qs("geoinput").oninput = e => {
  clearTimeout(geoTimer); const q = e.target.value.trim();
  if (q.length < 3) { qs("georesults").innerHTML = ""; return; }
  geoTimer = setTimeout(() => geocode(q), 320);
};
async function geocode(q) {
  const box = qs("georesults");
  box.innerHTML = '<div class="geores none">Searching…</div>';
  try {
    const r = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=6`);
    const j = await r.json();
    const feats = j.features || [];
    if (!feats.length) { box.innerHTML = '<div class="geores none">No matches.</div>'; return; }
    box.innerHTML = "";
    for (const f of feats) {
      const p = f.properties || {}, c = f.geometry.coordinates;
      const name = p.name || p.street || p.city || "Result";
      const sub = [p.city, p.state, p.country].filter(Boolean).join(", ");
      const div = document.createElement("div"); div.className = "geores";
      div.innerHTML = `<div class="g1">${name}</div><div class="g2">${sub}</div>`;
      div.onclick = () => {
        if (p.extent) { const [w,nn,ee,ss] = p.extent; map.fitBounds([[w,ss],[ee,nn]], { padding: 60, maxZoom: 15, duration: 900 }); }
        else map.flyTo({ center: [c[0], c[1]], zoom: 13, duration: 900 });
        qs("geobox").style.display = "none"; qs("btn-search").classList.remove("on");
      };
      box.appendChild(div);
    }
  } catch { box.innerHTML = '<div class="geores none">Geocoding failed (offline?).</div>'; }
}

/* ---------------- add-layer panel ---------------- */
qs("btn-add").onclick = () => {
  const p = qs("addpanel"); const show = p.style.display !== "flex";
  p.style.display = show ? "flex" : "none"; qs("btn-add").classList.toggle("on", show);
  if (show) { qs("geobox").style.display = "none"; qs("layerpanel").style.display = "none"; refreshExplorer(); }
};
qs("add-go").onclick = () => { const v = qs("addpath").value.trim(); if (v) { addOverlay(v); qs("addpath").value = ""; } };
qs("addpath").onkeydown = e => { if (e.key === "Enter") qs("add-go").click(); };
async function refreshExplorer(dir) {
  dir = dir || FILE.slice(0, FILE.lastIndexOf("/") + 1);
  const r = await fused.runPython("./browse.py", { dir }).catch(() => null);
  if (!r || r.error) return;
  qs("crumbs").innerHTML = r.crumbs.map(c => `<a data-p="${c.path}">${c.label}</a>`).join(' <span style="color:#4b5058">/</span> ');
  qs("crumbs").querySelectorAll("a").forEach(a => a.onclick = () => refreshExplorer(a.dataset.p));
  const entries = [...r.dirs, ...r.files];
  qs("explorerList").innerHTML = entries.map(e =>
    `<div class="row${e.is_dir ? '' : (e.loadable ? '' : ' dim')}" data-p="${e.path}" data-d="${e.is_dir?1:0}" data-l="${e.loadable?1:0}">
       <span class="ic">${e.is_dir ? '📁' : '🗺'}</span><span class="nm">${e.name}</span>
       <span class="sz">${e.size ? human(e.size) : ''}</span></div>`).join('') || '<div class="row dim">empty</div>';
  qs("explorerList").querySelectorAll(".row[data-p]").forEach(row => row.onclick = () => {
    if (row.dataset.d === "1") refreshExplorer(row.dataset.p);
    else if (row.dataset.l === "1") { addOverlay(row.dataset.p); qs("addpanel").style.display = "none"; qs("btn-add").classList.remove("on"); }
  });
}

/* ---------------- coordinate readout + camera persist ---------------- */
map.on("mousemove", e => { qs("coords").textContent = `${e.lngLat.lat.toFixed(4)}, ${e.lngLat.lng.toFixed(4)}  z${map.getZoom().toFixed(1)}`; });
map.on("mouseout", () => { const c = map.getCenter(); qs("coords").textContent = `${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}  z${map.getZoom().toFixed(1)}`; });
map.on("moveend", () => { const c = map.getCenter(); P.set("cam", `${c.lat.toFixed(4)},${c.lng.toFixed(4)},${map.getZoom().toFixed(1)}`); });

/* ---------------- params -> live state (e.g. back/forward navigation) ---------------- */
fused.params.onChange(() => {
  const bn = P.get("base");
  if (bn && bn !== baseName) setBasemap(bn);
});

/* ---------------- boot ---------------- */
(async function boot() {
  await loadLayer(FILE, true);
  const saved = await loadSidecarLayers();
  for (const ov of saved) await loadLayer(ov.path, false, ov);
})();

}
