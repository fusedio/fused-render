<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Parquet preview</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #1c1e21;
  }
  #bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-bottom: 1px solid #e3e5e8;
    background: #f7f8fa;
    position: sticky;
    top: 0;
  }
  #bar button {
    font: inherit;
    padding: 4px 10px;
    border: 1px solid #e3e5e8;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }
  #bar button:disabled {
    opacity: 0.4;
    cursor: default;
  }
  #rowcount {
    color: #6b7280;
  }
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    padding: 5px 10px;
    border-bottom: 1px solid #eee;
    text-align: left;
    white-space: nowrap;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th {
    background: #f7f8fa;
    position: sticky;
    top: 37px;
    font-weight: 600;
  }
  #status {
    padding: 24px;
    color: #6b7280;
  }
  #status.error {
    color: #c0392b;
  }
</style>
</head>
<body>
  <div id="bar">
    <button id="prev">&larr; Prev</button>
    <button id="next">Next &rarr;</button>
    <span id="rowcount"></span>
  </div>
  <div id="tablewrap"></div>
  <script>
    const LIMIT = 100;
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const rowcountEl = document.getElementById("rowcount");
    const wrap = document.getElementById("tablewrap");

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function currentOffset() {
      const raw = fused.params.get("offset");
      const n = raw ? parseInt(raw, 10) : 0;
      return Number.isFinite(n) && n >= 0 ? n : 0;
    }

    function render(data, offset) {
      const total = data.total_rows;
      const shown = data.rows.length;
      const from = shown === 0 ? 0 : offset + 1;
      const to = offset + shown;
      rowcountEl.textContent = `rows ${from.toLocaleString()}–${to.toLocaleString()} of ${total.toLocaleString()}`;
      prevBtn.disabled = offset <= 0;
      nextBtn.disabled = offset + LIMIT >= total;

      const cols = data.columns;
      const head = `<tr>${cols.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
      const body = data.rows
        .map((row) => `<tr>${cols.map((c) => `<td title="${escapeHtml(row[c])}">${escapeHtml(row[c])}</td>`).join("")}</tr>`)
        .join("");
      wrap.innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    }

    async function load() {
      const file = fused.params.get("_file");
      const offset = currentOffset();
      wrap.innerHTML = `<div id="status">Loading…</div>`;
      if (!file) {
        wrap.innerHTML = `<div id="status" class="error">No file selected (missing _file param).</div>`;
        return;
      }
      try {
        const data = await fused.runPython("./parquet_reader.py", {
          file,
          offset: String(offset),
          limit: String(LIMIT),
        });
        render(data, offset);
      } catch (err) {
        wrap.innerHTML = `<div id="status" class="error"><strong>${escapeHtml(err.type || "Error")}</strong>: ${escapeHtml(err.message || "")}</div>`;
      }
    }

    prevBtn.addEventListener("click", () => {
      fused.params.set("offset", String(Math.max(0, currentOffset() - LIMIT)));
    });
    nextBtn.addEventListener("click", () => {
      fused.params.set("offset", String(currentOffset() + LIMIT));
    });
    fused.params.onChange(load);
    load();
  </script>
</body>
</html>
