<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Log preview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #e8eaed;
    background: #131417;
  }
  #bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid #2a2d33;
    background: #1b1d21;
    position: sticky;
    top: 0;
  }
  #bar label {
    color: #9aa0a6;
  }
  #bar input[type="number"] {
    width: 80px;
    font: inherit;
    padding: 4px 8px;
    border: 1px solid #2a2d33;
    border-radius: 6px;
    background: #131417;
    color: #e8eaed;
  }
  #bar button {
    font: inherit;
    padding: 4px 10px;
    border: 1px solid #2a2d33;
    border-radius: 6px;
    background: #131417;
    color: #e8eaed;
    cursor: pointer;
  }
  #bar button:hover {
    background: #24262b;
  }
  #meta {
    margin-left: auto;
    color: #9aa0a6;
    white-space: nowrap;
  }
  #status {
    padding: 24px;
    color: #9aa0a6;
  }
  #status.error {
    color: #ff6b6b;
  }
  #loglines {
    margin: 0;
    padding: 8px 0;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12.5px;
  }
  .line {
    display: flex;
    padding: 1px 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .line:hover {
    background: rgba(255, 255, 255, 0.04);
  }
  .lineno {
    flex: 0 0 auto;
    width: 56px;
    text-align: right;
    margin-right: 12px;
    color: #5f6368;
    user-select: none;
  }
  .text {
    flex: 1 1 auto;
  }
  .line.error {
    background: rgba(255, 82, 82, 0.14);
  }
  .line.error .text {
    color: #ff8a80;
  }
  .line.error .lineno {
    color: #ff6b6b;
  }
  .line.warn {
    background: rgba(255, 193, 7, 0.10);
  }
  .line.warn .text {
    color: #ffd873;
  }
  .line.warn .lineno {
    color: #e0b23c;
  }
</style>
</head>
<body>
  <div id="bar">
    <label for="nInput">Last</label>
    <input id="nInput" type="number" min="1" step="1" />
    <label for="nInput">lines</label>
    <button id="applyBtn">Apply</button>
    <button id="reloadBtn">Reload</button>
    <span id="meta"></span>
  </div>
  <div id="content"><div id="status">Loading…</div></div>
  <script>
    const DEFAULT_N = 200;
    const nInput = document.getElementById("nInput");
    const applyBtn = document.getElementById("applyBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const metaEl = document.getElementById("meta");
    const content = document.getElementById("content");

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function currentN() {
      const raw = fused.params.get("n");
      const n = raw ? parseInt(raw, 10) : DEFAULT_N;
      return Number.isFinite(n) && n > 0 ? n : DEFAULT_N;
    }

    function classify(line) {
      // ERROR takes priority over WARN when a line somehow has both.
      if (/error/i.test(line)) return "error";
      if (/warn/i.test(line)) return "warn";
      return "";
    }

    function render(data, startLineNo) {
      const total = data.count;
      metaEl.textContent =
        `showing last ${total.toLocaleString()} line${total === 1 ? "" : "s"}` +
        (data.has_more ? " (more above)" : "") +
        ` · ${data.file_size.toLocaleString()} bytes`;

      if (total === 0) {
        content.innerHTML = `<div id="status">File is empty.</div>`;
        return;
      }

      const rows = data.lines
        .map((line, i) => {
          const cls = classify(line);
          const lineNo = startLineNo + i;
          return `<div class="line ${cls}"><span class="lineno">${lineNo}</span><span class="text">${escapeHtml(line)}</span></div>`;
        })
        .join("");
      content.innerHTML = `<div id="loglines">${rows}</div>`;
      content.scrollTop = content.scrollHeight;
    }

    async function load() {
      const file = fused.params.get("_file");
      const n = currentN();
      nInput.value = n;
      if (!file) {
        content.innerHTML = `<div id="status" class="error">No file selected (missing _file param).</div>`;
        return;
      }
      content.innerHTML = `<div id="status">Loading…</div>`;
      try {
        const data = await fused.runPython("./log_reader.py", {
          file,
          n: String(n),
        });
        // We only know the true total line count when the whole file was
        // read (has_more === false); otherwise number relative to the tail.
        render(data, 1);
      } catch (err) {
        content.innerHTML = `<div id="status" class="error"><strong>${escapeHtml(err.type || "Error")}</strong>: ${escapeHtml(err.message || "")}</div>`;
      }
    }

    function applyN() {
      const n = parseInt(nInput.value, 10);
      fused.params.set("n", String(Number.isFinite(n) && n > 0 ? n : DEFAULT_N));
    }

    applyBtn.addEventListener("click", applyN);
    nInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") applyN();
    });
    reloadBtn.addEventListener("click", load);
    fused.params.onChange(load);
    load();
  </script>
</body>
</html>
