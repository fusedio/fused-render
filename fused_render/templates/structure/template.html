<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Parquet structure</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px; color: #e8eaed; background: #131417;
  }
  /* Top bar: file summary on the left, the Layout/Metadata toggle on the right. */
  #bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-bottom: 1px solid #2a2d33; background: #1b1d21;
    position: sticky; top: 0; z-index: 3; flex-wrap: wrap;
  }
  #summary { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; color: #9aa0a6; }
  #summary .stat { white-space: nowrap; }
  #summary .stat b { color: #e8eaed; font-weight: 600; }
  #summary .sep { color: #3a3d44; }
  #tabs { margin-left: auto; display: flex; gap: 4px; }
  #tabs button {
    font: inherit; padding: 4px 12px; border: 1px solid #2a2d33; border-radius: 6px;
    background: #131417; color: #cfd3d7; cursor: pointer;
  }
  #tabs button.active { background: #23324a; border-color: #35507a; color: #eaf1ff; }
  #content { padding: 14px; }
  #status { padding: 24px; color: #9aa0a6; }
  #status.error { color: #ff6b6b; }

  /* ---- Layout view: nested byte-range boxes ---- */
  .lay { display: flex; flex-direction: column; gap: 10px; max-width: 760px; }
  .box {
    border: 1px solid #2f333b; border-radius: 8px; background: #191b1f;
    padding: 10px 12px;
  }
  .box-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
  }
  .box-title { font-weight: 600; }
  .box-title .muted { color: #9aa0a6; font-weight: 400; margin-left: 6px; }
  .box-range { color: #9aa0a6; font-size: 12px; text-align: right; white-space: nowrap; line-height: 1.35; }
  .box-range b { color: #cfd3d7; font-weight: 600; }
  .magic { background: #16181c; border-style: dashed; }
  .rg { border-color: #3a4152; background: #1a1d24; }
  .rg > .cols { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .col { border-color: #333844; background: #1e2128; }
  .col > .data {
    margin-top: 8px; border: 1px solid #2c313b; border-radius: 6px;
    background: #23262e; padding: 8px 10px;
  }

  /* ---- Metadata view ---- */
  .meta-section { margin-bottom: 20px; }
  .meta-section h3 { margin: 0 0 8px; font-size: 13px; color: #cfd3d7; }
  table { border-collapse: collapse; width: 100%; max-width: 900px; }
  th, td {
    padding: 5px 10px; border-bottom: 1px solid #24262b; text-align: left;
    vertical-align: top; white-space: nowrap;
  }
  /* Header sits slightly lifted above the body with a crisp divider, so it
     reads as a header rather than another data row (shared by the Schema table
     and the per-row-group chunk tables). */
  th {
    background: #23262c; color: #cfd3d7; font-weight: 600;
    border-bottom: 1px solid #3a3d44;
  }
  td { color: #c2c7cd; }
  tbody tr:hover td { background: #1d2025; }
  tbody tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .kv { display: grid; grid-template-columns: max-content 1fr; gap: 4px 16px; max-width: 720px; }
  .kv dt { color: #9aa0a6; }
  .kv dd { margin: 0; color: #e8eaed; font-variant-numeric: tabular-nums; }
  details.rgd { border: 1px solid #2a2d33; border-radius: 6px; margin-bottom: 8px; background: #191b1f; }
  details.rgd > summary {
    cursor: pointer; padding: 8px 10px; color: #cfd3d7; font-weight: 600;
    display: flex; gap: 12px; align-items: baseline;
  }
  details.rgd > summary .muted { color: #9aa0a6; font-weight: 400; }
  details.rgd[open] > summary { border-bottom: 1px solid #24262b; }
  details.rgd .rgd-body { padding: 4px 6px 8px; overflow-x: auto; }
  code.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #b7c0cb; }

  /* ---- Grid view: whole-file storage profile ---- */
  .grid-legend {
    display: flex; flex-wrap: wrap; gap: 8px 18px; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid #24262b;
  }
  .leg-item { display: inline-flex; align-items: center; gap: 6px; }
  .leg-item .swatch { width: 11px; height: 11px; border-radius: 3px; flex: 0 0 auto; }
  .leg-pct { color: #9aa0a6; font-size: 12px; }
  .grid-chart { display: flex; flex-direction: column; gap: 6px; max-width: 1000px; }
  .g-row { display: flex; align-items: center; gap: 10px; }
  .g-label {
    flex: 0 0 46px; text-align: right; color: #9aa0a6; font-variant-numeric: tabular-nums;
  }
  .g-track { flex: 1 1 auto; min-width: 0; background: #17181c; border-radius: 4px; height: 22px; overflow: hidden; }
  .g-bar { display: flex; height: 100%; min-width: 2px; }
  .g-seg { height: 100%; transition: filter 0.08s; }
  .g-seg:hover { filter: brightness(1.35); }
  .g-size {
    flex: 0 0 auto; color: #cfd3d7; font-variant-numeric: tabular-nums; font-size: 12px;
    white-space: nowrap; min-width: 120px;
  }
  .g-size .muted { color: #6b7076; }
  .grid-note { max-width: 700px; margin: 16px 0 0; color: #9aa0a6; font-size: 12px; line-height: 1.5; }

  /* ---- Loading skeleton ----
     Shimmering placeholders shaped like whichever tab is about to render
     (Grid bars / Layout boxes / Metadata rows), so the wait previews the real
     layout instead of a bare "Loading…" line. One shimmer sweep reused
     everywhere: a gradient dragged across background-position. */
  .skel {
    background: linear-gradient(90deg, #1c1f24 25%, #2b2f37 50%, #1c1f24 75%);
    background-size: 200% 100%;
    animation: skel-shimmer 1.2s ease-in-out infinite;
    border-radius: 4px;
  }
  @keyframes skel-shimmer {
    from { background-position: 200% 0; }
    to { background-position: -200% 0; }
  }
  .skel-text { display: inline-block; height: 11px; vertical-align: middle; }
  .skel-swatch { display: inline-block; width: 11px; height: 11px; border-radius: 3px; }
</style>
</head>
<body>
  <div id="bar">
    <div id="summary"></div>
    <div id="tabs">
      <button id="tab-grid" class="active">Grid</button>
      <button id="tab-layout">Layout</button>
      <button id="tab-metadata">Metadata</button>
    </div>
  </div>
  <div id="content">
    <div class="grid-legend">
      <span class="leg-item"><span class="skel skel-swatch"></span><span class="skel skel-text" style="width:130px"></span></span>
      <span class="leg-item"><span class="skel skel-swatch"></span><span class="skel skel-text" style="width:150px"></span></span>
      <span class="leg-item"><span class="skel skel-swatch"></span><span class="skel skel-text" style="width:105px"></span></span>
      <span class="leg-item"><span class="skel skel-swatch"></span><span class="skel skel-text" style="width:95px"></span></span>
      <span class="leg-item"><span class="skel skel-swatch"></span><span class="skel skel-text" style="width:120px"></span></span>
    </div>
    <div class="grid-chart">
      <div class="g-row"><span class="g-label"><span class="skel skel-text" style="width:26px"></span></span><span class="g-track"><span class="skel" style="display:block;height:100%;width:86%"></span></span><span class="g-size"><span class="skel skel-text" style="width:70px"></span></span></div>
      <div class="g-row"><span class="g-label"><span class="skel skel-text" style="width:26px"></span></span><span class="g-track"><span class="skel" style="display:block;height:100%;width:62%"></span></span><span class="g-size"><span class="skel skel-text" style="width:70px"></span></span></div>
      <div class="g-row"><span class="g-label"><span class="skel skel-text" style="width:26px"></span></span><span class="g-track"><span class="skel" style="display:block;height:100%;width:74%"></span></span><span class="g-size"><span class="skel skel-text" style="width:70px"></span></span></div>
      <div class="g-row"><span class="g-label"><span class="skel skel-text" style="width:26px"></span></span><span class="g-track"><span class="skel" style="display:block;height:100%;width:45%"></span></span><span class="g-size"><span class="skel skel-text" style="width:70px"></span></span></div>
    </div>
  </div>
  <script>
    const el = (id) => document.getElementById(id);
    const content = el("content");
    const summaryEl = el("summary");
    let data = null;

    const esc = (s) => String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    const n = (x) => (x == null ? "—" : Number(x).toLocaleString());

    // Human byte size (1.0 KB / 399.0 MB / 1.2 GB). Base-1024, one decimal.
    function humanBytes(b) {
      if (b == null) return "—";
      const u = ["B", "KB", "MB", "GB", "TB"];
      let v = b, i = 0;
      while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
      return (i === 0 ? v : v.toFixed(1)) + " " + u[i];
    }

    // Stable-ish colour per column so a column keeps its hue across row groups.
    function colColor(i) { return `hsl(${(i * 47) % 360} 45% 45%)`; }

    function currentTab() {
      const t = fused.params.get("view");
      return (t === "metadata" || t === "layout") ? t : "grid";
    }

    function renderSummary() {
      const f = data.file;
      const stats = [
        ["size", humanBytes(f.size)],
        ["rows", n(f.num_rows)],
        ["row groups", n(f.num_row_groups)],
        ["columns", n(f.num_columns)],
        ["compression", f.compression.length ? f.compression.join(", ") : "—"],
      ];
      summaryEl.innerHTML = stats
        .map(([k, v]) => `<span class="stat">${esc(k)} <b>${esc(v)}</b></span>`)
        .join(`<span class="sep">·</span>`);
    }

    function renderLayout() {
      const f = data.file;
      const parts = [];
      for (const r of data.layout) {
        if (r.kind === "header" || r.kind === "footer") {
          parts.push(`<div class="box magic">
            <div class="box-head">
              <span class="box-title">${esc(r.label)}<span class="muted">${r.kind}</span></span>
              <span class="box-range">start <b>${n(r.start)}</b><br>bytes <b>${n(r.bytes)}</b><br>end <b>${n(r.end)}</b></span>
            </div></div>`);
        } else if (r.kind === "row_group") {
          const cols = r.columns.map((c, i) => `
            <div class="box col">
              <div class="box-head">
                <span class="box-title">Column <code class="mono">${esc(c.path)}</code></span>
                <span class="box-range">bytes <b>${n(c.bytes)}</b></span>
              </div>
              <div class="data">
                <div class="box-head">
                  <span class="box-title" style="font-weight:400;color:#9aa0a6">Data</span>
                  <span class="box-range">start <b>${n(c.start)}</b><br>bytes <b>${n(c.bytes)}</b><br>end <b>${n(c.end)}</b></span>
                </div>
              </div>
            </div>`).join("");
          parts.push(`<div class="box rg">
            <div class="box-head">
              <span class="box-title">RowGroup ${r.index}<span class="muted">${n(r.num_rows)} rows</span></span>
              <span class="box-range">bytes <b>${n(r.bytes)}</b></span>
            </div>
            <div class="cols">${cols}</div>
          </div>`);
        }
      }
      content.innerHTML = `<div class="lay">${parts.join("")}</div>`;
    }

    function renderMetadata() {
      const f = data.file;
      // The top summary bar already carries size / rows / row groups / columns /
      // compression — the File section only adds what it doesn't show.
      const fileRows = [
        ["Path", esc(f.path)],
        ["Format version", esc(f.format_version)],
        ["Created by", esc(f.created_by || "—")],
        ["Compressed", `${humanBytes(f.total_compressed)} <span style="color:#9aa0a6">(${n(f.total_compressed)} bytes)</span>`],
        ["Uncompressed", `${humanBytes(f.total_uncompressed)} <span style="color:#9aa0a6">(${n(f.total_uncompressed)} bytes)</span>`],
        ["Footer size", `${n(f.serialized_size)} bytes`],
      ].map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join("");

      const schemaRows = data.schema.map((c) => `<tr>
        <td><code class="mono">${esc(c.path)}</code></td>
        <td>${esc(c.physical_type)}</td>
        <td>${esc(c.logical_type || c.converted_type || "—")}</td>
        <td class="num">${c.max_def}</td>
        <td class="num">${c.max_rep}</td></tr>`).join("");

      const rgDetails = data.row_groups.map((rg) => {
        const chunkRows = rg.columns.map((c) => {
          const st = c.stats || {};
          const mm = (st.min == null && st.max == null) ? "—"
            : `${esc(String(st.min))} … ${esc(String(st.max))}`;
          return `<tr>
            <td><code class="mono">${esc(c.path)}</code></td>
            <td>${esc(c.physical_type)}</td>
            <td>${esc(c.compression)}</td>
            <td>${esc(c.encodings.join(", "))}</td>
            <td class="num">${n(c.num_values)}</td>
            <td class="num">${humanBytes(c.compressed_size)}</td>
            <td class="num">${humanBytes(c.uncompressed_size)}</td>
            <td class="num">${n(c.start)}</td>
            <td>${mm}</td>
            <td class="num">${st.nulls == null ? "—" : n(st.nulls)}</td></tr>`;
        }).join("");
        return `<details class="rgd">
          <summary>RowGroup ${rg.index}
            <span class="muted">${n(rg.num_rows)} rows · ${humanBytes(rg.compressed_size)} compressed · ${humanBytes(rg.total_byte_size)} raw</span>
          </summary>
          <div class="rgd-body"><table><thead><tr>
            <th>Column</th><th>Type</th><th>Codec</th><th>Encodings</th><th>Values</th>
            <th>Compressed</th><th>Uncompressed</th><th>Offset</th><th>Min … Max</th><th>Nulls</th>
          </tr></thead><tbody>${chunkRows}</tbody></table></div>
        </details>`;
      }).join("");

      content.innerHTML = `
        <div class="meta-section"><h3>File</h3><dl class="kv">${fileRows}</dl></div>
        <div class="meta-section"><h3>Schema</h3>
          <table><thead><tr><th>Column</th><th>Physical type</th><th>Logical type</th>
          <th class="num">Max def</th><th class="num">Max rep</th></tr></thead>
          <tbody>${schemaRows}</tbody></table></div>
        <div class="meta-section"><h3>Row groups</h3>${rgDetails}</div>`;
    }

    // Grid: the whole file's storage profile at a glance. One row per row group;
    // the bar's length is the row group's compressed size relative to the
    // largest (so a fat row group looks fat), split into per-column segments
    // sized by each column chunk's bytes. A legend maps colour -> column with
    // its file-wide share, so "where do the bytes go?" is answerable instantly.
    function renderGrid() {
      const rgs = data.row_groups;
      if (!rgs.length) { content.innerHTML = `<div id="status">No row groups.</div>`; return; }
      // Enumerate columns from the file schema (authoritative + stable order),
      // not from row group 0 — so the legend and totals cover every column even
      // if some row group happens to hold fewer chunks.
      const cols = data.schema.map((s) => s.path);
      const maxRg = Math.max(...rgs.map((r) => r.compressed_size), 1);

      // File-wide bytes per column, summed across every row group (biggest first).
      const totals = cols.map((path, i) => ({
        path, i,
        bytes: rgs.reduce((s, r) => s + (r.columns[i] ? r.columns[i].compressed_size : 0), 0),
      }));
      const grand = totals.reduce((s, c) => s + c.bytes, 0) || 1;
      const legend = [...totals].sort((a, b) => b.bytes - a.bytes).map((c) => `
        <span class="leg-item" title="${esc(c.path)}: ${humanBytes(c.bytes)}">
          <span class="swatch" style="background:${colColor(c.i)}"></span>
          <code class="mono">${esc(c.path)}</code>
          <span class="leg-pct">${humanBytes(c.bytes)} · ${(c.bytes / grand * 100).toFixed(0)}%</span>
        </span>`).join("");

      const rows = rgs.map((r) => {
        const rgTotal = r.columns.reduce((s, c) => s + c.compressed_size, 0) || 1;
        const seg = r.columns.map((c, i) =>
          `<span class="g-seg" title="${esc(c.path)}: ${humanBytes(c.compressed_size)} (${(c.compressed_size / rgTotal * 100).toFixed(1)}% of group)"
                 style="width:${(c.compressed_size / rgTotal * 100).toFixed(3)}%;background:${colColor(i)}"></span>`).join("");
        return `<div class="g-row">
          <span class="g-label" title="RowGroup ${r.index}">RG ${r.index}</span>
          <span class="g-track">
            <span class="g-bar" style="width:${(r.compressed_size / maxRg * 100).toFixed(3)}%">${seg}</span>
          </span>
          <span class="g-size">${humanBytes(r.compressed_size)}<span class="muted"> · ${n(r.num_rows)} rows</span></span>
        </div>`;
      }).join("");

      content.innerHTML = `
        <div class="grid-legend">${legend}</div>
        <div class="grid-chart">${rows}</div>
        <p class="grid-note">Bar length is each row group's compressed size on disk, relative to the largest group.
        Segments show how those bytes split across columns — hover any segment for exact sizes.</p>`;
    }

    // ---- Loading skeletons: same-shaped stand-ins for renderSummary/renderGrid/
    // renderLayout/renderMetadata, built from shimmering .skel bars so the wait
    // previews the tab that is about to land instead of a blank/"Loading…" pane.
    function skelText(w) { return `<span class="skel skel-text" style="width:${w}px"></span>`; }

    function skeletonSummary() {
      return [46, 50, 66, 58, 74]
        .map((w) => `<span class="stat">${skelText(w)}</span>`)
        .join(`<span class="sep">·</span>`);
    }

    function skeletonGrid() {
      const legend = [130, 150, 105, 95, 120].map((w) => `
        <span class="leg-item"><span class="skel skel-swatch"></span>${skelText(w)}</span>`).join("");
      const rows = [86, 62, 74, 45, 93, 58].map((w) => `
        <div class="g-row">
          <span class="g-label">${skelText(26)}</span>
          <span class="g-track"><span class="skel" style="display:block;height:100%;width:${w}%"></span></span>
          <span class="g-size">${skelText(70)}</span>
        </div>`).join("");
      return `<div class="grid-legend">${legend}</div><div class="grid-chart">${rows}</div>`;
    }

    function skeletonLayout() {
      const col = () => `
        <div class="box col">
          <div class="box-head">
            <span class="box-title">${skelText(120)}</span>
            <span class="box-range">${skelText(70)}</span>
          </div>
          <div class="data">
            <div class="box-head">
              <span class="box-title">${skelText(40)}</span>
              <span class="box-range">${skelText(90)}</span>
            </div>
          </div>
        </div>`;
      const rg = (n) => `
        <div class="box rg">
          <div class="box-head">
            <span class="box-title">${skelText(100)}</span>
            <span class="box-range">${skelText(60)}</span>
          </div>
          <div class="cols">${Array.from({ length: n }, col).join("")}</div>
        </div>`;
      return `<div class="lay">
        <div class="box magic"><div class="box-head">
          <span class="box-title">${skelText(90)}</span>
          <span class="box-range">${skelText(100)}</span>
        </div></div>
        ${rg(2)}${rg(3)}
      </div>`;
    }

    function skeletonMetadata() {
      const kv = [90, 140, 60, 130, 130, 70]
        .map((w) => `<dt>${skelText(70)}</dt><dd>${skelText(w)}</dd>`).join("");
      const schemaRows = [110, 95, 80, 120, 90].map((w) => `<tr>
        <td>${skelText(w)}</td><td>${skelText(60)}</td><td>${skelText(70)}</td>
        <td class="num">${skelText(16)}</td><td class="num">${skelText(16)}</td></tr>`).join("");
      const chunkRow = () => `<tr>
        <td>${skelText(100)}</td><td>${skelText(50)}</td><td>${skelText(50)}</td><td>${skelText(70)}</td>
        <td class="num">${skelText(40)}</td><td class="num">${skelText(50)}</td><td class="num">${skelText(50)}</td>
        <td class="num">${skelText(40)}</td><td>${skelText(80)}</td><td class="num">${skelText(24)}</td></tr>`;
      const rgSkel = [3, 2].map((n) => `<details class="rgd" open>
          <summary>${skelText(90)}<span class="muted">${skelText(150)}</span></summary>
          <div class="rgd-body"><table><thead><tr>
            <th>Column</th><th>Type</th><th>Codec</th><th>Encodings</th><th>Values</th>
            <th>Compressed</th><th>Uncompressed</th><th>Offset</th><th>Min … Max</th><th>Nulls</th>
          </tr></thead><tbody>${Array.from({ length: n }, chunkRow).join("")}</tbody></table></div>
        </details>`).join("");
      return `
        <div class="meta-section"><h3>File</h3><dl class="kv">${kv}</dl></div>
        <div class="meta-section"><h3>Schema</h3>
          <table><thead><tr><th>Column</th><th>Physical type</th><th>Logical type</th>
          <th class="num">Max def</th><th class="num">Max rep</th></tr></thead>
          <tbody>${schemaRows}</tbody></table></div>
        <div class="meta-section"><h3>Row groups</h3>${rgSkel}</div>`;
    }

    function skeletonMarkup(tab) {
      if (tab === "metadata") return skeletonMetadata();
      if (tab === "layout") return skeletonLayout();
      return skeletonGrid();
    }

    function renderTab() {
      const tab = currentTab();
      el("tab-layout").classList.toggle("active", tab === "layout");
      el("tab-grid").classList.toggle("active", tab === "grid");
      el("tab-metadata").classList.toggle("active", tab === "metadata");
      if (!data) { content.innerHTML = skeletonMarkup(tab); return; }
      if (tab === "metadata") renderMetadata();
      else if (tab === "grid") renderGrid();
      else renderLayout();
    }

    let loadSeq = 0; // stale-response guard: two rapid loads race their reads
    async function load() {
      const seq = ++loadSeq;
      const file = fused.params.get("_file");
      // Drop any prior file's data up front so a tab switch mid-load (or after
      // a failure) can't repaint stale layout/metadata for the wrong file.
      data = null;
      summaryEl.innerHTML = skeletonSummary();
      content.innerHTML = skeletonMarkup(currentTab());
      if (!file) {
        summaryEl.innerHTML = "";
        content.innerHTML = `<div id="status" class="error">No file selected (missing _file param).</div>`;
        return;
      }
      try {
        const result = await fused.runPython("./reader.py", { file });
        if (seq !== loadSeq) return; // a newer load superseded this one
        data = result;
        renderSummary();
        renderTab();
      } catch (err) {
        if (seq !== loadSeq) return;
        content.innerHTML = `<div id="status" class="error"><strong>${esc(err.type || "Error")}</strong>: ${esc(err.message || "")}</div>`;
      }
    }

    el("tab-layout").addEventListener("click", () => fused.params.set("view", "layout"));
    el("tab-grid").addEventListener("click", () => fused.params.set("view", "grid"));
    el("tab-metadata").addEventListener("click", () => fused.params.set("view", "metadata"));
    // Tab changes only reshuffle already-loaded data; a file change reloads.
    let lastFile = null;
    fused.params.onChange(() => {
      const file = fused.params.get("_file");
      if (file !== lastFile) { lastFile = file; load(); }
      else renderTab();
    });
    lastFile = fused.params.get("_file");
    load();
  </script>
</body>
</html>
