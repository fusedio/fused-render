<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Text preview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e8eaed;
    background: #131417;
  }
  pre {
    margin: 0;
    padding: 16px;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #status {
    padding: 24px;
    color: #9aa0a6;
  }
  #status a {
    color: #E5FF44;
  }
  .skeleton {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .skel-line {
    height: 13px;
    border-radius: 3px;
    background: linear-gradient(
      90deg,
      rgba(154, 160, 166, 0.08) 25%,
      rgba(154, 160, 166, 0.20) 37%,
      rgba(154, 160, 166, 0.08) 63%
    );
    background-size: 400% 100%;
    animation: skel-shimmer 1.4s ease-in-out infinite;
  }
  @keyframes skel-shimmer {
    0% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
</style>
</head>
<body>
  <div id="root"><div class="skeleton" aria-hidden="true">
    <div class="skel-line" style="width: 92%"></div>
    <div class="skel-line" style="width: 78%"></div>
    <div class="skel-line" style="width: 85%"></div>
    <div class="skel-line" style="width: 60%"></div>
    <div class="skel-line" style="width: 95%"></div>
    <div class="skel-line" style="width: 45%"></div>
    <div class="skel-line" style="width: 88%"></div>
    <div class="skel-line" style="width: 70%"></div>
  </div></div>
  <script>
    const MAX_BYTES = 2 * 1024 * 1024;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function load() {
      const root = document.getElementById("root");
      const file = fused.params.get("_file");
      if (!file) {
        root.innerHTML = `<div id="status">No file selected (missing _file param).</div>`;
        return;
      }
      const rawUrl = fused.rawUrl(file);
      try {
        const stat = await fused.stat(file);
        if (stat.size !== null && stat.size !== undefined && stat.size > MAX_BYTES) {
          root.innerHTML = `<div id="status">File is too large to preview inline (${stat.size.toLocaleString()} bytes).
            <a href="${rawUrl}" target="_blank" rel="noopener">Open raw</a></div>`;
          return;
        }
        const text = await fused.readFile(file);
        root.innerHTML = `<pre>${escapeHtml(text)}</pre>`;
      } catch (err) {
        root.innerHTML = `<div id="status">Failed to load file: ${escapeHtml(err.message)}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
