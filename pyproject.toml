[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fused-render"
version = "0.1.7"
description = "Local file explorer with Python-powered renderable HTML previews"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
    # /api/fs/events is a WebSocket (D74); plain uvicorn has no WS protocol
    # implementation, so the ws library is a hard dependency, not an extra.
    "websockets>=12",
    "pyarrow>=14",
]

[project.optional-dependencies]
# Test/dev tooling. `pip install -e ".[dev]"` then `pytest`.
dev = [
    "pytest",
]
# Baked into the bundled CPython of the .app (SPEC DM-2): users of the packaged
# app cannot pip install, so the interpreter ships with the popular data stack.
# Dev installs: pip install -e ".[bundled]"
bundled = [
    "numpy",
    "pandas",
    "requests",
    "duckdb",
    "polars",
    "matplotlib",
    "scipy",
    "pillow",
    "openpyxl",
    "shapely",
    "geopandas",
]
# Menu-bar app shell (SPEC DM-3/DM-7). macOS-only; not a core dependency so
# `pip install fused-render` stays cross-platform. Only the packaged .app
# build (scripts/build_dmg.sh) installs this extra.
app = [
    "rumps",
]
# Optional execution engine (D69): when installed, /api/run runs code through
# the fused local compute backend; absent, the built-in executor runs. Pinned
# to the same wheel `openfused_server` serves hosted pages from, so local and
# hosted execution stay on one build. The engine needs 3.11+; on 3.10 the
# marker skips it and the built-in executor runs.
# The wheel URL must match deploy.PINNED_FUSED_REQUIREMENT (the Deploy modal's
# one-click install, SPEC DP-4) — a test pins the two together.
fused = [
    'fused @ https://fused-magic.s3.us-west-2.amazonaws.com/fused-2.9.3.post1-py3-none-any.whl ; python_version >= "3.11"',
]

[project.scripts]
fused-render = "fused_render.cli:main"
fused-render-app = "fused_render.app:main"

# No-console launcher for the Explorer "Open with" registration; a dedicated
# exe because the Open With dialog displays a pythonw.exe command as "Python".
[project.gui-scripts]
fused-render-open = "fused_render.winopen:main"

[tool.hatch.metadata]
# The `fused` extra pins a direct wheel URL (not a PyPI dependency) — hatchling
# refuses that unless explicitly allowed.
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["fused_render"]
# The Vite-built shell is gitignored (D54) but must ship in the wheel;
# `artifacts` overrides hatchling's VCS-based exclusion for it.
artifacts = ["fused_render/static/shell-dist/**"]

# Builds frontend/ -> fused_render/static/shell-dist/ at package-build time
# (wheel and the DMG pipeline, which pip-installs this repo). Editable
# installs skip it — see scripts/hatch_build.py.
[tool.hatch.build.targets.wheel.hooks.custom]
path = "scripts/hatch_build.py"
