<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Parquet preview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #e8eaed;
    background: #131417;
  }
  #bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-bottom: 1px solid #2a2d33;
    background: #1b1d21;
    position: sticky;
    top: 0;
  }
  #bar button {
    font: inherit;
    padding: 4px 10px;
    border: 1px solid #2a2d33;
    border-radius: 6px;
    background: #131417;
    color: #e8eaed;
    cursor: pointer;
  }
  #bar button:disabled {
    opacity: 0.4;
    cursor: default;
  }
  #rowcount {
    color: #9aa0a6;
  }
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    padding: 5px 10px;
    border-bottom: 1px solid #24262b;
    text-align: left;
    white-space: nowrap;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th {
    background: #1b1d21;
    position: sticky;
    top: 37px;
    font-weight: 600;
  }
  #status {
    padding: 24px;
    color: #9aa0a6;
  }
  #status.error {
    color: #ff6b6b;
  }
</style>
</head>
<body>
  <div id="bar">
    <button id="prev">&larr; Prev</button>
    <button id="next">Next &rarr;</button>
    <span id="rowcount"></span>
  </div>
  <div id="tablewrap"></div>
  <script>
    const LIMIT = 100;
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const rowcountEl = document.getElementById("rowcount");
    const wrap = document.getElementById("tablewrap");

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function currentOffset() {
      const raw = fused.params.get("offset");
      const n = raw ? parseInt(raw, 10) : 0;
      return Number.isFinite(n) && n >= 0 ? n : 0;
    }

    function render(data, offset) {
      const total = data.total_rows;
      const shown = data.rows.length;
      const from = shown === 0 ? 0 : offset + 1;
      const to = offset + shown;
      rowcountEl.textContent = `rows ${from.toLocaleString()}–${to.toLocaleString()} of ${total.toLocaleString()}`;
      prevBtn.disabled = offset <= 0;
      nextBtn.disabled = offset + LIMIT >= total;

      const cols = data.columns;
      const head = `<tr>${cols.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
      // Cell ids carry the ABSOLUTE data-row index, so an annotation anchored
      // to a cell stays on that row across pagination — a positional path
      // would resolve to whatever row happens to sit 5th on the current page.
      const body = data.rows
        .map((row, i) => `<tr>${cols.map((c, j) => `<td id="__fr_r${offset + i}_c${j}" title="${escapeHtml(row[c])}">${escapeHtml(row[c])}</td>`).join("")}</tr>`)
        .join("");
      wrap.innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
      totalRows = total;
    }

    let loadSeq = 0; // stale-response guard: two rapid param changes race their reloads
    async function load() {
      const seq = ++loadSeq;
      const file = fused.params.get("_file");
      const offset = currentOffset();
      wrap.innerHTML = `<div id="status">Loading…</div>`;
      if (!file) {
        wrap.innerHTML = `<div id="status" class="error">No file selected (missing _file param).</div>`;
        return;
      }
      try {
        const data = await fused.runPython("./reader.py", {
          file,
          offset: String(offset),
          limit: String(LIMIT),
        });
        if (seq !== loadSeq) return; // a newer load superseded this one
        render(data, offset);
      } catch (err) {
        if (seq !== loadSeq) return;
        wrap.innerHTML = `<div id="status" class="error"><strong>${escapeHtml(err.type || "Error")}</strong>: ${escapeHtml(err.message || "")}</div>`;
      }
    }

    prevBtn.addEventListener("click", () => {
      fused.params.set("offset", String(Math.max(0, currentOffset() - LIMIT)));
    });
    nextBtn.addEventListener("click", () => {
      fused.params.set("offset", String(currentOffset() + LIMIT));
    });
    fused.params.onChange(load);
    load();

    // Annotation anchor resolver: tells the annotate view (which probes
    // window.__fusedAnnotateAnchorResolver on this frame) that an unresolved
    // __fr_r<row>_c<col> cell id is merely on another PAGE — not detached —
    // and navigates there on reveal (offset change → reload).
    let totalRows = 0; // honest count from the last load, 0 before it
    const CELL_ID = /^__fr_r(\d+)_c(\d+)$/;
    window.__fusedAnnotateAnchorResolver = {
      match(id) {
        const m = CELL_ID.exec(id);
        if (!m) return null;
        const row = parseInt(m[1], 10);
        if (totalRows && row >= totalRows) return null; // row truly gone → detached
        return { label: "row " + (row + 1).toLocaleString() };
      },
      reveal(id) {
        const m = CELL_ID.exec(id);
        if (m) fused.params.set("offset", String(Math.floor(parseInt(m[1], 10) / LIMIT) * LIMIT));
      },
    };
  </script>
</body>
</html>
